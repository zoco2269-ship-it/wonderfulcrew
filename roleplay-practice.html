:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.interview.active{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
a{color:inherit;text-decoration:none;}

/* Nav - minimal for dark bg */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);transition:color 0.2s;}.nav-back:hover{color:var(--gold);}

/* Setup screen */
.setup{padding:60px 20px;text-align:center;max-width:700px;margin:0 auto;}
.setup h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#fff;margin-bottom:8px;}
.setup h1 em{font-style:normal;color:var(--gold);}
.setup p{color:rgba(255,255,255,0.6);font-size:0.88rem;line-height:1.7;margin-bottom:28px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;text-align:left;}
.setup-label{font-size:0.78rem;color:var(--gold);font-weight:600;margin-bottom:6px;letter-spacing:0.06em;}
.setup-select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#fff;font-family:inherit;font-size:0.85rem;}
.setup-select option{background:var(--navy);color:#fff;}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.avatar-opt{padding:14px 8px;background:rgba(255,255,255,0.04);border:2px solid rgba(201,168,76,0.15);border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:0.78rem;color:rgba(255,255,255,0.7);}
.avatar-opt:hover,.avatar-opt.sel{border-color:var(--gold);background:rgba(201,168,76,0.1);color:#fff;}
.avatar-opt .emoji{font-size:1.8rem;margin-bottom:4px;display:block;}
.btn-start{padding:16px 40px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:28px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;}@media(max-width:600px){.btn-start{padding:10px 24px!important;font-size:0.82rem!important;border-radius:22px!important;}}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}

/* Interview screen */
.interview{display:none;flex:1;flex-direction:column;}
.interview.active{display:flex;}
.q-banner{text-align:center;padding:10px 20px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.15);}
.q-banner .label{font-size:0.7rem;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px;}
.q-banner .question{font-size:0.95rem;color:#fff;font-weight:500;line-height:1.5;}

/* Video area */
.video-area{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 24px;min-height:0;overflow:hidden;}
.card-frame{width:160px;aspect-ratio:9/16;max-height:100%;border-radius:12px;overflow:hidden;position:relative;background:#000;border:2px solid rgba(255,255,255,0.08);flex-shrink:1;}
.card-frame.speaking{border-color:var(--gold);animation:goldGlow 1.5s infinite;}
@keyframes goldGlow{0%,100%{border-color:rgba(201,168,76,0.4);}50%{border-color:rgba(201,168,76,1);}}
.card-label{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));text-align:center;}
.card-label .name{font-family:'DM Serif Display',serif;font-size:0.85rem;color:#fff;}
.card-label .role{font-size:0.68rem;color:var(--gold);letter-spacing:0.05em;}

/* Avatar */
.avatar-display{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#1A2340 0%,#2A3455 100%);}
.avatar-face{text-align:center;}
.avatar-face .face{font-size:4rem;line-height:1;margin-bottom:8px;}
.avatar-face .mouth{width:20px;height:8px;background:var(--gold);border-radius:0 0 10px 10px;margin:0 auto;transition:height 0.1s;opacity:0.7;}
.avatar-face .mouth.talking{animation:mouthMove 0.3s infinite alternate;}
@keyframes mouthMove{0%{height:4px;width:16px;}100%{height:12px;width:22px;}}

/* Camera */
.cam-frame video,.card-frame video{width:100%;height:100%;object-fit:cover;}
.cam-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:0.82rem;flex-direction:column;gap:8px;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#E74C3C;display:none;}
.rec-dot.on{display:inline-block;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Waveform */
.waveform{height:30px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 20px;}
.waveform .bar{width:3px;background:var(--gold);border-radius:2px;animation:wave 0.5s ease-in-out infinite alternate;opacity:0.4;}
.waveform.active .bar{opacity:1;}
@keyframes wave{0%{height:4px;}100%{height:20px;}}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 20px;background:rgba(17,27,46,0.95);border-top:1px solid rgba(201,168,76,0.15);}
.ctrl-btn{padding:12px 22px;border:none;border-radius:24px;font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.ctrl-btn:disabled{opacity:0.35;cursor:not-allowed;}
.ctrl-btn.primary{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.ctrl-btn.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.ctrl-btn.secondary:hover:not(:disabled){background:rgba(255,255,255,0.12);}
.ctrl-btn.danger{background:#E74C3C;color:#fff;}

/* Feedback panel */
.feedback-panel{display:none;padding:20px 24px;background:rgba(0,0,0,0.3);max-height:200px;overflow-y:auto;font-size:0.86rem;color:rgba(255,255,255,0.8);line-height:1.7;}
.feedback-panel.active{display:block;}
.feedback-panel b{color:var(--gold);}

/* Transcript */
.transcript-bar{padding:10px 20px;background:rgba(255,255,255,0.04);font-size:0.84rem;color:rgba(255,255,255,0.6);min-height:36px;border-top:1px solid rgba(255,255,255,0.05);}

@media(max-width:600px){
  body{height:100dvh;overflow:hidden;}
  .setup{padding:22px 16px;overflow-y:auto;max-height:calc(100dvh - 56px);}
  .setup h1{font-size:1.55rem;}
  .setup p{font-size:0.95rem;margin-bottom:18px;}
  .card-frame{width:45vw;max-width:220px;aspect-ratio:9/16;height:auto;max-height:calc(100dvh - 220px);}
  .video-area{gap:10px;padding:10px;min-height:0;flex:1;align-items:center;}
  .q-banner{padding:8px 14px;}
  .q-banner .label{font-size:0.72rem;margin-bottom:3px;}
  .q-banner .question{font-size:0.98rem;line-height:1.45;}
  .waveform{height:20px;padding:0 12px;}
  .transcript-bar{padding:8px 14px;font-size:0.92rem;min-height:30px;}
  .feedback-panel{max-height:24dvh;padding:12px 16px;font-size:0.92rem;}
  .controls{gap:8px;padding:10px 12px env(safe-area-inset-bottom,10px);flex-wrap:wrap;}
  .ctrl-btn{padding:11px 18px;font-size:0.9rem;}
  .avatar-grid{grid-template-columns:1fr 1fr;}
  .setup-grid{grid-template-columns:1fr;}
  .interview.active{height:calc(100dvh - 56px);}
}

<script>
function goBack(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    gcStop();
    if(typeof recognition!=='undefined'&&recognition)try{recognition.stop();}catch(e){}
    if(typeof stream!=='undefined'&&stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
    interview.classList.remove('active');
    document.getElementById('setup').style.display='block';
  } else {
    // setup 화면이 보이는 상태에서 뒤로가기 → 이전 페이지
    history.back();
  }
}
// 브라우저 뒤로가기 버튼도 잡기
window.addEventListener('popstate',function(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    goBack();
  }
});
</script>

function startInterview(){
  // 선택된 배경의 전체 시나리오를 셔플해서 사용 — 제한 없이 '다음 질문' 으로 순회
  var setting=(document.getElementById('s-setting')||{}).value||'flight';
  window._curSetting=setting;
  var pool=[];
  if(setting==='flight'){
    SCENARIOS.forEach(function(q,i){pool.push({q:q,origIdx:'f'+i,opener:OPENERS[i]||null});});
  } else {
    (SCENARIO_SETS[setting]||[]).forEach(function(it,i){pool.push({q:it.q,origIdx:setting[0]+i,opener:it.o});});
  }
  // Fisher–Yates 셔플 — 매 세션마다 순서 랜덤
  for(var j=pool.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var tmp=pool[j];pool[j]=pool[k];pool[k]=tmp;}
  questions=pool;

  qIdx=0;
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');
  history.pushState({roleplay:true},'','');
  // 아바타 이미지 또는 이모지 표시
  var avatarImg=document.getElementById('avatar-img');
  var avatarFallback=document.getElementById('avatar-face-fallback');
  if(chosenImg){
    avatarImg.src=chosenImg;
    avatarImg.style.display='block';
    avatarFallback.style.display='none';
    avatarImg.onerror=function(){avatarImg.style.display='none';avatarFallback.style.display='flex';};
  }
  document.getElementById('avatar-emoji').textContent=chosenAvatar;

  // Start camera
  // 카메라: 정면(셀카) 우선, 실패 시 기본 카메라
  // 카메라: 모든 비디오 장치를 확인해서 전면(내장) 카메라를 우선 선택
  // 모바일 SpeechRecognition 호환성: audio 는 SR 이 단독으로 쓸 수 있게 getUserMedia 에서 요청하지 않음
  (async function(){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
      var v=document.getElementById('cam-video');
      if(v){v.srcObject=stream;v.style.display='block';}
      var ph=document.getElementById('cam-ph');
      if(ph)ph.style.display='none';
      try{initFaceMesh(v);faceAnalysisActive=true;}catch(e){}
    }catch(e){
      var ph=document.getElementById('cam-ph');
      if(ph)ph.innerHTML='<div>Camera connection failed</div>';
    }
  })();

  showQuestion();
}

// ===== MediaPipe 얼굴 분석 (startInterview 외부 — 함수 깨짐 방지) =====
var faceStats={smileFrames:0,totalFrames:0,lookingCenter:0,headTiltFrames:0};
var faceMeshInstance=null;var faceAnalysisActive=false;
function initFaceMesh(videoEl){
  if(!window.FaceMesh) return;
  try{
    faceMeshInstance=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
    faceMeshInstance.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMeshInstance.onResults(function(r){
      if(!faceAnalysisActive)return;
      faceStats.totalFrames++;
      if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
        var lm=r.multiFaceLandmarks[0];
        var lipL=lm[61],lipR=lm[291],lipTop=lm[13],lipBot=lm[14];
        var faceL=lm[234],faceR=lm[454];
        var cornerY=(lipL.y+lipR.y)/2;
        var lipMidY=(lipTop.y+lipBot.y)/2;
        var cornerLift=lipMidY-cornerY;
        var mouthW=Math.abs(lipR.x-lipL.x);
        var faceW=Math.abs(faceR.x-faceL.x);
        var widthRatio=faceW>0?(mouthW/faceW):0;
        if(cornerLift>0.006 && widthRatio>0.46) faceStats.smileFrames++;
        var nose=lm[1];
        if(Math.abs(nose.x-0.5)<0.15&&Math.abs(nose.y-0.45)<0.15)faceStats.lookingCenter++;
        var eyeL=lm[33],eyeR=lm[263];
        if(Math.abs(eyeL.y-eyeR.y)>0.02)faceStats.headTiltFrames++;
      }
    });
    setInterval(function(){if(faceAnalysisActive&&videoEl.readyState>=2)try{faceMeshInstance.send({image:videoEl});}catch(e){}},500);
  }catch(e){}
}
function getFaceReport(){
  if(faceStats.totalFrames<5)return '';
  var s=Math.round((faceStats.smileFrames/faceStats.totalFrames)*100);
  var g=Math.round((faceStats.lookingCenter/faceStats.totalFrames)*100);
  var t=Math.round((faceStats.headTiltFrames/faceStats.totalFrames)*100);
  return '\n\n📷 이미지 분석:\n• 미소 유지: '+s+'%'+(s>=60?' ✓':' — 더 웃어보세요')+'\n• 카메라 시선: '+g+'%'+(g>=70?' ✓':' — 카메라를 더 정면으로 보세요')+'\n• 고개 기울기: '+(t<=20?'안정적 ✓':'기울어진 순간 '+t+'% — 바른 자세를 유지하세요');
}

window.requestMicAndListen = async function requestMicAndListen(){
  console.log('[rp-dbg] requestMicAndListen called, mobileSR=', window._mobileSRActive);
  var tx=document.getElementById('transcript');
  // 클릭 감지 즉시 시각 피드백 (마이크 실패 여부와 무관하게 '눌렀음'을 확인)
  if(tx) tx.innerHTML='<span style="color:#E8C96A;">🔴 버튼 감지됨 — 마이크 권한 확인 중...</span>';
  // 게이트 블러 해제 (어드민은 풀어두는 안전망)
  try{ if(document.body.style.pointerEvents==='none') document.body.style.pointerEvents=''; }catch(e){}
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    tx.innerHTML='<span style="color:#E74C3C;">⚠ 이 브라우저는 마이크 접근을 지원하지 않아요. 최신 Chrome 에서 접속해 주세요. (HTTPS 필수)</span>';
    var bA0=document.getElementById('btn-answer');if(bA0) bA0.style.display='inline-flex';
    return;
  }
  try{
    var micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    // 권한 확인만 하고 바로 트랙 해제 → SR 이 마이크를 단독 점유
    micStream.getTracks().forEach(function(t){t.stop();});
    startListening();
  }catch(err){
    var name=err&&err.name||'unknown';
    var msg='';
    if(name==='NotAllowedError'||name==='SecurityError')
      msg='마이크 권한이 거부됐어요. 주소창 자물쇠 🔒 → 권한 → 마이크 → 허용 으로 바꾸고 새로고침 해 주세요.';
    else if(name==='NotFoundError')
      msg='마이크를 찾을 수 없어요. 기기 설정을 확인해 주세요.';
    else if(name==='NotReadableError')
      msg='마이크가 다른 앱에서 사용 중이에요. 다른 앱(녹음기·영상통화 등)을 종료하고 다시 시도해 주세요.';
    else msg='마이크 접근 실패: '+name+' — '+(err&&err.message||'');
    tx.innerHTML='<span style="color:#E74C3C;">⚠ '+msg+'</span>';
    var bA=document.getElementById('btn-answer');if(bA) bA.style.display='inline-flex';
  }
};

function startListening(){
  console.log('[rp-dbg] startListening() called, mobileSR=', window._mobileSRActive);
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 이 브라우저는 음성 인식을 지원하지 않습니다. Chrome/Edge 에서 이용해 주세요.</span>';
    return;
  }
  // 모바일 Android Chrome: continuous=true 는 불안정 — 한 번에 한 발화만 받고 자동 재시작
  recognition=new SR();
  recognition.lang='en-US';
  recognition.interimResults=true;
  recognition.continuous=true;
  fullText='';
  window._manualStop=false;
  window._finalSeen={};window._finalList=[];
  var bA=document.getElementById('btn-answer');if(bA) bA.style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-label').textContent='답변 중';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('transcript').textContent='🎙 듣고 있어요… 말이 끝나면 ⏹ 답변 종료를 눌러주세요';

  // 녹화 없음 — 프라이버시 정책상 영상은 어디에도 저장/전송하지 않음

  // 전역 dedupe — 모든 세션의 final 을 정규화 키로 한 번씩만 수집
  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    console.log('[rp-dbg] onresult fire, results.length=', ev.results.length);
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        console.log('[rp-dbg]   final:', JSON.stringify(t));
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    if(interim) console.log('[rp-dbg]   interim:', JSON.stringify(interim));
    fullText=window._finalList.join(' ');
    document.getElementById('transcript').textContent=(fullText+(interim?' '+interim:'')).trim()||'🎙 듣고 있어요…';
  };
  recognition.onerror=function(ev){
    console.log('[rp-dbg] onerror fire, code=', ev.error);
    var code=ev.error||'unknown';
    // no-speech / aborted 는 onend 재시작에 맡기고 UI 변경 없이 조용히 무시
    if(code==='no-speech'||code==='aborted')return;
    var msg='';
    if(code==='not-allowed'||code==='service-not-allowed')
      msg='마이크 권한이 필요해요. 주소창 자물쇠 아이콘 → 마이크 허용으로 설정해 주세요.';
    else if(code==='network')
      msg='네트워크 오류. 다시 시도해 주세요.';
    else if(code==='audio-capture')
      msg='마이크를 열 수 없어요.';
    else return; // 알 수 없는 에러는 조용히 무시
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ '+msg+'</span>';
    var bA2=document.getElementById('btn-answer');if(bA2) bA2.style.display='inline-flex';
    document.getElementById('btn-stop').style.display='none';
    document.getElementById('rec-dot').classList.remove('on');
    document.getElementById('waveform').classList.remove('active');
  };
  recognition.onend=function(){
    console.log('[rp-dbg] onend fire, manualStop=', window._manualStop, 'fullText=', JSON.stringify(fullText));
    if(endingRoleplay) return;
    // 사용자가 ⏹ 누르기 전엔 자동 재시작 (Android Chrome 은 5~8초마다 auto-stop)
    if(window._manualStop){
      // fullText 있으면 transcript 에 반영, 없어도 processAnswer 는 무조건 호출 (내부에서 빈 경우 startListening 로 복귀)
      if(fullText.trim()) document.getElementById('transcript').textContent=fullText.trim();
      processAnswer();
    } else {
      // 새 인스턴스로 재시작 (Android Chrome auto-stop 대응)
      setTimeout(function(){
        if(endingRoleplay||window._manualStop) return;
        try{
          var SR2=window.SpeechRecognition||window.webkitSpeechRecognition;
          var r2=new SR2();
          r2.lang='en-US';r2.interimResults=true;r2.continuous=true;
          r2.onresult=recognition?recognition.onresult:null;
          r2.onerror=recognition?recognition.onerror:null;
          r2.onend=recognition?recognition.onend:null;
          recognition=r2;
          r2.start();
        }catch(e){
          document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 잠시 중단 — 🎙 답변하기 다시 눌러주세요.</span>';
          var bA5=document.getElementById('btn-answer');if(bA5) bA5.style.display='inline-flex';
          document.getElementById('btn-stop').style.display='none';
        }
      },400);
      return;
      // 아래는 이전 로직 (도달하지 않음)
      try{ recognition.start(); }catch(e){
        document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 인식 중단. 🎙 답변하기 다시 눌러 주세요.</span>';
        var bA5=document.getElementById('btn-answer');if(bA5) bA5.style.display='inline-flex';
        document.getElementById('btn-stop').style.display='none';
      }
    }
  };
  try{
    console.log('[rp-dbg] calling recognition.start()');
    recognition.start();
    console.log('[rp-dbg] recognition.start() returned OK');
  }catch(err){
    console.log('[rp-dbg] recognition.start() threw:', err.message);
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 음성 인식 시작 실패: '+err.message+'</span>';
    var bA4=document.getElementById('btn-answer');if(bA4) bA4.style.display='inline-flex';
  }
}

// 음성 목록 미리 로드
if('speechSynthesis' in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

// 페이지 나갈 때 / 숨김 시 TTS + 카메라 + 마이크 모두 중지
function _stopAllAudio(){
  try{document.querySelectorAll('audio,video').forEach(function(el){try{el.pause();el.src='';el.load();}catch(e){}});}catch(e){}
  try{if(typeof gcStop==='function')gcStop();}catch(e){}
  try{if('speechSynthesis' in window)window.speechSynthesis.cancel();}catch(e){}
  try{if(recognition)recognition.stop();}catch(e){}
  try{if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}}catch(e){}
}
window.addEventListener('beforeunload',_stopAllAudio);
window.addEventListener('pagehide',_stopAllAudio);
document.addEventListener('visibilitychange',function(){if(document.hidden)_stopAllAudio();});

function speakQuestion(text,lang){
  var iCard=document.getElementById('interviewer-card');
  var mouth=document.getElementById('avatar-mouth');
  iCard.classList.add('speaking');
  mouth.classList.add('talking');
  var isMale=(chosenAvatar==='👨🏻');
  gcSpeak(text,lang||'en-GB',isMale?'male':'female',function(){
    iCard.classList.remove('speaking');mouth.classList.remove('talking');
  });
}

var chatHistory=[];
var lastSuggestedResponse='';

async function showSuggestedResponse(){
  var fb=document.getElementById('feedback');
  fb.classList.add('active');
  // 이미 피드백으로 생성된 모범답변이 있으면 표시
  if(lastSuggestedResponse){
    fb.innerHTML+='<br><br><b style="color:var(--gold);">Model Answer:</b><br><div style="white-space:pre-line;background:rgba(201,168,76,0.08);padding:16px;border-left:3px solid var(--gold);margin-top:8px;">'+lastSuggestedResponse+'</div>';
    document.getElementById('btn-model').style.display='none';
    return;
  }
  // 즉석 모범답변 생성 (대화 중 요청)
  var q=questions[qIdx];
  var scenario=typeof q==='string'?q:q.q;
  var lastCustomer='';
  for(var i=chatHistory.length-1;i>=0;i--){if(chatHistory[i].role==='assistant'){lastCustomer=chatHistory[i].content;break;}}
  fb.innerHTML='<span style="color:var(--gold);">모범답변을 작성하고 있어요...</span>';
  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:200,
      system:'You are a cabin crew trainer. Give an ideal model answer (2-4 sentences) for the cabin crew to say to the customer in this scenario.\n\nScenario: '+scenario+(lastCustomer?'\nCustomer just said: '+lastCustomer:'')+'\n\nWrite only the model answer — no preamble, no stage directions. Professional, warm, solution-oriented. English only.',
      messages:[{role:'user',content:'Give me a model cabin crew response.'}]
    })});
    var data=await res.json();
    var txt=((data&&data.content&&data.content[0]&&data.content[0].text)||'I\'m so sorry for the inconvenience. Let me look into this right away and find a solution for you.').replace(/\*\*/g,'').trim();
    lastSuggestedResponse=txt;
    fb.innerHTML='<b style="color:var(--gold);">Model Answer:</b><br><div style="white-space:pre-line;background:rgba(201,168,76,0.08);padding:16px;border-left:3px solid var(--gold);margin-top:8px;">'+txt+'</div>';
    document.getElementById('btn-model').style.display='none';
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">모범답변 생성 실패. 다시 시도해 주세요.</span>';
  }
}

var endingRoleplay=false;

function stopAnswer(){
  window._manualStop=true;
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-label').textContent='처리 중';
  document.getElementById('waveform').classList.remove('active');
}

function stopAndFeedback(){
  window._manualStop=true;
  endingRoleplay=true;
  try{if(typeof gcStop==='function')gcStop();}catch(e){}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  if(recognition)try{recognition.onend=null;recognition.stop();recognition=null;}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('waveform').classList.remove('active');
  var lastAns=fullText.trim();
  if(lastAns&&lastAns!=='지금 답변하세요...'){
    chatHistory.push({role:'user',content:lastAns});
  }
  if(mediaRecorder&&mediaRecorder.state==='recording')try{mediaRecorder.stop();}catch(e){}
  var q=questions[qIdx];
  var scenario=typeof q==='string'?q:q.q;
  generateFeedback(scenario);
}

async function processAnswer(){
  stopAnswer();

  var _rawTr=document.getElementById('transcript').textContent.trim();
  var _isPlaceholder=/^🎙|^듣고 있어요|^지금 답변하세요|^목소리가 없어요|^고객이 먼저 말합니다|^🔴 버튼/.test(_rawTr);
  var ans=fullText.trim()||(_isPlaceholder?'':_rawTr);
  if(!ans){
    if(window._mobileSRActive){
      // 모바일: 재시작 루프 대신 명확한 안내 + 수동 재탭
      document.getElementById('transcript').textContent='음성이 감지되지 않았어요. 🎙 답변하기를 다시 눌러 주세요.';
      var bA0=document.getElementById('btn-answer');if(bA0) bA0.style.display='inline-flex';
      document.getElementById('btn-stop').style.display='none';
      document.getElementById('rec-label').textContent='대기';
      return;
    }
    // 데스크톱: 원래 동작 — 자동 재시작으로 대화 흐름 유지
    startListening();return;
  }

  chatHistory.push({role:'user',content:ans});

  var fb=document.getElementById('feedback');
  var q=questions[qIdx];
  var scenario=typeof q==='string'?q:q.q;

  // 고객이 학생 답변에 반응
  fb.innerHTML='<span style="color:var(--gold);">고객이 반응하고 있어요...</span>';
  fb.classList.add('active');

  var turnCount=chatHistory.filter(function(m){return m.role==='user';}).length;
  var turnInstr=turnCount<3
    ?'\n- Keep the exchange going. Either push back with a new concern or ask a natural follow-up question like "But what about...?" / "Could you also...?". DO NOT end the conversation.'
    :'\n- After '+turnCount+' exchanges you may wrap up with a brief grateful closing (1 sentence).';
  // Claude API 는 messages 가 user 로 시작해야 함 — opener 가 assistant 로 시작하므로 placeholder user 추가
  var apiMessages = chatHistory.slice();
  if(apiMessages.length>0 && apiMessages[0].role==='assistant'){
    apiMessages = [{role:'user',content:'(Begin the roleplay. You are the customer. Open with your complaint.)'}].concat(apiMessages);
  }
  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:80,
      system:'You are the CUSTOMER in this roleplay scenario: "'+scenario+'"\n\nThe user is the SERVICE STAFF (cabin crew / hotel staff / restaurant server / etc.) helping you. NEVER break character. NEVER give meta-instructions. NEVER say things like "please respond as crew" or "let me start over" or "I\'m waiting for you". Just stay in character as an impatient or concerned customer no matter what the staff says.\n\nAbsolute rules:\n- You are the CUSTOMER, not the staff. NEVER say staff phrases ("I apologize", "Let me help", "Right away", "How can I assist", "I\'ll look into that").\n- Even if the staff\'s reply is unclear/short/silent, push back AS A CUSTOMER: "Excuse me?", "What are you going to do about this?", "Sorry, I didn\'t catch that — could you explain?"\n- First-person customer voice only: "I", "my", "I need", "I want", "I\'m upset".\n- 1-2 short sentences. Natural English. No stage directions, asterisks, square brackets, or speaker labels.\n- Turn '+turnCount+' — keep exchange going for at least 3 turns.'+turnInstr,
      messages:apiMessages
    })});
    var data=await res.json();
    var aiText=(data&&data.content&&data.content[0]&&data.content[0].text)||'I see.';
    aiText=aiText.replace(/\*\*/g,'').replace(/\[[A-Za-z ]+\]\s*/g,'').replace(/^(Customer|Passenger|Guest):\s*/i,'').trim();
    // 메타 응답 제거 — AI 가 캐릭터 깨고 "respond as crew" 식으로 답하면 첫 문장부터 재구성
    var metaPatterns=/^(I'm sorry,? but|I'm waiting for|Let me start over|I need you to (actually )?respond|Could you (please )?respond|Please respond as|Please speak as|Can you (please )?respond)/i;
    if(metaPatterns.test(aiText)){
      // 메타 문장을 제거하고 실제 고객 대사만 남기기
      var sentences=aiText.split(/(?<=[.!?])\s+/);
      var cleaned=sentences.filter(function(s){return !metaPatterns.test(s.trim());}).join(' ').trim();
      aiText=cleaned || "I don't understand—can you clarify what you'll do about this?";
    }

    chatHistory.push({role:'assistant',content:aiText});
    fb.innerHTML='<b style="color:var(--gold);">Customer:</b> '+aiText;

    var accent=document.getElementById('s-accent').value;
    speakQuestion(aiText,accent);

    // TTS 끝나면 → 3분 지났으면 피드백, 아니면 대화 계속
    // Google Cloud Audio + speechSynthesis 양쪽 체크
    var checkTTS=setInterval(function(){
      var gcPlaying=(typeof _gcTtsAudio!=='undefined' && _gcTtsAudio && !_gcTtsAudio.paused && !_gcTtsAudio.ended);
      var synPlaying=('speechSynthesis' in window && window.speechSynthesis.speaking);
      if(!gcPlaying && !synPlaying){
        clearInterval(checkTTS);
        if(timeExpired){
          generateFeedback(scenario);
        } else {
          var bA=document.getElementById('btn-answer');if(bA) bA.style.display='inline-flex';
          // 매 턴 후 모범답변/다음질문 버튼 노출 — 모바일·데스크톱 모두
          var bM=document.getElementById('btn-model');if(bM) bM.style.display='inline-flex';
          var bN=document.getElementById('btn-next');if(bN) bN.style.display='inline-flex';
        }
      }
    },200);
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">오류 발생.</span>';
  }
}

async function generateFeedback(scenario){
  if(mediaRecorder&&mediaRecorder.state==='recording')try{mediaRecorder.stop();}catch(e){}
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">피드백을 작성하고 있어요...</span>';

  try{
    var convoSummary=chatHistory.map(function(m){return (m.role==='user'?'Crew':'Customer')+': '+m.content;}).join('\n');
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:500,
      system:'You are a cabin crew interview coach. Evaluate the following roleplay conversation. The scenario was: "'+scenario+'"\n\nIMPORTANT SCORING GUIDELINES:\n- The student\'s answers come from SPEECH RECOGNITION, so ignore grammar mistakes, broken sentences, capitalization issues. Focus on the CONTENT and INTENT.\n- If the student apologized, offered solutions, showed empathy, or asked good questions → that deserves 70+ points\n- If the student covered most key points (apology + solution + alternative + service recovery) → 80+ points\n- Only give below 50 if the student said almost nothing useful\n- Be ENCOURAGING. These are students practicing. Highlight what they did RIGHT.\n\nProvide feedback in EXACTLY this format:\n\nOverall Score: X/100\n\nStrengths:\n- (2-3 bullet points about what they did well)\n\nAreas to Improve:\n- (1-2 gentle suggestions)\n\n---SUGGESTED---\n(Write a short ideal response for this scenario. 3-4 sentences. This helps the student learn.)\n\nWrite in English. Keep it concise and encouraging.',
      messages:[{role:'user',content:'Here is the full roleplay conversation:\n\n'+convoSummary+'\n\nPlease give feedback.'}]
    })});
    var data=await res.json();
    var feedbackText=(data&&data.content&&data.content[0]&&data.content[0].text)||'Good effort!';
    feedbackText=feedbackText.replace(/\*\*/g,'');

    var parts=feedbackText.split('---SUGGESTED---');
    var mainFeedback=parts[0].trim();
    lastSuggestedResponse=(parts[1]||'').trim();

    fb.innerHTML='<b style="color:var(--gold);">Feedback</b><br><br><div style="white-space:pre-line;">'+mainFeedback+'</div>';
    if(lastSuggestedResponse) document.getElementById('btn-model').style.display='inline-flex';
    document.getElementById('btn-next').style.display='inline-flex';
    document.getElementById('rec-label').textContent='완료';
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">피드백 생성 실패.</span>';
    document.getElementById('btn-next').style.display='inline-flex';
  }
}

function nextQuestion(){
  try{if(typeof gcStop==='function')gcStop();}catch(e){}
  if(recognition)try{recognition.onend=null;recognition.stop();recognition=null;}catch(e){}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  mediaRecorder=null;
  qIdx++;
  if(qIdx>=questions.length){
    // 한 바퀴 다 돌면 같은 배경에서 다시 셔플 — 무제한 순회
    var setting=window._curSetting||'flight';
    var pool=[];
    if(setting==='flight'){
      SCENARIOS.forEach(function(q,i){pool.push({q:q,origIdx:'f'+i,opener:OPENERS[i]||null});});
    } else {
      (SCENARIO_SETS[setting]||[]).forEach(function(it,i){pool.push({q:it.q,origIdx:setting[0]+i,opener:it.o});});
    }
    for(var j=pool.length-1;j>0;j--){var k=Math.floor(Math.random()*(j+1));var tmp=pool[j];pool[j]=pool[k];pool[k]=tmp;}
    questions=pool;
    qIdx=0;
    chatHistory=[];
  }
  showQuestion();
}

function r(){return Math.floor(Math.random()*36)+50;}
