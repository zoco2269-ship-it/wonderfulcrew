<style>
html,body{overflow-x:hidden;max-width:100vw;-webkit-text-size-adjust:100%;text-size-adjust:100%;}@media(max-width:768px){html{font-size:17px!important;}html.is-chrome{font-size:20.5px!important;}}img,video,iframe{max-width:100%;height:auto;}@media(max-width:900px){.nav-links{display:flex!important;overflow-x:auto!important;gap:14px!important;padding:8px 12px!important;max-width:100%!important;white-space:nowrap!important;scrollbar-width:none;-ms-overflow-style:none;}.nav-links::-webkit-scrollbar{display:none;}.nav-links>a,.nav-links>.nav-dropdown,.nav-links .nav-dropdown>a{font-size:0.96rem!important;flex-shrink:0;line-height:normal!important;}.nav-dropdown-menu{display:none!important;}.nav-dropdown{position:relative!important;}.nav-dropdown.open>.nav-dropdown-menu{display:block!important;position:absolute!important;top:100%!important;left:0!important;background:rgba(26,35,64,0.97)!important;border:1px solid rgba(201,168,76,0.3)!important;border-radius:10px!important;box-shadow:0 10px 30px rgba(0,0,0,0.45)!important;padding:6px 0!important;margin-top:4px!important;min-width:180px!important;z-index:1002!important;}.nav-dropdown.open>.nav-dropdown-menu a{color:#fff!important;display:block!important;padding:9px 16px!important;font-size:0.88rem!important;line-height:1.3!important;}nav{flex-wrap:wrap!important;height:auto!important;padding:6px 4%!important;min-height:auto!important;}.nav-cta{white-space:nowrap!important;font-size:0.78rem!important;padding:6px 12px!important;letter-spacing:0!important;line-height:1.2!important;font-weight:600!important;}nav a[href*="login"],nav a[href*="my-progress"],nav a.wc-my-btn{white-space:nowrap!important;font-size:0.78rem!important;padding:6px 12px!important;letter-spacing:0!important;line-height:1.2!important;font-weight:600!important;}nav a[href="index-en.html"]:not(.nav-logo),nav a[href="index.html"]:not(.nav-logo){font-size:0.58rem!important;padding:3px 7px!important;white-space:nowrap!important;line-height:1.2!important;}.nav-logo{font-size:1.1rem!important;}}
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);}.nav-back:hover{color:var(--gold);}
.setup{padding:50px 20px;text-align:center;max-width:750px;margin:0 auto;}
.setup h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#fff;margin-bottom:8px;}.setup h1 em{font-style:normal;color:var(--gold);}
.setup p{color:rgba(255,255,255,0.6);font-size:0.88rem;line-height:1.7;margin-bottom:20px;}
.topic-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px;text-align:left;}
.topic-card{padding:18px 20px;background:rgba(255,255,255,0.04);border:2px solid rgba(201,168,76,0.15);border-radius:8px;cursor:pointer;transition:all 0.2s;}
.topic-card:hover,.topic-card.sel{border-color:var(--gold);background:rgba(201,168,76,0.1);}
.topic-card h3{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--gold);margin-bottom:4px;}
.topic-card p{font-size:0.78rem;color:rgba(255,255,255,0.6);line-height:1.5;}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:center;}
.toggle-row label{font-size:0.84rem;color:rgba(255,255,255,0.7);}
.toggle-row input{accent-color:var(--gold);width:18px;height:18px;}
.btn-start{padding:16px 40px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:28px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;}
.interview{display:none;flex:1;flex-direction:column;}.interview.active{display:flex;}
.q-banner{text-align:center;padding:14px 20px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.15);}
.q-banner .label{font-size:0.7rem;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;}
.q-banner .question{font-size:0.9rem;color:#fff;font-weight:500;line-height:1.5;margin-top:4px;}
.video-area{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;padding:24px;}
.card-frame{width:200px;aspect-ratio:9/16;border-radius:12px;overflow:hidden;position:relative;background:#000;border:2px solid rgba(255,255,255,0.08);flex-shrink:0;}
.card-frame.speaking{border-color:var(--gold);outline:3px solid rgba(201,168,76,0.4);outline-offset:2px;animation:goldGlow 1.5s infinite;}
@keyframes goldGlow{0%,100%{outline-color:rgba(201,168,76,0.2);}50%{outline-color:rgba(201,168,76,0.6);}}
.card-label{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));text-align:center;}
.card-label .name{font-family:'DM Serif Display',serif;font-size:0.85rem;color:#fff;}.card-label .role{font-size:0.68rem;color:var(--gold);}
.avatar-display{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#1A2340,#2A3455);}
.avatar-face .face{font-size:3.5rem;}.avatar-face .mouth{width:18px;height:7px;background:var(--gold);border-radius:0 0 9px 9px;margin:4px auto;opacity:0.7;}
.avatar-face .mouth.talking{animation:mm 0.3s infinite alternate;}
@keyframes mm{0%{height:3px;width:14px;}100%{height:10px;width:20px;}}
.cam-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:0.8rem;flex-direction:column;gap:6px;}
.waveform{height:28px;display:flex;align-items:center;justify-content:center;gap:3px;}
.waveform .bar{width:3px;background:var(--gold);border-radius:2px;animation:wv 0.5s ease-in-out infinite alternate;opacity:0.3;}
.waveform.active .bar{opacity:1;}
@keyframes wv{0%{height:4px;}100%{height:18px;}}
.transcript-bar{padding:10px 20px;background:rgba(255,255,255,0.04);font-size:0.84rem;color:rgba(255,255,255,0.6);min-height:36px;}
.feedback-panel{display:none;padding:18px 24px;background:rgba(0,0,0,0.3);max-height:200px;overflow-y:auto;font-size:0.86rem;color:rgba(255,255,255,0.8);line-height:1.7;}
.feedback-panel.active{display:block;}.feedback-panel b{color:var(--gold);}
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:18px;background:rgba(17,27,46,0.95);border-top:1px solid rgba(201,168,76,0.15);}
.ctrl-btn{padding:11px 20px;border:none;border-radius:22px;font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.ctrl-btn:disabled{opacity:0.35;cursor:not-allowed;}
.ctrl-btn.primary{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.ctrl-btn.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.ctrl-btn.danger{background:#E74C3C;color:#fff;}
@media(max-width:600px){
  .setup{padding:20px 14px;}
  .setup h1{font-size:1.55rem;}
  .setup p{font-size:0.95rem;margin-bottom:12px;}
  .topic-card{padding:14px 16px;}
  .topic-card h3{font-size:1rem;}
  .topic-card p{font-size:0.86rem;}
  .card-frame{width:160px;}
  .controls{flex-wrap:wrap;gap:8px;padding:10px 12px env(safe-area-inset-bottom,10px);}
  .ctrl-btn{padding:11px 16px!important;font-size:0.9rem!important;}
}

<!-- SETUP -->
<div class="setup" id="setup">
  <h1><em>디스커션 연습</em></h1>
  <p>다른 지원자(AI)와 실시간으로 토론하세요.<br>우선순위 판단, 팀워크, 서비스 마인드가 핵심입니다.</p>
  <div style="background:rgba(201,168,76,0.1);border-left:3px solid var(--gold);padding:12px 16px;margin:0 0 22px;font-size:0.86rem;color:rgba(255,255,255,0.88);line-height:1.7;text-align:left;border-radius:0 6px 6px 0;">
    <b style="color:var(--gold);">📌 다양한 기출 기반 디스커션 주제입니다.</b><br>
    외항사 디스커션에서 자주 등장하는 패턴을 모아두었습니다.
  </div>

  <div class="topic-grid" id="topic-grid"></div>

  <div class="toggle-row">
    <input type="checkbox" id="cam-toggle" checked>
    <label for="cam-toggle">카메라 ON</label>
  </div>

  <button class="btn-start" onclick="startDiscussion()">디스커션 시작</button>
</div>

<!-- INTERVIEW -->
<div class="interview" id="interview">
  <div class="q-banner"><div class="label">General Discussion</div><div class="question" id="q-text"></div><div class="question" id="q-desc" style="font-size:0.78rem;color:rgba(255,255,255,0.55);margin-top:8px;line-height:1.6;"></div></div>
  <div class="video-area">
    <div class="card-frame" id="card-b">
      <div class="avatar-display"><div class="avatar-face"><div class="face">👩🏻</div><div class="mouth" id="mouth-b"></div></div></div>
      <div class="card-label"><div class="name">Candidate B</div><div class="role">Discussion Partner</div></div>
    </div>
    <div class="card-frame" id="my-card">
      <video id="cam-video" autoplay muted playsinline style="display:none;transform:scaleX(-1);"></video>
      <div class="cam-placeholder" id="cam-ph"><div>📷</div><div>카메라</div></div>
      <div class="card-label"><div class="name">You</div><div class="role"><span id="rec-label">대기</span></div></div>
    </div>
  </div>
  <div class="waveform" id="waveform"><div class="bar" style="animation-delay:0s;"></div><div class="bar" style="animation-delay:0.1s;"></div><div class="bar" style="animation-delay:0.15s;"></div><div class="bar" style="animation-delay:0.2s;"></div><div class="bar" style="animation-delay:0.25s;"></div><div class="bar" style="animation-delay:0.3s;"></div></div>
  <div class="transcript-bar" id="transcript">음성 답변 대기 중...</div>
  <div class="feedback-panel" id="feedback"></div>
  <div class="controls">
    <button class="ctrl-btn primary" id="btn-answer" onclick="startAnswer()">🎙 내 의견 말하기</button>
    <button class="ctrl-btn danger" id="btn-stop" onclick="stopAnswer()" style="display:none;">⏹ 완료</button>
    <button class="ctrl-btn secondary" id="btn-end" onclick="endDiscussion()" style="display:none;">토론 종료 · 피드백 받기</button>
    <button class="ctrl-btn secondary" id="btn-next" disabled onclick="location.href='discussion-hub.html'">허브로 →</button>
  </div>
</div>

<script>
var TOPICS=[
  {title:'신규 노선 선정',desc:'항공사가 새 노선 1개를 개설합니다. 5개 후보 도시 중 하나를 선택하세요.',scenario:'Your airline will open one new route. 5 candidates: 1.Maldives (luxury leisure) 2.Lagos, Nigeria (growing Africa market) 3.Reykjavik, Iceland (unique destination) 4.Ho Chi Minh City (business hub) 5.Tbilisi, Georgia (emerging tourism). Discuss and agree on one. Consider profitability, brand fit, passenger demand.'},
  {title:'친환경 우선순위',desc:'항공사가 친환경 전략을 세웁니다. 4가지 중 무엇을 우선할까요?',scenario:'Your airline is launching a sustainability initiative. 4 options: 1.Switch to eco-friendly bio-fuel (expensive) 2.Remove all single-use plastic on board 3.Offset carbon for every passenger 4.Upgrade to fuel-efficient aircraft. Limited budget — pick 1 or 2 to prioritize.'},
  {title:'기내식 개편',desc:'기내식 메뉴 전체 개편. 6가지 고려 요소 중 무엇을 강조할까요?',scenario:'The airline is overhauling its in-flight menu. 6 considerations: 1.Premium gourmet (high cost) 2.Diverse cultural options (halal, kosher, vegan) 3.Local/regional specialties per route 4.Sustainability (less meat, plant-based) 5.Child-friendly options 6.Budget-conscious economy meals. Prioritize top 2-3 and explain.'},
  {title:'위기 PR 대응',desc:'SNS에서 승무원 갑질 영상이 바이럴. 즉시 대응 순서를 정하세요.',scenario:'A viral video shows a crew member reacting rudely to a passenger. Media is calling, social media is exploding. As cabin crew representatives, discuss response priorities: 1.Public apology statement 2.Internal investigation 3.Contact the passenger directly 4.Crew training review 5.CEO press conference 6.Social media silence until facts known. What order, and why?'},
  {title:'디지털 vs 대면 서비스',desc:'항공사가 셀프 체크인/키오스크 확대 vs 직원 대면 서비스 유지 결정.',scenario:'Your airline is deciding how much to automate. Options: 1.Full automation — kiosks + apps replace counter staff (cost cut, faster) 2.Hybrid — automation for standard, staff for premium only 3.Keep current full staff — premium image. Discuss trade-offs: cost, customer experience, brand image.'},
  {title:'VIP 프로그램 개편',desc:'로열티 프로그램 개편. 어떤 혜택을 추가/삭제할까요?',scenario:'Your airline is revamping its frequent flyer program. Proposals: 1.Free lounge access all tiers 2.Remove expiry on miles 3.Add lifestyle perks (hotel, dining partners) 4.Family pooling of miles 5.Instant upgrade chance per flight 6.Carbon offset with miles. Budget allows 2-3. Prioritize.'},
  {title:'팀 갈등 해결',desc:'장거리 비행 중 동료 승무원 사이 갈등 발생. 해결 순서는?',scenario:'Mid-flight, two crew members have a serious argument about task distribution. Passengers notice the tension. Discussion: 1.Chief purser intervenes immediately 2.Wait until after landing 3.Split their zones for remainder 4.Service priority over personal issues 5.Report to airline HR later 6.Mediate between them in galley. How would your team handle this?'},
  {title:'서비스 우선순위',desc:'만석 비행 중 6개 서비스 요청 동시 발생. 우선순위를 정하세요.',scenario:'On a full flight, 6 simultaneous requests hit your galley: 1.First class passenger wants champagne refill 2.Economy passenger feels nauseous 3.Parent needs baby formula heated 4.Elderly passenger needs help to lavatory 5.Passenger complains seat belt broken 6.Crew member is struggling with meal cart. Prioritize and explain reasoning.'},
  {title:'문화 다양성 대응',desc:'다국적 승객 8명, 각자 다른 요구사항. 팀으로 어떻게 대응할까요?',scenario:'Your flight has passengers with diverse needs: 1.Muslim family requesting halal + private prayer area 2.Hindu passenger with strict vegetarian needs 3.Orthodox Jewish passenger needs kosher unopened 4.Couple celebrating 50th anniversary 5.Unaccompanied minor (8 years old) 6.Elderly person with dementia traveling alone 7.Wheelchair user needing mobility help 8.Korean businessman feeling unwell. Divide attention as a team.'},
  {title:'공항 대기 위기',desc:'폭풍으로 5시간 지연. 탑승구에 500명 대기 중. 대응 순서?',scenario:'Due to heavy storm, your flight is delayed 5 hours. 500 passengers are waiting at the gate, frustrated and tired. Available resources: 200 meal vouchers, 50 hotel rooms, limited staff. Consider priorities: 1.Elderly/disabled/families with infants 2.Business class and loyalty members 3.Connecting passengers who will miss next flight 4.General economy 5.Crew rest regulations. Discuss fair allocation.'},
  {title:'런던 플라이트 밀 서비스 메뉴',desc:'런던 직항 비행 기내식 메뉴 구성. 비행 시간대별로 어떤 메뉴가 적절할까요?',scenario:'Your team needs to plan the in-flight meal menu for a London direct flight. Consider meal timings: 1.Morning departure (breakfast + lunch) 2.Afternoon departure (lunch + dinner) 3.Night departure (dinner + breakfast). For each time slot, discuss appropriate dishes, dietary variety (halal/vegan/kosher), portion size, and cultural preferences of London-bound passengers. Agree on signature items.'},
  {title:'새로운 데스티네이션 프로모션',desc:'항공사가 새 노선을 오픈합니다. 어떤 프로모션 이벤트로 알릴까요?',scenario:'Your airline is launching a brand new route. You need to create buzz and fill seats in the first 3 months. Discuss promotion event ideas: 1.Influencer trip giveaway 2.First-100-passengers upgrade 3.Pop-up event at destination 4.Social media contest 5.Partnership with local celebrity 6.Free stopover package. Which 2-3 combine best, and why?'},
  {title:'어린이 고객 메뉴',desc:'어린이 승객을 위한 기내식 메뉴 구성. 아이들이 좋아할 메뉴는?',scenario:'Your airline is designing a special kids meal program. Discuss what to include: 1.Universal favorites (pasta, pizza, chicken nuggets) 2.Healthy options (fruits, veggies) 3.Fun presentation (character shaped) 4.Snacks between meals 5.Drink options (juice, hot chocolate) 6.Special diet kids (allergies). Keep cost reasonable. Agree on menu.'},
  {title:'듀티프리 서울 아이템',desc:'인천 → 해외 비행에서 한국 특색 듀티프리 아이템 선정.',scenario:'You need to curate duty-free items that represent Seoul/Korea for international passengers flying out of Incheon. Categories to discuss: 1.K-beauty products (skincare, masks) 2.Korean snacks/food (honey butter chips, ginseng candy) 3.Premium ginseng/red ginseng products 4.Traditional crafts (handmade) 5.K-pop merchandise 6.Hanbok-inspired fashion items 7.Soju/Korean liquor. Pick top 4-5 signature items.'},
  {title:'파리→도하 Afternoon Tea',desc:'파리발 도하행 비행에서 제공할 애프터눈 티 메뉴 구성.',scenario:'You are planning the afternoon tea service for Paris-Doha flight (premium cabin). Consider French elegance + Middle Eastern touch. Discuss: 1.Sandwich selection (cucumber, smoked salmon, egg, Arabic flavors) 2.Scones (plain, raisin) with clotted cream & jam 3.Pastries (macarons, éclairs, baklava) 4.Tea selection (Earl Grey, Moroccan mint, Darjeeling) 5.Champagne pairing options. Balance French tradition and Qatari hospitality.'},
  {title:'바다에 추락 · 보트에 1명',desc:'비행기가 바다에 추락. 구명보트에 1명만 태울 수 있다. 누구?',scenario:'A plane has crashed into the ocean. Only ONE person can be taken on the limited life raft. 8 survivors: 1.A 10-year-old boy traveling alone 2.A pregnant woman 3.David Beckham (famous footballer) 4.A nurse 5.A professional model 6.A cabin crew member 7.A VIP business executive 8.A 70-year-old elderly passenger. Discuss who should be prioritized and justify your choice based on values — not utility alone.'},
  {title:'해외 거주 장단점',desc:'다른 나라에 살 때 좋은 점과 힘든 점. 승무원 지망생 관점에서.',scenario:'As future cabin crew who will live abroad (Dubai, Doha, Singapore), discuss both advantages and disadvantages of living in a foreign country: 1.Advantages — cultural exposure, career growth, savings, adventure 2.Disadvantages — homesickness, language barrier, family distance, cultural adjustment. Share personal views, then agree on how to handle the disadvantages.'},
  {title:'무인도 준비물',desc:'무인도에 갈 때 가져갈 5가지 물건. 생존과 삶의 질 중 무엇을 우선?',scenario:'Your group will be stranded on a deserted island for 1 month. You can bring 5 items TOTAL (not each — as a team). Options: knife, lighter, rope, first aid kit, water filter, tent, fishing gear, book, mirror, compass, mosquito net, flashlight, blanket, cooking pot, satellite phone. Discuss survival vs quality of life, agree on 5.'}
];
var selectedTopic=0;
var stream=null,recognition=null,fullText='',chatHistory=[],turnCount=0;

var tg=document.getElementById('topic-grid');
TOPICS.forEach(function(t,i){
  var d=document.createElement('div');d.className='topic-card'+(i===0?' sel':'');
  d.innerHTML='<h3>'+(i+1)+'. '+t.title+'</h3><p>'+t.desc+'</p>';
  d.onclick=function(){document.querySelectorAll('.topic-card').forEach(function(c){c.classList.remove('sel');});d.classList.add('sel');selectedTopic=i;};
  tg.appendChild(d);
});

window.addEventListener('beforeunload',function(){if('speechSynthesis' in window)window.speechSynthesis.cancel();if(stream)stream.getTracks().forEach(function(t){t.stop();});});

function startDiscussion(){
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');
  var t=TOPICS[selectedTopic];
  document.getElementById('q-text').textContent=t.title;
  var scen=t.scenario||'';
  var profiles=scen.split(/\s*\d+\./).slice(1).map(function(s){return s.trim();}).filter(Boolean);
  var descHtml=t.desc;
  if(profiles.length>=2){
    descHtml+='<br><br>'+profiles.map(function(p,i){return (i+1)+'. '+p;}).join('<br>');
  }
  document.getElementById('q-desc').innerHTML=descHtml;
  chatHistory=[];turnCount=0;

  if(document.getElementById('cam-toggle').checked){
    (async function(){var camOpts=[{video:{facingMode:{exact:'user'}}},{video:{facingMode:'user'}},{video:true}];for(var i=0;i<camOpts.length;i++){try{stream=await navigator.mediaDevices.getUserMedia(camOpts[i]);var v=document.getElementById('cam-video');v.srcObject=stream;v.style.display='block';document.getElementById('cam-ph').style.display='none';break;}catch(e){}}})();
  }
  var openers={
    0:"We're picking one new route from 5 cities. Which one sounds best to you?",
    1:"We have 4 sustainability options but limited budget. What should we prioritize?",
    2:"We're redesigning the in-flight menu. 6 things to consider — what's most important?",
    3:"We've got a PR crisis on our hands. What should we do first?",
    4:"Full automation, hybrid, or keep all staff? What's your view?",
    5:"We're changing the loyalty program. Which perks should we add?",
    6:"Two crew are fighting mid-flight. How should we handle it?",
    7:"6 service requests at once. Which do we handle first?",
    8:"8 passengers with very different needs — how do we split as a team?",
    9:"500 passengers stuck, 5-hour delay. Who gets what first?",
    10:"We're planning the London flight menu by time of day. Where should we start?",
    11:"New route launch — how do we promote it? Any ideas?",
    12:"Kids meal menu. What do kids actually like and eat?",
    13:"Duty-free items representing Seoul. Which ones feel most Korean?",
    14:"Paris to Doha afternoon tea. French or Middle Eastern flavors?",
    15:"Plane crashed, only one seat on the raft. Who goes?",
    16:"Living abroad as cabin crew — what's the best part, the hardest part?",
    17:"We can bring only 5 items to a deserted island. Where do we start?"
  };
  aiTurnB(openers[selectedTopic]||"So, what do you think we should do first?");
}

function aiTurnB(text){
  var card=document.getElementById('card-b');
  card.classList.add('speaking');
  var fb=document.getElementById('feedback');
  fb.innerHTML='<b style="color:var(--gold);">Candidate B:</b> '+text;fb.classList.add('active');
  gcSpeak(text,'en-GB','female',function(){card.classList.remove('speaking');});
}

function startAnswer(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
  fullText='';window._finalSeen={};window._finalList=[];
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-label').textContent='답변 중';
  document.getElementById('waveform').classList.add('active');
  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    fullText=window._finalList.join(' ');
    document.getElementById('transcript').textContent=(fullText+(interim?' '+interim:'')).trim();
  };
  recognition.onend=function(){if(fullText.trim())document.getElementById('transcript').textContent=fullText.trim();};
  recognition.start();
}

async function stopAnswer(){
  if(recognition)recognition.stop();
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-label').textContent='처리 중';
  document.getElementById('waveform').classList.remove('active');
  var ans=fullText.trim()||document.getElementById('transcript').textContent.trim();
  if(!ans){document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;return;}
  chatHistory.push({role:'user',content:ans});
  turnCount++;
  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:120,
      system:'You are a fellow candidate (not interviewer) in a cabin crew group discussion. Scenario: '+TOPICS[selectedTopic].scenario+'\n\nSpeaking style: short, casual, conversational. 1-2 sentences only, under 25 words. Use "I think", "maybe", "what about" style. Keep discussion going, don\'t conclude. English only. No asterisks.',
      messages:chatHistory
    })});
    var data=await res.json();
    var aiText=((data&&data.content&&data.content[0]&&data.content[0].text)||'I agree with that approach.')
      .replace(/\*\*/g,'')
      .replace(/\[END\]/gi,'')
      .replace(/\[[A-Za-z ]+\]\s*/g,'')
      .replace(/^(Candidate\s*[A-Z]\s*:|[A-Z]\s*:)\s*/i,'')
      .trim();
    chatHistory.push({role:'assistant',content:aiText});
    aiTurnB(aiText);
    document.getElementById('btn-answer').style.display='inline-flex';
    document.getElementById('btn-answer').disabled=false;
    document.getElementById('btn-end').style.display='inline-flex';
    document.getElementById('rec-label').textContent='대기';
  }catch(e){document.getElementById('feedback').innerHTML='오류. 다시 시도해주세요.';document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;}
}

async function endDiscussion(){
  if(recognition)try{recognition.stop();}catch(e){}
  if('speechSynthesis' in window)try{window.speechSynthesis.cancel();}catch(e){}
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-end').style.display='none';
  document.getElementById('rec-label').textContent='완료';
  var fb=document.getElementById('feedback');
  var userTurns=chatHistory.filter(function(m){return m.role==='user';}).length;
  if(userTurns===0){
    fb.innerHTML='<b style="color:#E74C3C;">본인 발언이 없어 피드백을 작성할 수 없습니다.</b>';
    document.getElementById('btn-next').disabled=false;
    return;
  }
  fb.innerHTML='<b style="color:var(--gold);">피드백을 작성하고 있어요...</b>';
  try{
    var convo=chatHistory.map(function(m){return (m.role==='user'?'You':'Partner')+': '+m.content;}).join('\n');
    var userAnswers=chatHistory.filter(function(m){return m.role==='user';}).map(function(m,i){return 'Turn '+(i+1)+': '+m.content;}).join('\n');
    var fbRes=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:600,
      system:'You are a cabin crew group discussion coach. Scenario: "'+TOPICS[selectedTopic].scenario+'"\n\nEvaluate ONLY what the candidate (You) said. Speech-to-text input — ignore grammar. Be encouraging but honest.\n\nFormat:\n\n# 점수: X/100\n\n# 잘한 점\n- (2개, 실제 본인 발언 짧게 인용)\n\n# 개선할 점\n- (1~2개)\n\n# 실전 팁\n- (1개)\n\nWrite in Korean. No markdown # symbols, use plain text headers.',
      messages:[{role:'user',content:'Full discussion:\n\n'+convo+'\n\nCandidate\'s own answers only:\n'+userAnswers}]
    })});
    var fbData=await fbRes.json();
    var fbText=((fbData&&fbData.content&&fbData.content[0]&&fbData.content[0].text)||'피드백 생성 실패').replace(/\*\*/g,'').replace(/^#+\s*/gm,'');
    fb.innerHTML='<pre style="white-space:pre-wrap;font-family:inherit;font-size:0.88rem;color:rgba(255,255,255,0.9);line-height:1.75;">'+fbText+'</pre>';
    document.getElementById('btn-next').disabled=false;
    try{if(typeof savePracticeRecord==='function') savePracticeRecord({stage:'discussion-general',question:TOPICS[selectedTopic].title,answer:userAnswers,feedback:fbText});}catch(e){}
  }catch(e){fb.innerHTML='피드백 생성 오류. 다시 시도해주세요.';}
}
</script>
