<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Shooting · Sentence Shooting — WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;text-decoration:none;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);text-decoration:none;}.nav-back:hover{color:var(--gold);}
.main{max-width:640px;margin:0 auto;padding:20px 20px 24px;text-align:center;}
.mode-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:16px;}
.mode-tab{padding:9px 22px;border:2px solid rgba(201,168,76,0.3);border-radius:24px;background:none;color:rgba(255,255,255,0.6);font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.mode-tab.active{border-color:var(--gold);background:rgba(201,168,76,0.15);color:var(--gold);}
.keyword-box{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:18px;padding:24px 20px;margin-bottom:18px;min-height:130px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.keyword{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,3.6vw,2.4rem);color:var(--gold);line-height:1.3;transition:opacity 0.3s;}
.sentence{font-family:'Noto Serif KR',serif;font-size:1.05rem;color:#fff;line-height:1.55;font-weight:300;max-width:500px;}
.timer{font-family:'DM Serif Display',serif;font-size:2.2rem;color:rgba(255,255,255,0.3);margin-bottom:4px;line-height:1;}
.timer.active{color:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.btn{padding:11px 26px;border:none;border-radius:24px;font-family:inherit;font-size:0.84rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,0.3);}
.btn-outline{background:none;color:#fff;border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-red{background:#E74C3C;color:#fff;}
.transcript{display:none;margin-top:20px;padding:16px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;font-size:0.9rem;color:rgba(255,255,255,0.7);text-align:left;min-height:50px;}
.transcript.visible{display:block;}
.tip-box{margin-top:24px;padding:16px 20px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:14px;text-align:left;font-size:0.84rem;color:rgba(255,255,255,0.6);line-height:1.7;}
.tip-box b{color:var(--gold);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-gate.js"></script>
<script src="js/free-trial.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="curriculum-qatar.html" class="nav-back">← 커리큘럼</a>
</nav>

<div class="main">
  <h1 style="font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--gold);margin-bottom:8px;">Word Shooting · Sentence Shooting</h1>
  <p style="color:rgba(255,255,255,0.5);font-size:0.88rem;margin-bottom:28px;">랜덤 키워드 또는 문장이 주어집니다. 즉석에서 영어로 발표하세요.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('word')">Word Shooting</button>
    <button class="mode-tab" onclick="setMode('sentence')">Sentence Shooting</button>
  </div>

  <div class="keyword-box" id="keyword-box">
    <div class="timer" id="timer">60</div>
    <div class="keyword" id="keyword">Start를 눌러 시작하세요</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-gold" id="btn-start" onclick="startRound()">Start</button>
    <button class="btn btn-red" id="btn-stop" style="display:none;" onclick="stopRound()">Stop</button>
    <button class="btn btn-outline" id="btn-next" style="display:none;" onclick="nextKeyword()">Next →</button>
  </div>

  <div class="transcript" id="transcript"></div>
  <div id="example-area" style="display:none;margin-top:14px;text-align:center;"></div>

  <div class="tip-box">
    <b>TIP:</b> 완벽한 문장이 아니어도 괜찮습니다. 키워드를 보자마자 바로 말을 시작하는 연습이 핵심입니다. 자신감 있는 태도와 자연스러운 미소가 중요합니다.
  </div>
</div>

<script>
var WORDS=['Family','Teamwork','Culture','Travel','Safety','Leadership','Service','Communication','Diversity','Happiness','Challenge','Confidence','Dream','Respect','Hospitality','Passion','Patience','Flexibility','Smile','Adventure','Home','Friendship','Success','Trust','Kindness','Experience','Goal','Morning','Celebration','Music','Food','Technology','Health','Nature','Fashion','Childhood','Airport','Sunset','Coffee','Book'];

var SENTENCES=['Tell me about a time you helped someone.','Describe your perfect day off.','What does teamwork mean to you?','How would you handle a rude passenger?','Why is customer service important?','What makes you unique?','Describe a challenge you overcame.','What is your greatest strength?','How do you stay calm under pressure?','What does diversity mean in the workplace?','Tell me about your best travel experience.','How would you welcome a nervous first-time flyer?','What does professionalism look like to you?','Describe a situation where you went above and beyond.','What would you do if you disagreed with a colleague?'];

var SENTENCE_EXAMPLES={
  'Tell me about a time you helped someone.':"Last month an elderly customer at the café was struggling with the menu. I sat with her for a few minutes and recommended something she'd like. She came back the next day and asked for me by name.",
  'Describe your perfect day off.':"My perfect day off starts with a slow morning coffee and a long walk. In the evening I love cooking a simple dinner for close friends — nothing fancy, just being together.",
  'What does teamwork mean to you?':"For me teamwork is knowing your role but also covering for someone when they need it. It's not about being equal, it's about the customer experience being smooth.",
  'How would you handle a rude passenger?':"I'd stay calm and listen first — most rude behavior comes from stress. I'd acknowledge their feelings, offer what I can do right now, and check in again later in the flight.",
  'Why is customer service important?':"Because it's the part people actually remember. The food, the seat, the route — all that becomes background. What stays with them is how they were treated.",
  'What makes you unique?':"I notice small things — when someone is quiet, when something is missing on a tray. It's not a skill people see immediately, but it really shows in service.",
  'Describe a challenge you overcame.':"In my first month at a hotel, I once handled a complaint in three languages I wasn't fluent in. I survived by listening more than speaking, and the guest left smiling.",
  'What is your greatest strength?':"Staying calm when things go wrong. On busy shifts or during delays, I actually think more clearly under pressure, which is exactly when a team needs someone steady.",
  'How do you stay calm under pressure?':"I focus on the next single thing I need to do, instead of the whole picture. Then I breathe slowly through my nose — it sounds simple but it really resets my voice and posture.",
  'What does diversity mean in the workplace?':"Diversity means we bring different things to the team, and the best service comes from combining them. A passenger from anywhere should feel like someone on the crew understands them.",
  'Tell me about your best travel experience.':"I once stayed with a host family in Vietnam who didn't speak English. We communicated with food and gestures for a week. That trip taught me how much you can connect without words.",
  'How would you welcome a nervous first-time flyer?':"I'd notice them at boarding, give a warm smile, and mention what to expect during takeoff. Just being acknowledged calms most first-time nerves.",
  'What does professionalism look like to you?':"It's looking the same in the first hour as you do in the last hour of a long shift. Same tone, same posture, same warmth. Professionalism is consistency.",
  'Describe a situation where you went above and beyond.':"A regular customer mentioned her grandmother's birthday, so I wrote a small handwritten card and put it in her takeaway bag. She brought her grandmother in the next week.",
  'What would you do if you disagreed with a colleague?':"Not in front of customers. After the rush, I'd ask them privately how they saw the situation. Most disagreements come from missing context, not from real conflict."
};

var mode='word';
var timerInterval=null;
var recognition=null;
var timeLeft=60;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('active');});
  event.target.classList.add('active');
  document.getElementById('keyword').textContent='Start를 눌러 시작하세요';
  document.getElementById('timer').textContent='60';
  document.getElementById('timer').classList.remove('active');
}

function pickRandom(){
  var pool=mode==='word'?WORDS:SENTENCES;
  return pool[Math.floor(Math.random()*pool.length)];
}

function startRound(){
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('btn-next').style.display='inline-flex';
  document.getElementById('transcript').classList.add('visible');
  document.getElementById('transcript').textContent='';

  nextKeyword();

  timeLeft=60;
  document.getElementById('timer').classList.add('active');
  timerInterval=setInterval(function(){
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0){stopRound();}
  },1000);

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
    recognition.onresult=function(ev){
      var text='';
      for(var r=0;r<ev.results.length;r++){text+=ev.results[r][0].transcript+' ';}
      document.getElementById('transcript').textContent=text.trim();
    };
    // 음성 인식이 자동 종료될 경우 (긴 침묵 등) Stop 누르기 전까지 자동 재시작
    recognition.onend=function(){
      if(document.getElementById('btn-stop').style.display!=='none'){
        try{recognition.start();}catch(e){}
      }
    };
    recognition.onerror=function(e){
      console.warn('[shooting] recognition error',e.error);
    };
    recognition.start();
  } else {
    document.getElementById('transcript').textContent='Chrome 브라우저에서 사용해 주세요.';
  }
}

function stopRound(){
  if(timerInterval)clearInterval(timerInterval);
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-start').style.display='inline-flex';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('timer').classList.remove('active');
  document.getElementById('btn-start').textContent='다시 시작';
}

function nextKeyword(){
  var kw=document.getElementById('keyword');
  kw.style.opacity='0';
  setTimeout(function(){
    var picked=pickRandom();
    kw.textContent=picked;
    kw.style.opacity='1';
    renderExample(picked);
  },200);
}

function renderExample(picked){
  var area=document.getElementById('example-area');
  if(!area)return;
  if(mode!=='sentence'||!SENTENCE_EXAMPLES[picked]){
    area.style.display='none';
    return;
  }
  area.style.display='block';
  area.innerHTML='<button onclick="toggleExample()" style="padding:8px 18px;background:rgba(201,168,76,0.15);border:1px solid var(--gold);color:var(--gold);border-radius:18px;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;">💡 예시 답변 보기</button>'+
    '<div id="example-text" style="display:none;margin-top:10px;padding:14px 18px;background:rgba(255,255,255,0.05);border-left:2px solid var(--gold);font-size:0.86rem;line-height:1.7;color:rgba(255,255,255,0.85);text-align:left;font-family:inherit;">'+SENTENCE_EXAMPLES[picked]+'</div>';
}
function toggleExample(){
  var t=document.getElementById('example-text');
  if(!t)return;
  t.style.display=t.style.display==='none'?'block':'none';
}
</script>
</body>
</html>
