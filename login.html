<!DOCTYPE html>
<html lang="ko">
<head>
<script>(function(){var u=navigator.userAgent;if(u.indexOf("Chrome")>-1&&u.indexOf("Edg/")<0&&u.indexOf("OPR/")<0&&u.indexOf("SamsungBrowser")<0)document.documentElement.classList.add("is-chrome");document.addEventListener("click",function(e){if(window.innerWidth>900)return;var a=e.target.closest&&e.target.closest(".nav-dropdown > a");if(!a){document.querySelectorAll(".nav-dropdown.open").forEach(function(d){d.classList.remove("open");});return;}var p=a.parentElement;if(!p.classList.contains("open")){e.preventDefault();document.querySelectorAll(".nav-dropdown.open").forEach(function(d){if(d!==p)d.classList.remove("open");});p.classList.add("open");}});})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인   WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
html,body{overflow-x:hidden;max-width:100vw;-webkit-text-size-adjust:100%;text-size-adjust:100%;}@media(max-width:768px){html{font-size:17px!important;}html.is-chrome{font-size:20.5px!important;}}img,video,iframe{max-width:100%;height:auto;}@media(max-width:900px){.nav-links{display:flex!important;overflow-x:auto!important;gap:14px!important;padding:8px 12px!important;max-width:100%!important;white-space:nowrap!important;scrollbar-width:none;-ms-overflow-style:none;}.nav-links::-webkit-scrollbar{display:none;}.nav-links>a,.nav-links>.nav-dropdown,.nav-links .nav-dropdown>a{font-size:0.96rem!important;flex-shrink:0;line-height:normal!important;}.nav-dropdown-menu{display:none!important;}.nav-dropdown{position:relative!important;}.nav-dropdown.open>.nav-dropdown-menu{display:block!important;position:absolute!important;top:100%!important;left:0!important;background:rgba(26,35,64,0.97)!important;border:1px solid rgba(201,168,76,0.3)!important;border-radius:10px!important;box-shadow:0 10px 30px rgba(0,0,0,0.45)!important;padding:6px 0!important;margin-top:4px!important;min-width:180px!important;z-index:1002!important;}.nav-dropdown.open>.nav-dropdown-menu a{color:#fff!important;display:block!important;padding:9px 16px!important;font-size:0.88rem!important;line-height:1.3!important;}nav{flex-wrap:wrap!important;height:auto!important;padding:6px 4%!important;min-height:auto!important;}.nav-cta{white-space:nowrap!important;font-size:0.78rem!important;padding:6px 12px!important;letter-spacing:0!important;line-height:1.2!important;font-weight:600!important;}nav a[href*="login"],nav a[href*="my-progress"],nav a.wc-my-btn{white-space:nowrap!important;font-size:0.55rem!important;padding:3px 7px!important;letter-spacing:0!important;line-height:1.2!important;font-weight:600!important;}nav a[href*="index-en"],nav a[href*="index.html"]:not(.nav-logo){font-size:0.58rem!important;padding:3px 7px!important;white-space:nowrap!important;line-height:1.2!important;}.nav-logo{font-size:1.1rem!important;}}
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column;}a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:center;padding:0 5%;height:72px;border-bottom:1px solid rgba(201,168,76,0.2);}
.nav-logo{font-family:"DM Serif Display",serif;font-size:1.5rem;font-weight:400;color:var(--navy);}.nav-logo span{color:var(--gold);}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{background:#fff;border:1px solid var(--gold-pale);padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.06);}
.login-card h2{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--navy);margin-bottom:8px;}
.login-card p{font-size:0.88rem;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1px solid var(--gold-pale);border-radius:8px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text-dark);cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.login-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.login-btn svg{width:22px;height:22px;flex-shrink:0;}
.login-divider{display:flex;align-items:center;gap:14px;margin:24px 0;font-size:0.78rem;color:var(--text-muted);}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gold-pale);}
.login-sub{font-size:0.8rem;color:var(--text-muted);margin-top:20px;line-height:1.6;}
.login-sub a{color:var(--gold);font-weight:600;}
.user-info{display:none;text-align:center;}
.user-info .avatar{width:64px;height:64px;border-radius:50%;background:var(--gold-pale);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;}
.user-info .avatar img{width:100%;height:100%;object-fit:cover;}
.user-info .name{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:4px;}
.user-info .email{font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;}
.user-info .btn-outline{display:inline-block;padding:10px 24px;border:1.5px solid var(--navy);border-radius:22px;font-size:0.84rem;font-weight:600;color:var(--navy);cursor:pointer;background:#fff;}
</style>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/push-subscribe.js"></script>
</head>
<body>
<nav><a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a></nav>
<div class="login-wrap">
  <div class="login-card">
    <!-- 로그인 폼 -->
    <div id="login-form">
      <h2>Welcome Back</h2>
      <p>WonderfulCrew 계정으로 로그인하세요.</p>

      <button class="login-btn" onclick="signInWith('google')">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Google 계정으로 로그인
      </button>

      <button class="login-btn" disabled style="background:#FEE500;border-color:#FEE500;color:#3C1E1E;opacity:0.5;cursor:not-allowed;">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#3C1E1E" d="M12 3C6.48 3 2 6.36 2 10.44c0 2.6 1.72 4.88 4.33 6.2l-1.1 4.07c-.08.3.26.54.52.37l4.84-3.2c.46.05.93.08 1.41.08 5.52 0 10-3.36 10-7.52S17.52 3 12 3z"/></svg>
        카카오 로그인 (추후 업데이트)
      </button>

      <button class="login-btn" disabled style="background:#03C75A;border-color:#03C75A;color:#fff;opacity:0.5;cursor:not-allowed;">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#fff" d="M16.27 12.97L7.44 3H3v18h4.73V11.03L16.56 21H21V3h-4.73z"/></svg>
        네이버 로그인 (추후 업데이트)
      </button>


      <div class="login-sub">
        <a href="index.html" style="color:var(--text-muted);">← 홈으로 돌아가기</a>
      </div>
    </div>

    <!-- 로그인 후 -->
    <div class="user-info" id="user-info">
      <div class="avatar" id="user-avatar">👤</div>
      <div class="name" id="user-name">사용자</div>
      <div class="email" id="user-email">email@example.com</div>
      <button class="btn-outline" onclick="signOut()">로그아웃</button>
      <div style="margin-top:8px;"><a href="index.html" style="color:var(--text-muted);font-size:0.82rem;">← 홈으로</a></div>
    </div>
  </div>
</div>

<script>
var sb = null;
var _sbReady = false;

async function ensureSupabase(){
  if(sb) return sb;
  // SDK 로드 대기
  for(var i=0;i<30;i++){
    if(typeof window.supabase!=='undefined' && window.supabase.createClient) break;
    await new Promise(function(r){setTimeout(r,200);});
  }
  if(typeof window.supabase==='undefined' || !window.supabase.createClient){
    console.error('Supabase SDK failed to load');
    return null;
  }
  try {
    var res = await fetch('/api/supabase-config');
    if(!res.ok) throw new Error('API returned ' + res.status);
    var cfg = await res.json();
    if (cfg.url && cfg.anonKey) {
      sb = window.supabase.createClient(cfg.url, cfg.anonKey, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      });
      _sbReady = true;
      console.log('Supabase connected:', cfg.url);
      return sb;
    } else {
      console.error('Supabase config empty:', cfg);
    }
  } catch(e) { console.error('Supabase init error:', e); }
  return null;
}

// 페이지 로드 시 초기화 + 세션 체크
ensureSupabase().then(function(client){
  if(client) checkUser();
});

async function checkUser() {
  var client = await ensureSupabase();
  if (!client) return;
  try {
    // URL에 토큰이 있으면 세션 복원 (Google OAuth redirect 후)
    var hash = window.location.hash;
    if(hash && hash.indexOf('access_token') > -1){
      // Supabase가 자동으로 hash에서 세션 복원하도록 잠시 대기
      await new Promise(function(r){setTimeout(r,500);});
    }
    var { data } = await client.auth.getSession();
    if (data && data.session && data.session.user) {
      showUser(data.session.user);
    }
  } catch(e) { console.error('checkUser error:', e); }
}

function showUser(user) {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('user-info').style.display = 'block';
  document.getElementById('user-name').textContent = user.user_metadata?.full_name || user.email?.split('@')[0] || '사용자';
  document.getElementById('user-email').textContent = user.email || '';
  if (user.user_metadata?.avatar_url) {
    document.getElementById('user-avatar').innerHTML = '<img src="' + user.user_metadata.avatar_url + '">';
  }
  localStorage.setItem('wc_user', JSON.stringify({ id: user.id, email: user.email, name: user.user_metadata?.full_name }));

  // 푸시 알림 → 프로필/커리큘럼 흐름
  setTimeout(function() {
    if (typeof wcPromptPush === 'function') wcPromptPush();
    // 푸시 팝업 닫힌 후 자동 이동 (3초 대기)
    setTimeout(function() {
      var levelDone = localStorage.getItem('wc_level_result');
      if (!levelDone) {
        location.href = 'leveltest.html';
      } else {
        location.href = 'curriculum.html';
      }
    }, 3000);
  }, 1500);
}

async function signInWith(provider) {
  var client = await ensureSupabase();
  if (!client) {
    alert('서버에 연결할 수 없습니다. 인터넷 연결을 확인하고 다시 시도해주세요.');
    return;
  }
  if (provider === 'kakao' || provider === 'naver') {
    alert(provider + ' 로그인은 추후 업데이트 예정입니다.\n우선 Google 로그인을 사용해주세요.');
    return;
  }
  try {
    var { error } = await sb.auth.signInWithOAuth({
      provider: provider,
      options: {
        redirectTo: window.location.origin + '/login.html',
        queryParams: { prompt: 'select_account' }
      }
    });
    if (error) alert('로그인 실패: ' + error.message);
  } catch(e) { alert('로그인 오류: ' + e.message); }
}

function signInWithEmail() {
  var email = prompt('이메일 주소를 입력하세요:');
  if (!email) return;
  if (!sb) {
    alert('서버 연결 중입니다. 잠시 후 다시 시도해주세요.');
    return;
  }
  sb.auth.signInWithOtp({ email: email }).then(function(res) {
    if (res.error) alert('오류: ' + res.error.message);
    else alert('매직 링크가 ' + email + '로 발송되었습니다. 이메일을 확인해주세요!');
  });
}

async function signOut() {
  if (sb) await sb.auth.signOut();
  localStorage.removeItem('wc_user');
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('user-info').style.display = 'none';
}

checkUser();
</script>
</body>
</html>
