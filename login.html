<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column;}a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:center;padding:0 5%;height:72px;border-bottom:1px solid rgba(201,168,76,0.2);}
.nav-logo{font-family:"DM Serif Display",serif;font-size:1.5rem;font-weight:400;color:var(--navy);}.nav-logo span{color:var(--gold);}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{background:#fff;border:1px solid var(--gold-pale);padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.06);}
.login-card h2{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--navy);margin-bottom:8px;}
.login-card p{font-size:0.88rem;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1px solid var(--gold-pale);border-radius:8px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text-dark);cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.login-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.login-btn img,.login-btn svg{width:22px;height:22px;}
.login-divider{display:flex;align-items:center;gap:14px;margin:24px 0;font-size:0.78rem;color:var(--text-muted);}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gold-pale);}
.login-sub{font-size:0.8rem;color:var(--text-muted);margin-top:20px;line-height:1.6;}
.login-sub a{color:var(--gold);font-weight:600;}
</style>
</head>
<body>
<nav><a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a></nav>
<div class="login-wrap">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>WonderfulCrew 계정으로 로그인하세요.</p>

    <button class="login-btn" onclick="alert('구글 로그인 준비 중입니다.')">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Google 계정으로 로그인
    </button>

    <button class="login-btn" onclick="alert('카카오 로그인 준비 중입니다.')" style="background:#FEE500;border-color:#FEE500;color:#3C1E1E;">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#3C1E1E" d="M12 3C6.48 3 2 6.36 2 10.44c0 2.6 1.72 4.88 4.33 6.2l-1.1 4.07c-.08.3.26.54.52.37l4.84-3.2c.46.05.93.08 1.41.08 5.52 0 10-3.36 10-7.52S17.52 3 12 3z"/></svg>
      카카오 계정으로 로그인
    </button>

    <button class="login-btn" onclick="alert('네이버 로그인 준비 중입니다.')" style="background:#03C75A;border-color:#03C75A;color:#fff;">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#fff" d="M16.27 12.97L7.44 3H3v18h4.73V11.03L16.56 21H21V3h-4.73z"/></svg>
      네이버 계정으로 로그인
    </button>

    <div class="login-divider">또는</div>

    <button class="login-btn" onclick="alert('이메일 로그인 준비 중입니다.')">
      이메일로 로그인
    </button>

    <div class="login-sub">
      아직 계정이 없으신가요? <a href="#">회원가입</a><br>
      <a href="index.html" style="color:var(--text-muted);">← 홈으로 돌아가기</a>
    </div>
  </div>
</div>
</body>
</html>
