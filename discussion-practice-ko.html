<script>
function fullCleanup(){
  // 모든 오디오/마이크/카메라 자원 강제 정리
  try{if(typeof roundEnding!=='undefined')roundEnding=true;}catch(e){}
  try{if(typeof userTurnActive!=='undefined')userTurnActive=false;}catch(e){}
  if('speechSynthesis' in window)try{window.speechSynthesis.cancel();}catch(e){}
  // Web Audio (디스커션 전용 TTS)
  try{if(typeof _discSource!=='undefined'&&_discSource){_discSource.onended=null;_discSource.stop();_discSource.disconnect();_discSource=null;}}catch(e){}
  try{if(typeof _discCtx!=='undefined'&&_discCtx){_discCtx.close();_discCtx=null;}}catch(e){}
  // 음성 인식
  try{if(typeof recognition!=='undefined'&&recognition){recognition.onend=null;recognition.onresult=null;recognition.stop();recognition=null;}}catch(e){}
  // 카메라/마이크 stream
  try{if(typeof stream!=='undefined'&&stream){stream.getTracks().forEach(function(t){try{t.stop();}catch(e){}});stream=null;}}catch(e){}
  // <video> 요소 srcObject 해제
  try{var v=document.getElementById('cam-video');if(v){v.pause();v.srcObject=null;}}catch(e){}
}

function goBack(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    fullCleanup();
    interview.classList.remove('active');
    document.getElementById('setup').style.display='block';
  } else {
    fullCleanup();
    history.back();
  }
}
window.addEventListener('popstate',function(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){goBack();}
  else {fullCleanup();}
});
window.addEventListener('pagehide',fullCleanup);
</script>

<script>
// 국내 항공사 토론면접 자유 토론 주제
var TOPICS_FREE=[
  "승무원에게 가장 중요한 자질 한 가지를 꼽는다면 무엇이고, 그 이유는?",
  "비행기가 2시간 지연되어 승객들이 불만을 표현하고 있습니다. 어떻게 대처하겠습니까?",
  "팀원과 의견이 다를 때, 어떻게 조율하겠습니까?",
  "좋은 서비스를 받았던 경험을 이야기해 주세요. 그 서비스가 좋았던 이유는 무엇인가요?",
  "첫인상이 중요하다고 생각하십니까? 그 이유는?",
  "스트레스를 받을 때 어떻게 관리하십니까?",
  "고객이 무리한 요청을 할 때 어떻게 대응하겠습니까?",
  "여행지에서 겪었던 인상 깊은 문화 차이가 있다면 이야기해 주세요.",
  "팀에서 자신의 역할은 주로 어떤 편입니까? 리더? 조율자? 실행자?",
  "동료 승무원이 실수를 했을 때, 어떻게 행동하겠습니까?",
  "본인이 생각하는 좋은 서비스란 무엇인가요?",
  "기내에서 규정과 고객 요청이 충돌할 때 어떻게 대응하시겠습니까?",
  "고객 컴플레인이 들어왔을 때 가장 먼저 해야 할 일은 무엇이라고 생각하십니까?",
  "본인의 강점이 승무원 업무에 어떻게 도움이 될 거라고 생각하십니까?",
  "왜 우리 항공사를 선택하셨습니까?",
  "승무원으로서 가장 보람을 느낄 순간은 언제일 거라고 예상하시나요?",
  "장시간 비행 중 동료가 갑자기 컨디션 난조를 호소합니다. 어떻게 대처하시겠습니까?",
  "외국어를 잘 못하는 승객과 어떻게 의사소통하시겠습니까?"
];
var TOPICS_DEBATE=[]; // 찬반형은 사용 안 함 (호환성 유지용 빈 배열)

// 가상 동료 지원자 페르소나
var PERSONA_B={name:'지원자 B',pitch:1.0,style:'신중하고 데이터 중심. 상대 의견을 인용하며 논리적으로 연결. 경청 태도 모범.',noVoice:false,gender:'female'};

var topics=[];
var roundIdx=0;
var totalRounds=5;
var stream=null;
var recognition=null;
var fullText='';
var dialogue=[]; // [{speaker:'B'|'A'|'C', text:'...'}]
var roundEnding=false;
var userTurnActive=false; // 본인 발언 중일 때만 true. AI 발언 중 음성인식 자동 재시작 방지

// 발언 순서: B 오프닝(0) → You(1) → C(2) → B(3) → You(4) → C 마무리(5) → 종료(6)
var TURN_SEQUENCE=['B','A','C','B','A','C'];
var turnIndex=0;

// 디스커션 진입 시점의 referrer 기억 → 피드백 후 "커리큘럼으로" 버튼이 원래 항공사 페이지로 돌아가도록
var BACK_URL=(function(){
  try{
    var ref=document.referrer||'';
    if(ref){
      var u=new URL(ref);
      if(u.origin===location.origin){
        var name=u.pathname.split('/').pop();
        if(/^curriculum-[a-z0-9-]+\.html$/i.test(name))return name;
      }
    }
  }catch(e){}
  return 'curriculum.html';
})();

function startDiscussion(){
  totalRounds=1;
  var pool=[];
  TOPICS_DEBATE.forEach(function(t){pool.push({kind:'debate',text:t.t,a:t.a,b:t.b});});
  TOPICS_FREE.forEach(function(t){pool.push({kind:'topic',text:t});});
  pool.sort(function(){return Math.random()-0.5;});
  topics=pool.slice(0,1);
  roundIdx=0;
  document.getElementById('round-total').textContent='1';
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');
  history.pushState({discussion:true},'','');
  startCamera();
  showRound();
}

function startCamera(){
  (async function(){
    try{
      // 모바일 SR 호환: audio 제거 → SR 이 마이크 단독 점유
      var tempStream=await navigator.mediaDevices.getUserMedia({video:true});
      tempStream.getTracks().forEach(function(t){t.stop();});
      var devices=await navigator.mediaDevices.enumerateDevices();
      var videoDevices=devices.filter(function(d){return d.kind==='videoinput';});
      var selectedId=null;
      var frontKeywords=/front|전면|내장|integrated|webcam|facetime|camera hd|built-in/i;
      for(var i=0;i<videoDevices.length;i++){
        if(frontKeywords.test(videoDevices[i].label)){selectedId=videoDevices[i].deviceId;break;}
      }
      if(!selectedId&&videoDevices.length>0)selectedId=videoDevices[0].deviceId;
      var constraints=selectedId?{video:{deviceId:{exact:selectedId}}}:{video:true};
      stream=await navigator.mediaDevices.getUserMedia(constraints);
      var v=document.getElementById('cam-video');
      v.srcObject=stream;v.style.display='block';
      document.getElementById('me-placeholder').style.display='none';
    }catch(e){}
  })();
}

async function showRound(){
  roundEnding=false;
  var t=topics[roundIdx];
  document.getElementById('round-idx').textContent=roundIdx+1;
  document.getElementById('topic-text').textContent=t.text;
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-feedback').style.display='none';
  document.getElementById('feedback').classList.remove('active');
  document.getElementById('waveform').classList.remove('active');
  var log=document.getElementById('log');
  log.innerHTML='<div class="turn"><div class="speaker">진행자</div>이번 주제입니다. <b style="color:var(--gold-light);">"'+t.text+'"</b>'+(t.kind==='debate'?'<br>찬성 포지션: '+t.a+'<br>반대 포지션: '+t.b:'')+'</div>';
  fullText='';
  dialogue=[];
  turnIndex=0;

  // 1) 지원자 B가 먼저 토론을 엶
  document.getElementById('transcript').textContent='지원자 B가 토론을 시작합니다...';
  await aiPeerSpeak(PERSONA_B,'panel-b','open');
  turnIndex=1;
  // 2) 본인(You) 차례
  document.getElementById('transcript').textContent='이제 본인 차례입니다. 의견을 말씀해 주세요.';
  startMyTurn();
}

function startMyTurn(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('transcript').textContent='Chrome에서 사용해 주세요.';return;}
  recognition=new SR();recognition.lang='ko-KR';recognition.interimResults=true;recognition.continuous=true;
  fullText='';window._finalSeen={};window._finalList=[];
  userTurnActive=true;
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-label').textContent='답변 중';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('panel-me').classList.add('speaking');

  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    fullText=window._finalList.join(' ');
    document.getElementById('transcript').textContent=(fullText+(interim?' '+interim:'')).trim();
  };
  recognition.onend=function(){
    if(roundEnding)return;
    // 본인 발언 중일 때만 자동 재시작 (AI 발언 중에는 마이크/오디오 충돌 방지를 위해 재시작 안 함)
    if(!userTurnActive)return;
    // 1500ms 지연 — 마이크 아이콘 깜빡임 방지
    setTimeout(function(){
      if(roundEnding||!userTurnActive)return;
      try{recognition.start();}catch(e){}
    },400);
  };
  recognition.start();
}

function stopMyTurn(){
  userTurnActive=false; // 자동 재시작 차단
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-label').textContent='대기';
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('panel-me').classList.remove('speaking');
}

async function processMyTurn(){
  stopMyTurn();
  var ans=fullText.trim();
  if(!ans){startMyTurn();return;}
  appendLog('user','You (지원자 A)',ans);
  dialogue.push({speaker:'A',text:ans});

  if(turnIndex===1){
    // 본인 1차 발언 후 → B 응답(2) → 본인 2차 차례(3)
    turnIndex=2;
    await aiPeerSpeak(PERSONA_B,'panel-b','middle');
    turnIndex=3;
    document.getElementById('transcript').textContent='이어서 발언해 주세요.';
    document.getElementById('btn-next').style.display='inline-flex';
    document.getElementById('btn-feedback').style.display='inline-flex';
    startMyTurn();
  }else if(turnIndex===3){
    // 본인 2차 발언 후 → B 마무리(4) → 종료
    turnIndex=4;
    await aiPeerSpeak(PERSONA_B,'panel-b','close');
    turnIndex=5;
    document.getElementById('transcript').textContent='디스커션이 마무리되었습니다. 아래 "토론 종료 · 피드백 받기" 버튼을 눌러주세요.';
    document.getElementById('btn-stop').style.display='none';
    document.getElementById('btn-next').style.display='inline-flex';
    document.getElementById('btn-feedback').style.display='inline-flex';
  }else{
    startMyTurn();
  }
}

// 새로운 주제로 다시 시작 (TOPICS_DEBATE + TOPICS_FREE 풀에서 랜덤 1개)
function newQuestion(){
  // 진행 중인 음성/오디오 정리
  if(_discSource){try{_discSource.onended=null;_discSource.stop();}catch(e){}_discSource=null;}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  userTurnActive=false;
  if(recognition)try{recognition.stop();}catch(e){}

  var pool=[];
  TOPICS_DEBATE.forEach(function(t){pool.push({kind:'debate',text:t.t,a:t.a,b:t.b});});
  TOPICS_FREE.forEach(function(t){pool.push({kind:'topic',text:t});});
  // 현재 주제 제외
  var current=topics[roundIdx]&&topics[roundIdx].text;
  pool=pool.filter(function(t){return t.text!==current;});
  pool.sort(function(){return Math.random()-0.5;});
  topics=[pool[0]];
  roundIdx=0;
  showRound();
}

async function aiPeerSpeak(persona,panelId,phase){
  var topic=topics[roundIdx];
  var panel=document.getElementById(panelId);
  panel.classList.add('speaking');
  document.getElementById('transcript').textContent=persona.name+'이(가) 말하고 있어요...';
  try{
    // phase별 규칙 차별화
    var phaseRule='';
    if(phase==='open'){
      phaseRule='- **첫 발언입니다.** 주제에 대한 본인 의견을 1~2문장으로 짧게 제시하세요. 다른 지원자 인용·언급 금지 (아직 아무도 발언 전).\n';
    }else if(phase==='close'){
      phaseRule='- **마지막 발언(마무리)입니다.** 지금까지 나온 의견에 짧게 공감한 뒤 본인 결론을 한 문장으로 정리하세요.\n';
    }else{
      phaseRule='- 직전 발언자 의견을 한 마디로 짧게 인정한 뒤 본인 입장 제시 ("좋은 의견입니다. 저는…")\n';
    }

    var sys='당신은 한국 국내 항공사 그룹 디스커션의 동료 지원자 '+persona.name+'입니다.\n'+
      '스타일: '+persona.style+'\n'+
      '주제: "'+topic.text+'"'+(topic.kind==='debate'?' (찬반 토론: '+topic.a+' / '+topic.b+')':'')+'\n\n'+
      '규칙:\n'+
      phaseRule+
      '- **반드시 1~2문장, 80자 이내로 매우 짧게** 답하세요. 실제 그룹 디스커션은 한 사람이 길게 말하지 않습니다.\n'+
      '- **반드시 완결된 문장(마침표)으로 끝내세요.** 문장 중간에 끊지 마세요.\n'+
      '- 한국어 존댓말\n'+
      '- 핵심 한 가지만 짧고 선명하게. 여러 근거/사례 나열 금지.\n'+
      '- 영어 금지\n'+
      '- 구분선(---), 줄바꿈 기호, 마크다운 서식 사용 금지\n'+
      '- 본인 이름(지원자 B)이나 "지원자 A", "지원자 A님" 등 화자 라벨/호명 절대 사용 금지. 오직 본인 발언만 출력.\n'+
      '- "당신은 응답할 차례입니다" 같은 메타 지시문 절대 포함하지 마세요.';

    // 지금까지의 대화를 단일 user 메시지로 구성 (다중 assistant 화자 문제 회피)
    var dialogueText=dialogue.map(function(d){
      var label=d.speaker==='A'?'지원자 A (본인)':'지원자 '+d.speaker;
      return '['+label+'] '+d.text;
    }).join('\n');
    var userMsg='지금까지의 토론 내용:\n\n'+(dialogueText||'(아직 아무도 발언하지 않았습니다)')+'\n\n이제 '+persona.name+'의 차례입니다. 위 규칙에 따라 '+persona.name+'의 발언만 짧게 출력하세요.';

    async function callAI(){
      var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:250,
        system:sys,messages:[{role:'user',content:userMsg}]
      })});
      return await r.json();
    }
    var data=null,txt='';
    try{data=await callAI();}catch(e){console.warn('[disc-ai] 1차 실패',e);}
    if(!data||!data.content||!data.content[0]||!data.content[0].text){
      console.warn('[disc-ai] 응답 비정상 → 1회 재시도',data);
      try{data=await callAI();}catch(e){console.warn('[disc-ai] 2차도 실패',e);}
    }
    txt=(data&&data.content&&data.content[0]&&data.content[0].text)||'';
    if(!txt){
      var fallbacks=phase==='open'?[
        '저는 이 주제에서 무엇보다 균형이 중요하다고 생각합니다.',
        '저는 원칙과 유연성의 조화가 핵심이라고 봅니다.',
        '저는 고객 입장에서 느끼는 일관성이 가장 중요하다고 생각합니다.'
      ]:phase==='close'?[
        '여러분 말씀 잘 들었습니다. 결국은 상황 판단과 팀워크라고 생각합니다.',
        '좋은 논의였습니다. 저는 공감과 원칙의 균형이 답이라고 봅니다.',
        '모두 의미 있는 관점이었습니다. 결론적으로 고객 중심이 우선입니다.'
      ]:[
        '좋은 의견 잘 들었습니다. 저는 이 부분에서 균형이 가장 중요하다고 봅니다.',
        '말씀에 공감합니다. 저는 현장 경험에서도 비슷한 결론에 닿았습니다.',
        '좋은 지적이라고 생각합니다. 저는 거기에 더해 일관성이 핵심이라 봅니다.'
      ];
      txt=fallbacks[Math.floor(Math.random()*fallbacks.length)];
    }
    txt=txt.replace(/\*\*/g,'').replace(/---+/g,'').replace(/\n{2,}/g,'\n').replace(/당신은.*차례입니다\.?/g,'').trim();
    txt=txt.replace(/\[?지원자\s*[A-B]\]?\s*[:：)]\s*/g,'').trim();
    txt=txt.replace(/지원자\s*[A-B]\s*(님|분|씨)?[,，]?\s*/g,'').trim();
    if(!/[.!?。…]$/.test(txt)){
      var m=txt.match(/^([\s\S]*[.!?。…])[^.!?。…]*$/);
      if(m&&m[1].length>=20)txt=m[1].trim();
    }
    var speakerCode=persona.name.indexOf('B')>=0?'B':'C';
    dialogue.push({speaker:speakerCode,text:txt});
    appendLog('peer',persona.name,txt);
    await speakText(txt,persona);
  }catch(e){console.warn('[disc-ai] aiPeerSpeak 예외',e);}
  panel.classList.remove('speaking');
}

function appendLog(who,name,text){
  var log=document.getElementById('log');
  var cls=who==='user'?'speaker user':'speaker';
  log.innerHTML+='<div class="turn"><div class="'+cls+'">'+name+'</div>'+text+'</div>';
  log.scrollTop=log.scrollHeight;
}

// 디스커션 전용 TTS — Web Audio API 기반. HTML5 Audio의 data:/blob: URL 환경 호환 이슈를 통째로 우회.
// AudioBuffer의 duration은 디코딩 시점에 정확히 결정되므로 발화 끝까지 안전하게 대기 가능.
var _discCtx=null;
var _discSource=null;
function _getAudioCtx(){
  if(!_discCtx){
    try{_discCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(_discCtx&&_discCtx.state==='suspended'){try{_discCtx.resume();}catch(e){}}
  return _discCtx;
}
async function speakText(text,persona){
  if(persona.noVoice){await new Promise(function(r){setTimeout(r,800);});return;}
  // 이전 오디오 강제 정지
  if(_discSource){try{_discSource.onended=null;_discSource.stop();}catch(e){}_discSource=null;}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();

  // Google Cloud TTS 호출 → ArrayBuffer
  var audioBytes=null;
  try{
    var res=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text.substring(0,1000),lang:'ko-KR',gender:persona.gender||'male'})});
    if(res.ok){
      var data=await res.json();
      if(data.audioContent){
        var bin=atob(data.audioContent);
        var bytes=new Uint8Array(bin.length);
        for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
        audioBytes=bytes.buffer;
      }
    }
  }catch(e){console.warn('[disc-tts] fetch failed',e);}

  if(!audioBytes){
    console.warn('[disc-tts] no audio, falling back to time-based wait');
    await new Promise(function(resolve){setTimeout(resolve,Math.max(4000,text.length*280));});
    return;
  }

  var ctx=_getAudioCtx();
  if(!ctx){
    // Web Audio 미지원 환경 → 시간 기반
    await new Promise(function(resolve){setTimeout(resolve,Math.max(4000,text.length*280));});
    return;
  }

  // 디코딩 (Promise 기반)
  var audioBuffer=null;
  try{
    audioBuffer=await new Promise(function(resolve,reject){
      ctx.decodeAudioData(audioBytes,function(buf){resolve(buf);},function(err){reject(err);});
    });
  }catch(e){
    console.warn('[disc-tts] decode failed',e);
    await new Promise(function(resolve){setTimeout(resolve,Math.max(4000,text.length*280));});
    return;
  }

  console.log('[disc-tts] playing',persona.name,'duration',audioBuffer.duration.toFixed(1)+'s','text:',text.substring(0,30)+'...');

  // 재생 → 정확한 onended 또는 duration 기반 대기
  await new Promise(function(resolve){
    var source=ctx.createBufferSource();
    source.buffer=audioBuffer;
    source.connect(ctx.destination);
    _discSource=source;
    var done=false;
    function finish(reason){
      if(done)return;
      done=true;
      console.log('[disc-tts] finished',persona.name,'via',reason);
      if(_discSource===source)_discSource=null;
      resolve();
    }
    source.onended=function(){finish('onended');};
    try{source.start(0);}catch(e){finish('start-failed');return;}
    // 안전 타임아웃: 실제 duration + 5초
    setTimeout(function(){finish('safety-timeout');},(audioBuffer.duration+5)*1000);
  });
}

async function generateFeedback(){

  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('btn-feedback').style.display='none';

  fb.innerHTML='<b>피드백을 작성하고 있어요...</b>';

    var label=d.speaker==='A'?'You (지원자 A)':'지원자 '+d.speaker;
    return '['+label+'] '+d.text;
  }).join('\n');
  var userTurns=dialogue.filter(function(d){return d.speaker==='A';}).length;

  try{

    })});

      '</div>';
  }catch(e){
    fb.innerHTML='<b style="color:#E74C3C;">피드백 생성 실패.</b>';
  }
}

// 탭 visibility 변경 시 (백그라운드 전환) 오디오 일시 정지
document.addEventListener('visibilitychange',function(){
  if(document.hidden){
    if('speechSynthesis' in window)try{window.speechSynthesis.cancel();}catch(e){}
    try{if(typeof _discSource!=='undefined'&&_discSource){_discSource.onended=null;_discSource.stop();_discSource=null;}}catch(e){}
  }
});
</script>
</body>
