<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 연습   WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:#fff;min-height:100vh;}
a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);}.nav-back:hover{color:var(--gold);}
.main{max-width:640px;margin:0 auto;padding:48px 20px;text-align:center;}
.q-card{margin-bottom:24px;}
.q-label{font-family:'DM Serif Display','Noto Serif KR',serif;font-size:1.5rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:20px;font-weight:400;line-height:1.2;}
.q-text{font-family:'Noto Serif KR',serif;font-size:1.1rem;color:#fff;line-height:1.7;margin-bottom:28px;font-weight:300;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:20px 24px;text-align:left;max-width:560px;margin-left:auto;margin-right:auto;}
.cam-box{width:100%;max-width:480px;aspect-ratio:16/9;background:#111;border-radius:16px;overflow:hidden;position:relative;margin:0 auto 20px;border:2px solid rgba(201,168,76,0.25);}
.cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:0.88rem;flex-direction:column;gap:8px;}
.rec-badge{position:absolute;top:12px;left:12px;display:none;align-items:center;gap:5px;background:rgba(192,57,43,0.9);color:#fff;padding:4px 10px;font-size:0.7rem;font-weight:700;border-radius:12px;}
.rec-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.btn{padding:13px 28px;border:none;border-radius:28px;font-family:inherit;font-size:0.86rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,0.3);}
.btn-navy{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.2);}
.btn-navy:hover{background:rgba(255,255,255,0.14);}
.btn-red{background:#E74C3C;color:#fff;}
.btn-red:hover{background:#c0392b;}
.transcript{display:none;padding:14px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.88rem;color:rgba(255,255,255,0.7);min-height:40px;margin-top:16px;text-align:left;}
.transcript.visible{display:block;}
.feedback{display:none;margin-top:16px;padding:22px 24px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:16px;text-align:left;font-size:0.88rem;color:rgba(255,255,255,0.85);line-height:1.8;white-space:pre-line;}
.feedback.visible{display:block;}
.feedback b{color:var(--gold);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="#" class="nav-back" onclick="history.back();return false;">← 돌아가기</a>
</nav>

<div class="main">
  <div class="q-card">
    <div class="q-label" id="q-label">면접 질문</div>
    <div class="q-text" id="q-text">로딩 중...</div>
    <div class="cam-box">
      <video id="cam" autoplay muted playsinline></video>
      <div class="cam-ph" id="cam-ph"><div style="font-size:1.6rem;opacity:0.5;">📷</div><div>카메라를 시작하세요</div></div>
      <div class="rec-badge" id="rec-badge"><div class="rec-dot"></div>REC</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" id="btn-start" onclick="startCam()">카메라 시작</button>
      <button class="btn btn-red" id="btn-rec" style="display:none;" onclick="toggleRec()">🔴 녹화 시작</button>
      <button class="btn btn-navy" id="btn-next" onclick="nextQ()">다음 질문 →</button>
    </div>
    <div class="transcript" id="transcript"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<script>
var urlParams=new URLSearchParams(window.location.search);
var type=urlParams.get('type')||'interview';

var Q_INTERVIEW=[
  '간단하게 자기소개 해주세요.',
  '승무원에 지원한 동기는 무엇인가요?',
  '왜 다른 항공사가 아닌 대한항공인가요?',
  '대한항공에 대해 알고 있는 것을 말씀해주세요.',
  '승무원으로서 본인의 강점은 무엇인가요?',
  '본인의 장단점을 말씀해주세요.',
  '서비스업에서 가장 중요한 것은 무엇이라고 생각하나요?',
  '좋은 서비스란 무엇이라고 생각하나요?',
  '서비스 경험 중 가장 기억에 남는 것은 무엇인가요?',
  '어려운 고객을 대응한 경험이 있나요? 어떻게 해결했나요?',
  '팀워크를 발휘한 경험을 말씀해주세요.',
  '팀에서 갈등이 생겼을 때 어떻게 해결하셨나요?',
  '스트레스를 받을 때 어떻게 해소하시나요?',
  '비행 중 승객이 갑자기 쓰러지면 어떻게 대처하시겠습니까?',
  '기내에서 승객끼리 다투면 어떻게 하시겠습니까?',
  '승객이 안전벨트 착용을 거부하면 어떻게 하시겠습니까?',
  '기내에서 취한 승객이 소란을 피우면 어떻게 대처하시겠습니까?',
  '비행기가 지연되어 승객이 불만을 표시하면 어떻게 하시겠습니까?',
  '기내식이 떨어져서 원하는 메뉴를 제공하지 못하면 어떻게 하시겠습니까?',
  '본인이 생각하는 승무원의 역할은 무엇인가요?',
  '승무원에게 가장 중요한 자질은 무엇이라고 생각하나요?',
  '체력 관리는 어떻게 하고 계신가요?',
  '외국어 능력에 대해 말씀해주세요.',
  '해외 경험이 있으면 말씀해주세요.',
  '아르바이트나 직장 경험 중 배운 것이 있다면 말씀해주세요.',
  '본인의 성격을 한 마디로 표현한다면?',
  '주변에서 본인을 어떤 사람이라고 하나요?',
  '가장 존경하는 사람은 누구이고 그 이유는 무엇인가요?',
  '최근에 읽은 책이나 본 영화 중 인상 깊었던 것이 있나요?',
  '비행 중 동료 승무원이 실수를 했다면 어떻게 하시겠습니까?',
  '승객이 무리한 요구를 하면 어떻게 대응하시겠습니까?',
  '본인이 승무원이 되면 어떤 승무원이 되고 싶으신가요?',
  '대한항공 승무원으로서 가장 해보고 싶은 것은 무엇인가요?',
  '불합격하면 어떻게 하실 건가요?',
  '마지막으로 하고 싶은 말씀이 있으신가요?'
];

var Q_EXECUTIVE=[
  '왜 대한항공이어야 하나요? 구체적으로 말씀해주세요.',
  '5년 후, 10년 후 본인의 모습을 그려주세요.',
  '가장 힘들었던 경험과 어떻게 극복했는지 말씀해주세요.',
  '리더십을 발휘한 경험을 구체적으로 말씀해주세요.',
  '본인이 생각하는 프로의식이란 무엇인가요?',
  '고객에게 NO라고 말해야 할 때 어떻게 하시겠습니까?',
  '동료와 의견이 다를 때 어떻게 해결하시나요?',
  '대한항공의 서비스 철학에 대해 어떻게 생각하시나요?',
  '비행 중 예상치 못한 상황이 발생하면 어떻게 대처하시겠습니까?',
  '마지막으로 하고 싶은 말씀이 있으신가요?',
  '최근 뉴스 중 인상 깊었던 것이 있다면 말씀해주세요.',
  '승무원이라는 직업의 장단점은 무엇이라고 생각하나요?',
  '본인의 가치관을 한 문장으로 표현한다면?',
  '팀에서 갈등이 생겼을 때 본인의 역할은 무엇인가요?',
  '입사 후 포부를 말씀해주세요.',
  '존경하는 사람이 있다면 누구이고 왜인가요?',
  '본인이 불합리한 대우를 받았을 때 어떻게 대처하시나요?'
];

var Q_HOTEL=[
  '간단하게 자기소개 해주세요.',
  '왜 호텔리어가 되고 싶나요?',
  '왜 이 호텔에 지원하셨나요?',
  '좋은 서비스란 무엇이라고 생각하나요?',
  '서비스 경험 중 가장 기억에 남는 것은?',
  '어려운 고객을 대응한 경험이 있나요?',
  '팀워크를 발휘한 경험을 말씀해주세요.',
  '스트레스를 받을 때 어떻게 해소하나요?',
  '야간 근무나 교대 근무에 대해 어떻게 생각하나요?',
  '호텔리어에게 가장 중요한 자질은 무엇인가요?',
  'VIP 고객 응대 경험이 있나요?',
  '고객 컴플레인을 어떻게 처리하시겠습니까?',
  '입사 후 어떤 부서에서 일하고 싶으신가요?',
  '본인의 강점은 무엇인가요?',
  '마지막으로 하고 싶은 말씀이 있으신가요?'
];

var Q_HOTEL2=[
  '어려운 고객 상황에서 어떻게 대처하셨나요?',
  '팀에서 갈등이 생겼을 때 어떻게 해결하나요?',
  '입사 후 어떤 계획이 있나요?',
  '호텔리어로서 본인의 자질은?',
  '리더십을 발휘한 경험을 말씀해주세요.',
  '고객에게 NO라고 말해야 할 때 어떻게 하나요?',
  '본인이 생각하는 프리미엄 서비스란?',
  '5년 후 본인의 모습을 그려주세요.'
];

var Q_CRUISE=[
  'Tell me about yourself.',
  'Why do you want to work on a cruise ship?',
  'Why this cruise line?',
  'How do you handle being away from home for months?',
  'Describe a time you provided excellent service.',
  'How would you handle a guest complaint?',
  'Tell me about a time you worked as part of a team.',
  'How do you handle stress in a fast-paced environment?',
  'What do you know about our cruise line?',
  'How would you handle a medical emergency on board?',
  'Are you comfortable working with people from different cultures?',
  'What would you do if a guest was unhappy with their cabin?',
  'Describe your ideal work environment.',
  'What makes you different from other candidates?',
  'Do you have any questions for us?'
];

var typeMap = {
  'interview': { q: Q_INTERVIEW, label: '면접 질문' },
  'executive': { q: Q_EXECUTIVE, label: '임원면접 질문' },
  'hotel': { q: Q_HOTEL, label: '호텔 1차 면접' },
  'hotel2': { q: Q_HOTEL2, label: '호텔 2차 면접' },
  'cruise': { q: Q_CRUISE, label: '크루즈 면접' }
};
var selected = typeMap[type] || typeMap['interview'];
var questions = selected.q;
var label = selected.label;
document.getElementById('q-label').textContent=label;

function pickQ(){
  return questions[Math.floor(Math.random()*questions.length)];
}
document.getElementById('q-text').textContent=pickQ();

function nextQ(){
  document.getElementById('q-text').textContent=pickQ();
  document.getElementById('transcript').textContent='';
  document.getElementById('feedback').classList.remove('visible');
  document.getElementById('feedback').innerHTML='';
}

// 카메라
var stream=null;
var mediaRecorder=null;
var chunks=[];
var recognition=null;
var fullText='';

async function startCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
    var v=document.getElementById('cam');
    v.srcObject=stream;v.style.display='block';
    document.getElementById('cam-ph').style.display='none';
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-rec').style.display='inline-block';
  }catch(e){
    document.getElementById('cam-ph').textContent='카메라 연결 실패';
  }
}

function toggleRec(){
  var btn=document.getElementById('btn-rec');
  if(!mediaRecorder||mediaRecorder.state==='inactive'){
    // 녹화 시작
    chunks=[];fullText='';
    document.getElementById('transcript').classList.add('visible');
    mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm'});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    mediaRecorder.start();
    document.getElementById('rec-badge').style.display='flex';
    btn.textContent='⏹ 답변 완료 · 피드백 받기';
    btn.style.background='#E74C3C';
    // 음성 인식
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      recognition=new SR();recognition.lang='ko-KR';recognition.interimResults=true;recognition.continuous=true;
      recognition.onresult=function(ev){
        var interim='';fullText='';
        for(var r=0;r<ev.results.length;r++){
          if(ev.results[r].isFinal)fullText+=ev.results[r][0].transcript+' ';
          else interim+=ev.results[r][0].transcript;
        }
        document.getElementById('transcript').textContent=fullText+interim;
      };
      recognition.start();
    }
  } else {
    // 녹화 중지
    mediaRecorder.stop();
    if(recognition)try{recognition.stop();}catch(e){}
    document.getElementById('rec-badge').style.display='none';
    btn.textContent='🔴 녹화 시작';
    btn.style.background='';
    btn.disabled=true;
    // 피드백 (음성 인식 안 됐어도 시도)
    setTimeout(function(){
      if(!fullText.trim()) fullText='(음성 인식 없음 - 답변 내용을 텍스트로 확인할 수 없습니다)';
      generateFeedback();
      btn.disabled=false;
    }, 500);
  }
}

async function generateFeedback(){
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">피드백을 작성하고 있어요...</span>';
  fb.classList.add('visible');
  var question=document.getElementById('q-text').textContent;
  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-6-20250514',max_tokens:700,
      system:'You are a cabin crew interview coach. The student answered an interview question on camera. Evaluate their answer. The input is from speech recognition so ignore grammar/punctuation errors. Focus on CONTENT and INTENT.\n\nFormat (use # not ## for headings):\n# 점수: X/100\n# 잘한 점\n- (2-3 points)\n# 개선할 점\n- (2-3 points)\n# 제안 답변\n(4-5 sentences, a complete well-structured answer)\n\nThe suggested answer MUST be complete and detailed, not cut off. Be encouraging. Write in Korean.',
      messages:[{role:'user',content:'질문: '+question+'\n\n학생 답변: '+fullText.trim()+'\n\n피드백을 주세요.'}]
    })});
    var data=await res.json();
    if(data&&data.error){
      fb.innerHTML='API 오류: '+(data.error.message||JSON.stringify(data.error));
      return;
    }
    var text=(data&&data.content&&data.content[0]&&data.content[0].text)||'';
    if(!text){
      fb.innerHTML='피드백 생성 실패. 응답: '+JSON.stringify(data).substring(0,200);
      return;
    }
    fb.innerHTML='<b>피드백</b><br><br>'+text.replace(/\*\*/g,'').replace(/\*[^*]+\*/g,'');
  }catch(e){
    fb.innerHTML='피드백 생성 실패: '+e.message+'<br>다시 시도해주세요.';
  }
}
</script>
</body>
</html>
