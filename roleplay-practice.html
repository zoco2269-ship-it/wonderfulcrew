<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>롤플레이 면접 연습 WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}

/* Nav - minimal for dark bg */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);transition:color 0.2s;}.nav-back:hover{color:var(--gold);}

/* Setup screen */
.setup{padding:60px 20px;text-align:center;max-width:700px;margin:0 auto;}
.setup h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#fff;margin-bottom:8px;}
.setup h1 em{font-style:normal;color:var(--gold);}
.setup p{color:rgba(255,255,255,0.6);font-size:0.88rem;line-height:1.7;margin-bottom:28px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;text-align:left;}
.setup-label{font-size:0.78rem;color:var(--gold);font-weight:600;margin-bottom:6px;letter-spacing:0.06em;}
.setup-select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#fff;font-family:inherit;font-size:0.85rem;}
.setup-select option{background:var(--navy);color:#fff;}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.avatar-opt{padding:14px 8px;background:rgba(255,255,255,0.04);border:2px solid rgba(201,168,76,0.15);border-radius:8px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:0.78rem;color:rgba(255,255,255,0.7);}
.avatar-opt:hover,.avatar-opt.sel{border-color:var(--gold);background:rgba(201,168,76,0.1);color:#fff;}
.avatar-opt .emoji{font-size:1.8rem;margin-bottom:4px;display:block;}
.btn-start{padding:16px 40px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:28px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}

/* Interview screen */
.interview{display:none;flex:1;flex-direction:column;}
.interview.active{display:flex;}
.q-banner{text-align:center;padding:10px 20px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.15);}
.q-banner .label{font-size:0.7rem;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px;}
.q-banner .question{font-size:0.95rem;color:#fff;font-weight:500;line-height:1.5;}

/* Video area */
.video-area{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;padding:12px 24px;min-height:0;overflow:hidden;}
.card-frame{width:160px;height:min(280px,calc(100vh - 320px));border-radius:12px;overflow:hidden;position:relative;background:#000;border:2px solid rgba(255,255,255,0.08);flex-shrink:0;}
.card-frame.speaking{border-color:var(--gold);animation:goldGlow 1.5s infinite;}
@keyframes goldGlow{0%,100%{border-color:rgba(201,168,76,0.4);}50%{border-color:rgba(201,168,76,1);}}
.card-label{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));text-align:center;}
.card-label .name{font-family:'DM Serif Display',serif;font-size:0.85rem;color:#fff;}
.card-label .role{font-size:0.68rem;color:var(--gold);letter-spacing:0.05em;}

/* Avatar */
.avatar-display{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#1A2340 0%,#2A3455 100%);}
.avatar-face{text-align:center;}
.avatar-face .face{font-size:4rem;line-height:1;margin-bottom:8px;}
.avatar-face .mouth{width:20px;height:8px;background:var(--gold);border-radius:0 0 10px 10px;margin:0 auto;transition:height 0.1s;opacity:0.7;}
.avatar-face .mouth.talking{animation:mouthMove 0.3s infinite alternate;}
@keyframes mouthMove{0%{height:4px;width:16px;}100%{height:12px;width:22px;}}

/* Camera */
.cam-frame video,.card-frame video{width:100%;height:100%;object-fit:cover;}
.cam-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:0.82rem;flex-direction:column;gap:8px;}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#E74C3C;display:none;}
.rec-dot.on{display:inline-block;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* Waveform */
.waveform{height:30px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 20px;}
.waveform .bar{width:3px;background:var(--gold);border-radius:2px;animation:wave 0.5s ease-in-out infinite alternate;opacity:0.4;}
.waveform.active .bar{opacity:1;}
@keyframes wave{0%{height:4px;}100%{height:20px;}}

/* Controls */
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:12px 20px;background:rgba(17,27,46,0.95);border-top:1px solid rgba(201,168,76,0.15);}
.ctrl-btn{padding:12px 22px;border:none;border-radius:24px;font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.ctrl-btn:disabled{opacity:0.35;cursor:not-allowed;}
.ctrl-btn.primary{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.ctrl-btn.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.ctrl-btn.secondary:hover:not(:disabled){background:rgba(255,255,255,0.12);}
.ctrl-btn.danger{background:#E74C3C;color:#fff;}

/* Feedback panel */
.feedback-panel{display:none;padding:20px 24px;background:rgba(0,0,0,0.3);max-height:200px;overflow-y:auto;font-size:0.86rem;color:rgba(255,255,255,0.8);line-height:1.7;}
.feedback-panel.active{display:block;}
.feedback-panel b{color:var(--gold);}

/* Transcript */
.transcript-bar{padding:10px 20px;background:rgba(255,255,255,0.04);font-size:0.84rem;color:rgba(255,255,255,0.6);min-height:36px;border-top:1px solid rgba(255,255,255,0.05);}

@media(max-width:600px){
  .card-frame{width:120px;height:200px;}
  .video-area{gap:12px;padding:12px;}
  .controls{flex-wrap:wrap;gap:8px;}
  .avatar-grid{grid-template-columns:1fr 1fr;}
  .setup-grid{grid-template-columns:1fr;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="curriculum.html" class="nav-back">← 커리큘럼</a>
</nav>

<!-- SETUP SCREEN -->
<div class="setup" id="setup">
  <h1>롤플레이 <em>면접 연습</em></h1>
  <p>면접관 아바타가 기내 상황 질문을 읽어드립니다.<br>카메라 앞에서 실전처럼 답변하세요.</p>

  <div style="font-size:0.78rem;color:var(--gold);font-weight:600;margin-bottom:10px;letter-spacing:0.06em;">면접관 아바타</div>
  <div class="avatar-grid" style="grid-template-columns:1fr 1fr;max-width:300px;margin:0 auto 20px;" id="avatar-grid">
    <div class="avatar-opt sel" data-avatar="👨🏻" data-img="images/avatar-male.png" onclick="selAvatar(this)"><span class="emoji">👨🏻</span>남성 면접관</div>
    <div class="avatar-opt" data-avatar="👩🏻" data-img="images/avatar-female.png" onclick="selAvatar(this)"><span class="emoji">👩🏻</span>여성 면접관</div>
  </div>
  <div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-bottom:16px;">아바타 이미지는 images/avatar-male.png, avatar-female.png에 넣으면 자동 적용됩니다.</div>

  <div class="setup-grid">
    <div>
      <div class="setup-label">영어 악센트</div>
      <select class="setup-select" id="s-accent">
        <option value="en-GB">British English</option>
        <option value="en-US">American English</option>
        <option value="fr-FR">French English</option>
        <option value="es-ES">Spanish English</option>
      </select>
    </div>
    <div>
      <div class="setup-label">시나리오</div>
      <select class="setup-select" id="s-count">
        <option value="3">랜덤 3개</option>
        <option value="5">랜덤 5개</option>
        <option value="all">전체</option>
      </select>
    </div>
  </div>

  <button class="btn-start" onclick="startInterview()">면접 시작하기</button>
</div>

<!-- INTERVIEW SCREEN -->
<div class="interview" id="interview">
  <div class="q-banner">
    <div class="label">Question <span id="q-idx">1</span> / <span id="q-total">3</span></div>
    <div class="question" id="q-text"></div>
  </div>

  <div class="video-area">
    <!-- 면접관 아바타 -->
    <div class="card-frame" id="interviewer-card">
      <div class="avatar-display">
        <img id="avatar-img" src="" alt="Interviewer" style="width:100%;height:100%;object-fit:cover;display:none;">
        <div class="avatar-face" id="avatar-face-fallback">
          <div class="face" id="avatar-emoji">👨🏻</div>
          <div class="mouth" id="avatar-mouth"></div>
        </div>
      </div>
      <div class="card-label">
        <div class="name" id="interviewer-name">Interviewer</div>
        <div class="role">WonderfulCrew AI</div>
      </div>
    </div>

    <!-- 학생 카메라 -->
    <div class="card-frame" id="student-card">
      <video id="cam-video" autoplay muted playsinline style="display:none;transform:scaleX(-1);"></video>
      <div class="cam-placeholder" id="cam-ph">
        <div>📷</div>
        <div>카메라 준비 중</div>
      </div>
      <div class="card-label">
        <div class="name">You</div>
        <div class="role"><span class="rec-dot" id="rec-dot"></span> <span id="rec-label">대기</span></div>
      </div>
    </div>
  </div>

  <div class="waveform" id="waveform">
    <div class="bar" style="animation-delay:0s;"></div><div class="bar" style="animation-delay:0.1s;"></div><div class="bar" style="animation-delay:0.2s;"></div>
    <div class="bar" style="animation-delay:0.3s;"></div><div class="bar" style="animation-delay:0.15s;"></div><div class="bar" style="animation-delay:0.25s;"></div>
    <div class="bar" style="animation-delay:0.05s;"></div><div class="bar" style="animation-delay:0.35s;"></div><div class="bar" style="animation-delay:0.12s;"></div>
  </div>

  <div class="transcript-bar" id="transcript">고객이 먼저 말합니다...</div>
  <div class="feedback-panel" id="feedback"></div>

  <div class="controls">
    <button class="ctrl-btn danger" id="btn-stop" onclick="endAndFeedback()" style="display:none;">⏹ 답변 종료</button>
    <button class="ctrl-btn primary" id="btn-model" onclick="showSuggestedResponse()" style="display:none;">모범답변 보기</button>
    <button class="ctrl-btn secondary" id="btn-next" onclick="nextQuestion()" style="display:none;">다음 질문 →</button>
  </div>
</div>

<script>
// Scenarios
var SCENARIOS=[
  "A passenger wants a window seat but the flight is completely full.",
  "A business class passenger's preferred meal choice has run out.",
  "A passenger complains the cabin is too cold, but nearby passengers say it's fine.",
  "A child has been crying for 30 minutes and other passengers are complaining.",
  "A passenger asks for more alcohol but appears quite intoxicated.",
  "A passenger's carry-on bag doesn't fit in the overhead bin.",
  "A passenger requests a Hindu vegetarian meal that wasn't pre-ordered.",
  "Two passengers are arguing loudly over the shared armrest.",
  "A passenger refuses to fasten their seatbelt during turbulence.",
  "A passenger's in-flight entertainment screen is not working.",
  "A drink was accidentally spilled on a passenger's clothes.",
  "A passenger is having an allergic reaction after eating the meal.",
  "A passenger demands to be upgraded to business class for free.",
  "A passenger discovers their passport is missing after boarding."
];

var MODELS={
  0:"I'm really sorry about that. Let me check all sections for any window seat. Unfortunately they're all taken. May I recommend this aisle seat near the front? It has extra legroom. And I'll bring you a complimentary drink once we're airborne.",
  1:"I sincerely apologize. Let me check other cabins. I'm afraid it's gone, but our chef's second option is excellent. I'll also bring champagne on the house as my apology.",
  2:"I completely understand. Let me bring you a warm blanket right away and adjust the airflow above your seat. Would you like some hot tea as well?",
  3:"Let me check on the family first. I'll bring warm milk and a coloring kit. For you, may I offer noise-cancelling headphones?",
  4:"I want you to arrive feeling great. May I suggest a refreshing juice instead? We have amazing fresh orange juice. I'll bring some snacks too.",
  5:"Let me help rearrange some items. If it still doesn't fit, I can gate-check it with a priority tag so it's first out.",
  6:"I'm sorry we don't have that pre-ordered. We have a vegetarian pasta that's meat-free. I'll personally check ingredients and note it for your return flight.",
  7:"I understand space can be tight. I have a spare cushion, and there's a seat with more space nearby. Can I bring you both a drink?",
  8:"Your safety is our top priority. The captain turned on the sign because of rough air ahead. Can I help adjust the belt so it's comfortable?",
  9:"So sorry about that. Let me try resetting it. If not, I have a spare tablet with our full movie library. Let me bring a complimentary drink too.",
  10:"I am so sorry. Let me get club soda and napkins right away. We have a spare shirt, and I'll arrange dry cleaning at no cost.",
  11:"Please stay calm. I'll call for medical professionals and get our first aid kit. I'll inform the captain for priority landing if needed.",
  12:"I understand. Unfortunately upgrades are managed by ground team. Let me bring extra pillows, blanket, and our premium amenity kit instead.",
  13:"I understand how stressful this is. Let me help you look carefully. I'll also check with the gate team. If we can't find it, I'll connect you with emergency documentation."
};

var chosenAvatar='👨🏻';
var chosenImg='images/avatar-male.png';
var questions=[];
var qIdx=0;
var stream=null;
var recognition=null;
var fullText='';
var mediaRecorder=null;
var recordChunks=[];
var recordStartTime=0;

function selAvatar(el){
  document.querySelectorAll('.avatar-opt').forEach(function(a){a.classList.remove('sel');});
  el.classList.add('sel');
  chosenAvatar=el.dataset.avatar;
  chosenImg=el.dataset.img||'';
}

function startInterview(){
  var count=document.getElementById('s-count').value;
  // 원래 인덱스를 유지하며 셔플
  var indexed=SCENARIOS.map(function(q,i){return {q:q,origIdx:i};});
  if(count==='all'){questions=indexed;}
  else{
    var n=parseInt(count);questions=[];
    var pool=indexed.slice();
    for(var i=0;i<n&&pool.length;i++){var x=Math.floor(Math.random()*pool.length);questions.push(pool.splice(x,1)[0]);}
  }

  qIdx=0;
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');
  // 아바타 이미지 또는 이모지 표시
  var avatarImg=document.getElementById('avatar-img');
  var avatarFallback=document.getElementById('avatar-face-fallback');
  if(chosenImg){
    avatarImg.src=chosenImg;
    avatarImg.style.display='block';
    avatarFallback.style.display='none';
    avatarImg.onerror=function(){avatarImg.style.display='none';avatarFallback.style.display='flex';};
  }
  document.getElementById('avatar-emoji').textContent=chosenAvatar;
  document.getElementById('q-total').textContent=questions.length;

  // Start camera
  // 카메라: 정면(셀카) 우선, 실패 시 기본 카메라
  // 카메라: 모든 비디오 장치를 확인해서 전면(내장) 카메라를 우선 선택
  (async function(){
    try{
      // 먼저 권한 요청
      var tempStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      tempStream.getTracks().forEach(function(t){t.stop();});
      // 장치 목록 확인
      var devices=await navigator.mediaDevices.enumerateDevices();
      var videoDevices=devices.filter(function(d){return d.kind==='videoinput';});
      var selectedId=null;
      // 내장/전면 카메라 찾기 (이름에 front, 전면, integrated, webcam, facetime 포함)
      var frontKeywords=/front|전면|내장|integrated|webcam|facetime|camera hd|built-in/i;
      for(var i=0;i<videoDevices.length;i++){
        if(frontKeywords.test(videoDevices[i].label)){selectedId=videoDevices[i].deviceId;break;}
      }
      // 못 찾으면 첫 번째 카메라
      if(!selectedId&&videoDevices.length>0)selectedId=videoDevices[0].deviceId;
      var constraints=selectedId?{video:{deviceId:{exact:selectedId}},audio:true}:{video:true,audio:true};
      stream=await navigator.mediaDevices.getUserMedia(constraints);
      var v=document.getElementById('cam-video');
      v.srcObject=stream;v.style.display='block';
      document.getElementById('cam-ph').style.display='none';
    }catch(e){
      document.getElementById('cam-ph').innerHTML='<div>Camera connection failed</div>';
    }
  })();

  showQuestion();
}

function showQuestion(){
  chatHistory=[];endingRoleplay=false;
  var q=questions[qIdx];
  document.getElementById('q-idx').textContent=qIdx+1;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('transcript').textContent='고객이 먼저 말합니다...';
  document.getElementById('feedback').classList.remove('active');
  document.getElementById('feedback').innerHTML='';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('waveform').classList.remove('active');
  fullText='';

  // AI(고객)가 먼저 불만/요청을 말함
  customerFirstSpeak(q.q);
}

async function customerFirstSpeak(scenario){
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">고객이 말하고 있어요...</span>';
  fb.classList.add('active');

  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:150,
      system:'You are a passenger on an airplane. The situation is: "'+scenario+'"\n\nYou must speak FIRST as the upset/confused passenger. Say 1-2 sentences expressing your complaint or request naturally, as if talking to the cabin crew member standing in front of you. Be realistic. Speak in ENGLISH only. Do NOT say anything from the crew perspective.',
      messages:[{role:'user',content:'Start the conversation as the passenger.'}]
    })});
    var data=await res.json();
    var aiText=(data&&data.content&&data.content[0]&&data.content[0].text)||'Excuse me, I have a problem.';
    aiText=aiText.replace(/\*\*/g,'');

    chatHistory.push({role:'assistant',content:aiText});
    fb.innerHTML='<b style="color:var(--gold);">Passenger:</b> '+aiText;

    // TTS
    var accent=document.getElementById('s-accent').value;
    speakQuestion(aiText,accent);

    // TTS 끝나면 자동으로 학생 음성 인식 시작
    var checkTTS=setInterval(function(){
      if(!window.speechSynthesis.speaking){
        clearInterval(checkTTS);
        startListening();
      }
    },300);
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">오류 발생. 다시 시도해주세요.</span>';
  }
}

function startListening(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('transcript').textContent='Chrome에서 사용해 주세요.';return;}
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
  fullText='';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-label').textContent='녹음 중';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('transcript').textContent='지금 답변하세요...';

  // 백그라운드 영상 녹화
  if(!mediaRecorder&&stream){
    try{
      recordStartTime=Date.now();
      recordChunks=[];
      mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm'});
      mediaRecorder.ondataavailable=function(e){if(e.data.size>0)recordChunks.push(e.data);};
      mediaRecorder.start();
    }catch(e){}
  }

  recognition.onresult=function(ev){
    var interim='';fullText='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal)fullText+=ev.results[r][0].transcript+' ';
      else interim+=ev.results[r][0].transcript;
    }
    document.getElementById('transcript').textContent=fullText+interim;
  };
  recognition.onend=function(){
    if(endingRoleplay) return; // 종료 중이면 무시
    if(fullText.trim()){
      document.getElementById('transcript').textContent=fullText.trim();
      processAnswer();
    }
  };
  recognition.start();
}

// 음성 목록 미리 로드
if('speechSynthesis' in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

// 페이지 나갈 때 TTS + 카메라 + 마이크 모두 중지
window.addEventListener('beforeunload',function(){
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  if(stream)stream.getTracks().forEach(function(t){t.stop();});
  if(recognition)try{recognition.stop();}catch(e){}
});
window.addEventListener('pagehide',function(){
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
});

function speakQuestion(text,lang){
  if(!('speechSynthesis' in window))return;
  var iCard=document.getElementById('interviewer-card');
  var mouth=document.getElementById('avatar-mouth');
  iCard.classList.add('speaking');
  mouth.classList.add('talking');
  var u=new SpeechSynthesisUtterance(text);
  u.lang=lang;
  var isMale=(chosenAvatar==='👨🏻');
  u.rate=0.85;
  u.pitch=isMale?0.75:1.2;
  // 성별 음성 선택
  var voices=window.speechSynthesis.getVoices();
  var langPrefix=lang.split('-')[0];
  var filtered=voices.filter(function(v){return v.lang.startsWith(langPrefix);});
  if(filtered.length>0){
    // 남성: 이름에 male/daniel/james/david/thomas/mark 포함 또는 pitch가 낮은 것
    // 여성: female/samantha/karen/victoria/fiona/zira/google 포함
    var maleNames=/male|daniel|james|david|thomas|mark|richard|google uk english male/i;
    var femaleNames=/female|samantha|karen|victoria|fiona|zira|susan|google uk english female/i;
    var match=filtered.find(function(v){return isMale?maleNames.test(v.name):femaleNames.test(v.name);});
    if(match)u.voice=match;
    else if(filtered.length>=2)u.voice=filtered[isMale?0:1]; // fallback: 첫번째=남, 두번째=여
  }
  u.onend=function(){iCard.classList.remove('speaking');mouth.classList.remove('talking');};
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

var chatHistory=[];
var lastSuggestedResponse='';

function showSuggestedResponse(){
  if(!lastSuggestedResponse) return;
  var fb=document.getElementById('feedback');
  fb.innerHTML+='<br><br><b style="color:var(--gold);">Model Answer:</b><br><div style="white-space:pre-line;background:rgba(201,168,76,0.08);padding:16px;border-left:3px solid var(--gold);margin-top:8px;">'+lastSuggestedResponse+'</div>';
  document.getElementById('btn-model').style.display='none';
  // TTS로 읽어주기
  var accent=document.getElementById('s-accent').value;
  speakQuestion(lastSuggestedResponse, accent);
}

var endingRoleplay=false;

function stopAnswer(){
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-label').textContent='처리 중';
  document.getElementById('waveform').classList.remove('active');
}

function endAndFeedback(){
  endingRoleplay=true;
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('waveform').classList.remove('active');
  // 마지막 답변이 있으면 추가
  var lastAns=fullText.trim();
  if(lastAns&&lastAns!=='지금 답변하세요...'){
    chatHistory.push({role:'user',content:lastAns});
  }
  var q=questions[qIdx];
  var scenario=typeof q==='string'?q:q.q;
  generateFeedback(scenario);
}

async function processAnswer(){
  stopAnswer();

  var ans=fullText.trim()||document.getElementById('transcript').textContent.trim();
  if(!ans||ans==='지금 답변하세요...'){startListening();return;}

  chatHistory.push({role:'user',content:ans});
  var turnCount=chatHistory.filter(function(m){return m.role==='user';}).length;

  var fb=document.getElementById('feedback');
  var q=questions[qIdx];
  var scenario=typeof q==='string'?q:q.q;

  // 고객(AI)이 대화 흐름에 따라 자연스럽게 반응
  fb.innerHTML='<span style="color:var(--gold);">고객이 반응하고 있어요...</span>';
  fb.classList.add('active');

  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:150,
      system:'You are a passenger on an airplane. The situation is: "'+scenario+'"\n\nThe cabin crew member just responded to you. React naturally IN ENGLISH as the passenger. Keep responses 1-2 sentences max.\n\nCRITICAL RULES:\n- Stay in character as the passenger at all times\n- If the crew member ASKED YOU A QUESTION, you MUST answer it directly\n- If they offered a solution, react honestly — accept if good, push back if not enough\n- If satisfied, say something like "Oh okay, that sounds good" or "Thank you, I appreciate that"\n- If not satisfied, express what you still need\n- Be realistic and natural, not aggressive\n- NEVER ignore what the crew member said. Always respond to their actual words.',
      messages:chatHistory
    })});
    var data=await res.json();
    var aiText=(data&&data.content&&data.content[0]&&data.content[0].text)||'I see.';
    aiText=aiText.replace(/\*\*/g,'').replace(/\[DONE\]/g,'').replace(/\[END\]/g,'').trim();

    chatHistory.push({role:'assistant',content:aiText});
    fb.innerHTML='<b style="color:var(--gold);">Passenger:</b> '+aiText;

    var accent=document.getElementById('s-accent').value;
    speakQuestion(aiText,accent);

    // TTS 끝나면 자동으로 학생 음성 인식 — 학생이 "답변 완료" 누르면 피드백
    var checkTTS2=setInterval(function(){
      if(!window.speechSynthesis.speaking){
        clearInterval(checkTTS2);
        startListening();
      }
    },300);
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">오류 발생. 다시 시도해주세요.</span>';
  }
}

async function generateFeedback(scenario){
  if(mediaRecorder&&mediaRecorder.state==='recording')try{mediaRecorder.stop();}catch(e){}
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">AI가 피드백을 작성하고 있어요...</span>';

  try{
    var convoSummary=chatHistory.map(function(m){return (m.role==='user'?'Crew':'Passenger')+': '+m.content;}).join('\n');
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:500,
      system:'You are a cabin crew interview coach. Evaluate the following roleplay conversation. The scenario was: "'+scenario+'"\n\nProvide feedback in EXACTLY this format:\n\nOverall Score: X/100\n\nStrengths:\n- (2-3 bullet points)\n\nAreas to Improve:\n- (2-3 bullet points)\n\n---SUGGESTED---\n(Write a short ideal response the crew member could have given in this scenario. 3-4 sentences.)\n\nBe encouraging but honest. Write in English. Keep it concise.',
      messages:[{role:'user',content:'Here is the full roleplay conversation:\n\n'+convoSummary+'\n\nPlease give feedback.'}]
    })});
    var data=await res.json();
    var feedbackText=(data&&data.content&&data.content[0]&&data.content[0].text)||'Good effort!';
    feedbackText=feedbackText.replace(/\*\*/g,'');

    var parts=feedbackText.split('---SUGGESTED---');
    var mainFeedback=parts[0].trim();
    lastSuggestedResponse=(parts[1]||'').trim();

    fb.innerHTML='<b style="color:var(--gold);">AI Feedback</b><br><br><div style="white-space:pre-line;">'+mainFeedback+'</div>';
    if(lastSuggestedResponse) document.getElementById('btn-model').style.display='inline-flex';
    document.getElementById('btn-next').style.display='inline-flex';
    document.getElementById('rec-label').textContent='완료';
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">피드백 생성 실패.</span>';
    document.getElementById('btn-next').style.display='inline-flex';
  }
}

function nextQuestion(){
  // 녹화/음성 정리
  if(recognition)try{recognition.stop();}catch(e){}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  mediaRecorder=null;
  qIdx++;
  if(qIdx>=questions.length){
    document.getElementById('q-banner').innerHTML='<div class="label">COMPLETE</div><div class="question">All scenarios completed!</div>';
    document.getElementById('feedback').innerHTML='<b style="color:var(--gold);">Roleplay Complete</b><br><br><a href="curriculum.html" style="color:var(--gold);">← Back to Curriculum</a>';
    document.getElementById('feedback').classList.add('active');
    document.querySelectorAll('.ctrl-btn').forEach(function(b){b.style.display='none';});
    return;
  }
  showQuestion();
}

function r(){return Math.floor(Math.random()*36)+50;}
