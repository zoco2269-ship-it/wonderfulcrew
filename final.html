<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파이널 인터뷰 연습 WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.interview.active{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.feedback-panel{max-height:24vh;overflow-y:auto;}
a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);}.nav-back:hover{color:var(--gold);}
.setup{padding:60px 20px;text-align:center;max-width:700px;margin:0 auto;}
.setup h1{font-family:'DM Serif Display',serif;font-size:1.8rem;color:#fff;margin-bottom:8px;}
.setup h1 em{font-style:normal;color:var(--gold);}
.setup p{color:rgba(255,255,255,0.6);font-size:0.88rem;line-height:1.7;margin-bottom:24px;}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;text-align:left;}
.setup-label{font-size:0.78rem;color:var(--gold);font-weight:600;margin-bottom:6px;}
.setup-select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:8px;color:#fff;font-family:inherit;font-size:0.85rem;}
.setup-select option{background:var(--navy);color:#fff;}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:center;}
.toggle-row label{font-size:0.84rem;color:rgba(255,255,255,0.7);}
.toggle-row input{accent-color:var(--gold);width:18px;height:18px;}
.btn-start{padding:16px 40px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:28px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.4);}
.interview{display:none;flex:1;flex-direction:column;}.interview.active{display:flex;}
.q-banner{text-align:center;padding:16px 20px;background:rgba(201,168,76,0.08);border-bottom:1px solid rgba(201,168,76,0.15);}
.q-banner .label{font-size:0.7rem;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:4px;}
.q-banner .question{font-size:0.95rem;color:#fff;font-weight:500;line-height:1.5;}
.video-area{flex:1;display:flex;align-items:center;justify-content:center;gap:24px;padding:20px;min-height:0;overflow:hidden;}
.card-frame{height:100%;max-height:100%;aspect-ratio:9/16;max-width:220px;border-radius:12px;overflow:hidden;position:relative;background:#000;border:2px solid rgba(255,255,255,0.08);flex-shrink:1;flex-basis:auto;}
.card-frame video{width:100%;height:100%;object-fit:cover;}
.card-frame.speaking{border-color:var(--gold);animation:goldGlow 1.5s infinite;}
@keyframes goldGlow{0%,100%{border-color:rgba(201,168,76,0.4);}50%{border-color:rgba(201,168,76,1);}}
.card-label{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.8));text-align:center;}
.card-label .name{font-family:'DM Serif Display',serif;font-size:0.85rem;color:#fff;}
.card-label .role{font-size:0.68rem;color:var(--gold);}
.avatar-display{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#1A2340,#2A3455);}
.avatar-face{text-align:center;}.avatar-face .face{font-size:4rem;line-height:1;margin-bottom:8px;}
.avatar-face .mouth{width:20px;height:8px;background:var(--gold);border-radius:0 0 10px 10px;margin:0 auto;opacity:0.7;}
.avatar-face .mouth.talking{animation:mouthMove 0.3s infinite alternate;}
@keyframes mouthMove{0%{height:4px;width:16px;}100%{height:12px;width:22px;}}
.cam-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:0.82rem;flex-direction:column;gap:8px;}
.waveform{height:30px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 20px;}
.waveform .bar{width:3px;background:var(--gold);border-radius:2px;animation:wave 0.5s ease-in-out infinite alternate;opacity:0.4;}
.waveform.active .bar{opacity:1;}
@keyframes wave{0%{height:4px;}100%{height:20px;}}
.transcript-bar{padding:10px 20px;background:rgba(255,255,255,0.04);font-size:0.84rem;color:rgba(255,255,255,0.6);min-height:36px;border-top:1px solid rgba(255,255,255,0.05);}
.feedback-panel{display:none;padding:20px 24px;background:rgba(0,0,0,0.3);max-height:200px;overflow-y:auto;font-size:0.86rem;color:rgba(255,255,255,0.8);line-height:1.7;}
.feedback-panel.active{display:block;}.feedback-panel b{color:var(--gold);}
.controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:20px;background:rgba(17,27,46,0.95);border-top:1px solid rgba(201,168,76,0.15);}
.ctrl-btn{padding:12px 22px;border:none;border-radius:24px;font-family:inherit;font-size:0.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.ctrl-btn:disabled{opacity:0.35;cursor:not-allowed;}
.ctrl-btn.primary{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.ctrl-btn.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
.ctrl-btn.danger{background:#E74C3C;color:#fff;}
@media(max-width:600px){.card-frame{width:140px;}.video-area{gap:12px;}.controls{flex-wrap:wrap;gap:8px;}.setup-grid{grid-template-columns:1fr;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-gate.js"></script>
<script src="js/google-tts.js"></script>
<script src="js/free-trial.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="#" class="nav-back" onclick="goBack();return false;">← 돌아가기</a>
</nav>

<!-- SETUP -->
<div class="setup" id="setup">
  <h1>파이널 인터뷰 <em>연습</em></h1>
  <p>면접관과 실시간으로 대화하며 파이널 면접을 연습하세요.<br>내 이야기, 내 경험으로 자연스럽게 답변하는 것이 핵심입니다.</p>

  <div class="setup-grid" style="grid-template-columns:1fr 1fr 1fr;">
    <div>
      <div class="setup-label">항공사</div>
      <select class="setup-select" id="s-airline">
        <option value="emirates">Emirates</option>
        <option value="qatar">Qatar Airways</option>
        <option value="etihad">Etihad Airways</option>
        <option value="singapore">Singapore Airlines</option>
        <option value="cathay">Cathay Pacific</option>
        <option value="finnair">Finnair</option>
        <option value="klm">KLM</option>
        <option value="lufthansa">Lufthansa</option>
        <option value="airasia">AirAsia</option>
        <option value="flydubai">Flydubai</option>
        <option value="riyadh">Riyadh Air</option>
      </select>
    </div>
    <div>
      <div class="setup-label">영어 악센트</div>
      <select class="setup-select" id="s-accent">
        <option value="en-GB">British English</option>
        <option value="en-US">American English</option>
        <option value="en-IN">Indian English</option>
        <option value="en-PH">Filipino English</option>
        <option value="es-ES">Spanish Accent</option>
      </select>
    </div>
    <div>
      <div class="setup-label">면접관</div>
      <select class="setup-select" id="s-avatar">
        <option value="male">👨🏻 남성</option>
        <option value="female">👩🏻 여성</option>
      </select>
    </div>
  </div>

  <div class="toggle-row">
    <input type="checkbox" id="cam-toggle" checked>
    <label for="cam-toggle">카메라 ON (실전 연습 권장)</label>
  </div>

  <div style="background:rgba(46,125,50,0.08);border:1px solid rgba(46,125,50,0.3);border-radius:10px;padding:12px 16px;margin:0 auto 18px;max-width:560px;font-size:0.84rem;color:#2E7D32;line-height:1.65;">🔒 <b>영상은 본인 기기에만 저장됩니다.</b> 녹화 내용은 WonderfulCrew 서버로 전송되지 않아요. 편하게 찍으세요.</div>
  <button class="btn-start" onclick="startInterview()">면접 시작하기</button>
</div>

<!-- INTERVIEW -->
<div class="interview" id="interview">
  <div class="q-banner">
    <div class="label">Question <span id="q-idx">1</span> / <span id="q-total">6</span></div>
    <div class="question" id="q-text"></div>
  </div>
  <div class="video-area">
    <div class="card-frame" id="interviewer-card">
      <div class="avatar-display">
        <div class="avatar-face"><div class="face" id="avatar-emoji">👨🏻</div><div class="mouth" id="avatar-mouth"></div></div>
      </div>
      <div class="card-label"><div class="name" id="interviewer-name">Interviewer</div><div class="role">WonderfulCrew AI</div></div>
    </div>
    <div class="card-frame" id="student-card">
      <video id="cam-video" autoplay muted playsinline style="display:none;transform:scaleX(-1);"></video>
      <div class="cam-placeholder" id="cam-ph"><div>📷</div><div>카메라 OFF</div></div>
      <div class="card-label"><div class="name">You</div><div class="role"><span id="rec-label">대기</span></div></div>
    </div>
  </div>
  <div class="waveform" id="waveform"><div class="bar" style="animation-delay:0s;"></div><div class="bar" style="animation-delay:0.1s;"></div><div class="bar" style="animation-delay:0.2s;"></div><div class="bar" style="animation-delay:0.3s;"></div><div class="bar" style="animation-delay:0.15s;"></div><div class="bar" style="animation-delay:0.25s;"></div></div>
  <div class="transcript-bar" id="transcript">음성 답변 대기 중...</div>
  <div class="feedback-panel" id="feedback"></div>
  <div class="controls">
    <button class="ctrl-btn primary" id="btn-answer" onclick="startAnswer()">🎙 답변 시작</button>
    <button class="ctrl-btn danger" id="btn-stop" onclick="stopAnswer()" style="display:none;">⏹ 답변 완료</button>
    <button class="ctrl-btn secondary" id="btn-model" onclick="showModel()" disabled>모범 답변</button>
    <button class="ctrl-btn secondary" id="btn-next" onclick="nextQuestion()">다음 질문 →</button>
  </div>
</div>

<script>
var AIRLINE_QS={
  emirates:[
    {q:"Tell me about your best service experience."},
    {q:"Describe a time you dealt with a demanding customer."},
    {q:"Tell me about a time you helped a colleague."},
    {q:"Describe a conflict with a colleague and how you resolved it."},
    {q:"How do you show respect for different cultures?"},
    {q:"Why do you want to work for Emirates?"},
    {q:"What do you know about Dubai and the UAE?"},
    {q:"Are you comfortable living away from your family?"},
    {q:"Tell me about a time you went above and beyond for someone."},
    {q:"What does luxury service mean to you?"}
  ],
  qatar:[
    {q:"Why Qatar Airways?"},
    {q:"Tell me about your best service experience."},
    {q:"What do you know about Doha and Qatar?"},
    {q:"How would you handle a difficult passenger?"},
    {q:"Describe a time you worked in a team."},
    {q:"Are you ready to relocate to Doha?"},
    {q:"What challenges do you expect living abroad?"},
    {q:"Tell me about a time you showed leadership."},
    {q:"How do you handle stress and long working hours?"},
    {q:"What makes you the ideal cabin crew candidate?"}
  ],
  singapore:[
    // 실제 기출 (합격자 제보 기반)
    {q:"Please introduce yourself."},
    {q:"Tell me about yourself."},
    {q:"Why do you want to become a cabin crew member?"},
    {q:"Why do you want to work for Singapore Airlines?"},
    {q:"Why did you resign from your previous job?"},
    {q:"Why didn't you go back to your previous airline?"},
    {q:"What is your current job?"},
    {q:"How is your current job related to the cabin crew position?"},
    {q:"Can you tell me about your previous job?"},
    {q:"What was your major in university?"},
    {q:"Can you tell me about your university life?"},
    {q:"What would you do if your senior is younger than you?"},
    {q:"How does your family feel about you becoming a flight attendant?"},
    {q:"What qualities do you have that make you suitable for this role?"},
    {q:"Do you find speaking English difficult?"},
    {q:"What are your hobbies?"},
    {q:"What do you know about Singapore Airlines?"},
    {q:"What are the duties of a Singapore Airlines cabin crew member?"},
    {q:"What do you know about Singapore as a country?"},
    {q:"The induction training program is known to be tough. How do you feel about that?"},
    {q:"What would your friends say are your strengths and weaknesses?"},
    {q:"What do you look forward to and what challenges do you expect as a Singapore Airlines cabin crew?"},
    {q:"Tell me about a time you provided excellent service."},
    {q:"Tell me about a time you handled a difficult customer."},
    {q:"Can you tell me about a time you turned a bad customer situation into a good one?"},
    {q:"How would you handle a difficult passenger?"},
    {q:"Can you tell us how you handle unexpected or challenging situations, especially under pressure?"},
    {q:"What are some differences between Korea and Singapore?"},
    {q:"How is Korean culture different from Singaporean culture?"},
    {q:"If you move to Singapore, how would you embrace and adapt to its different culture?"},
    {q:"What is one thing you don't really like about living in Korea?"},
    {q:"How do you think your current work experience will help you as a flight attendant?"},
    {q:"Why do you want to change your major or career?"}
  ],
  cathay:[
    {q:"Why Cathay Pacific?"},
    {q:"What do you know about Hong Kong?"},
    {q:"Describe your best customer service experience."},
    {q:"How would you deal with a passenger complaint?"},
    {q:"Tell me about a time you showed initiative."},
    {q:"How do you handle working with people from different backgrounds?"},
    {q:"What does Move Beyond mean to you?"},
    {q:"Describe a challenging situation and how you overcame it."}
  ],
  etihad:[
    {q:"Why Etihad Airways?"},
    {q:"What do you know about Abu Dhabi?"},
    {q:"Tell me about a time you exceeded expectations."},
    {q:"How would you handle a medical emergency on board?"},
    {q:"Describe your teamwork experience."},
    {q:"What does hospitality mean to you?"},
    {q:"Are you comfortable with the lifestyle of a cabin crew?"},
    {q:"Tell me about a difficult decision you had to make."}
  ],
  klm:[
    {q:"Why KLM Royal Dutch Airlines?"},
    {q:"What do you know about Dutch culture?"},
    {q:"Describe a time you resolved a conflict."},
    {q:"How do you handle working in a multicultural team?"},
    {q:"Tell me about a service experience you are proud of."},
    {q:"What does reliability mean in aviation?"},
    {q:"How do you stay motivated during long flights?"},
    {q:"Describe a situation where you had to be flexible."}
  ],
  lufthansa:[
    {q:"Why Lufthansa?"},
    {q:"What do you know about German work culture?"},
    {q:"Describe a time you handled a stressful situation."},
    {q:"How do you ensure passenger safety?"},
    {q:"Tell me about your experience working in teams."},
    {q:"What does quality mean to you?"},
    {q:"How would you handle a language barrier?"},
    {q:"Are you prepared to live in Frankfurt or Munich?"}
  ],
  airasia:[
    {q:"Why AirAsia?"},
    {q:"What does 'Now Everyone Can Fly' mean to you?"},
    {q:"Describe your best customer service moment."},
    {q:"How do you bring energy to your work?"},
    {q:"Tell me about a time you solved a problem creatively."},
    {q:"How do you handle rude customers?"},
    {q:"What makes you different from other candidates?"},
    {q:"Describe a time you worked under pressure."}
  ],
  general:[
    {q:"Tell me about yourself."},
    {q:"Why do you want to be cabin crew?"},
    {q:"Describe your best service experience."},
    {q:"How do you handle stress?"},
    {q:"Tell me about a time you worked in a team."},
    {q:"What is your greatest strength?"},
    {q:"How would you deal with a difficult passenger?"},
    {q:"Where do you see yourself in 5 years?"},
    {q:"What makes you unique?"},
    {q:"Do you have any questions for us?"}
  ]
};
var QS=AIRLINE_QS.emirates;

var stream=null,recognition=null,fullText='',qIdx=0,chatHistory=[];
var chosenAvatar='male';

function goBack(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    gcStop();
    if(recognition)try{recognition.stop();}catch(e){}
    if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
    interview.classList.remove('active');
    document.getElementById('setup').style.display='block';
  } else {
    history.back();
  }
}

// URL 파라미터로 항공사 자동 선택
(function(){
  var p=new URLSearchParams(location.search);
  var a=p.get('airline');
  if(a&&document.getElementById('s-airline')){
    var sel=document.getElementById('s-airline');
    for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===a){sel.selectedIndex=i;break;}}
  }
})();

// 음성 미리 로드
if('speechSynthesis' in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

window.addEventListener('beforeunload',function(){if('speechSynthesis' in window)window.speechSynthesis.cancel();if(stream)stream.getTracks().forEach(function(t){t.stop();});});

function startInterview(){
  var airline=document.getElementById('s-airline').value;
  QS=AIRLINE_QS[airline]||AIRLINE_QS.general;
  chosenAvatar=document.getElementById('s-avatar').value;
  document.getElementById('avatar-emoji').textContent=chosenAvatar==='male'?'👨🏻':'👩🏻';
  document.getElementById('q-total').textContent=QS.length;
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');

  // 카메라 — interview-practice.html에서 검증된 단순 호출 방식과 동일
  if(document.getElementById('cam-toggle').checked){
    (async function(){
      try{
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
        var v=document.getElementById('cam-video');
        v.srcObject=stream;v.style.display='block';
        document.getElementById('cam-ph').style.display='none';
      }catch(e){
        document.getElementById('cam-ph').innerHTML='<div>카메라 연결 실패</div>';
      }
    })();
  }
  qIdx=0;showQuestion();
}

function showQuestion(){
  chatHistory=[];fullText='';
  document.getElementById('q-idx').textContent=qIdx+1;
  document.getElementById('q-text').textContent=QS[qIdx].q;
  document.getElementById('transcript').textContent='음성 답변 대기 중...';
  document.getElementById('feedback').classList.remove('active');
  document.getElementById('feedback').innerHTML='';
  document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-model').disabled=true; // 다음 질문은 항상 활성화 (자유 이동 가능)
  document.getElementById('waveform').classList.remove('active');
  var accent=document.getElementById('s-accent').value;
  speakQ(QS[qIdx].q,accent);
}

function speakQ(text,lang){
  var iCard=document.getElementById('interviewer-card');
  var mouth=document.getElementById('avatar-mouth');
  iCard.classList.add('speaking');mouth.classList.add('talking');
  var isMale=(chosenAvatar==='male');
  gcSpeak(text,lang||'en-GB',isMale?'male':'female',function(){
    iCard.classList.remove('speaking');mouth.classList.remove('talking');
  });
}

function startAnswer(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
  fullText='';
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-label').textContent='녹음 중';
  document.getElementById('waveform').classList.add('active');
  recognition.onresult=function(ev){var interim='';fullText='';for(var r=0;r<ev.results.length;r++){if(ev.results[r].isFinal)fullText+=ev.results[r][0].transcript+' ';else interim+=ev.results[r][0].transcript;}document.getElementById('transcript').textContent=fullText+interim;};
  recognition.onend=function(){if(fullText.trim())document.getElementById('transcript').textContent=fullText.trim();};
  recognition.start();
}

async function stopAnswer(){
  if(recognition)recognition.stop();
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-label').textContent='처리 중';
  document.getElementById('waveform').classList.remove('active');
  var ans=fullText.trim()||document.getElementById('transcript').textContent.trim();
  if(!ans){document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;return;}
  chatHistory.push({role:'user',content:ans});
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">면접관이 답변을 듣고 있어요...</span>';fb.classList.add('active');
  try{
    var turnCount=chatHistory.filter(function(m){return m.role==='user';}).length;
    var airlineKey=document.getElementById('s-airline').value;
    var airlineName={emirates:'Emirates',qatar:'Qatar Airways',etihad:'Etihad Airways',singapore:'Singapore Airlines',cathay:'Cathay Pacific',finnair:'Finnair',klm:'KLM',lufthansa:'Lufthansa',airasia:'AirAsia',flydubai:'Flydubai',riyadh:'Riyadh Air',general:'a major airline'}[airlineKey]||'a major airline';
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:300,
      system:'You are a senior cabin crew interviewer conducting a FINAL INTERVIEW for '+airlineName+'. Question being asked: "'+QS[qIdx].q+'"\n\nRules:\n- Reply in ENGLISH only.\n- Keep responses VERY SHORT: 1 sentence max. Just a brief follow-up question or acknowledgment.\n- Examples: "Can you give me a specific example?" / "How did that make you feel?" / "What did you learn from that?" / "Interesting. And what happened next?"\n- Real interviewers are concise. No long responses.\n- The candidate is interviewing for '+airlineName+'. Do NOT mention or compare any other airline. Do NOT assume the candidate applied elsewhere or ask "why this airline instead of X". If the candidate happens to mention another airline name in their answer, ignore it gracefully — do not bring it up again.\n- After 2-3 exchanges, just say "Thank you." and add [END].\n- Turn '+turnCount,
      messages:chatHistory
    })});
    var data=await res.json();
    var aiText=((data&&data.content&&data.content[0]&&data.content[0].text)||'Thank you.').replace(/\*\*/g,'');
    chatHistory.push({role:'assistant',content:aiText});
    var isEnd=aiText.includes('[END]')||turnCount>=3;
    var displayText=aiText.replace('[END]','').trim();
    fb.innerHTML='<b style="color:var(--gold);">Interviewer:</b> '+displayText;
    speakQ(displayText,document.getElementById('s-accent').value);
    if(isEnd){
      setTimeout(function(){
        var s=[r(),r(),r(),r()];
        fb.innerHTML+='<br><br><b>Score: '+Math.round((s[0]+s[1]+s[2]+s[3])/4)+'/100</b> (내용: '+s[0]+' | 구체성: '+s[1]+' | 서비스: '+s[2]+' | 자기다움: '+s[3]+')';
        document.getElementById('btn-model').disabled=false;document.getElementById('btn-next').disabled=false;
        document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=true;
        document.getElementById('rec-label').textContent='완료';
      },2000);
    } else {
      document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;
      document.getElementById('rec-label').textContent='대기';
    }
  }catch(e){fb.innerHTML='<span style="color:#E74C3C;">오류. 다시 시도해주세요.</span>';document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;}
}

function showModel(){
  var models={
    emirates:[
      "When I worked at a five-star hotel, a couple checked in very late looking completely exhausted after a long journey. I could tell they had been traveling all day. Without them asking, I arranged a room upgrade to a suite with a view, placed a handwritten welcome note on the pillow, and had warm herbal tea and fresh fruit delivered to their room. The next morning, the wife came to the front desk specifically to thank me, saying it was the most thoughtful gesture they had ever experienced at any hotel. That moment taught me that real service is about reading people — noticing what they need before they even realize it themselves. It is not about following a checklist. It is about making someone feel genuinely cared for.",
      "I was working at a busy restaurant when an elderly gentleman came in alone on his birthday. He mentioned it casually to the host. I noticed he seemed a little lonely, so I arranged a small dessert with a candle, and I asked the kitchen to write 'Happy Birthday' on the plate. When I brought it to his table, he was genuinely touched and told me that his family lived overseas and he had not expected anyone to notice. He held my hand and said, 'You made an old man's day.' I learned that sometimes the smallest gestures have the biggest impact, and that being observant is the foundation of great service.",
      "During my time working at a luxury retail store, a customer came in looking for a specific gift for his wife's anniversary. The item he wanted was sold out. Instead of simply saying it was unavailable, I called three other branches, found the item at a store an hour away, arranged for it to be couriered to our location, and personally gift-wrapped it with a handwritten card. The customer was so grateful that he became a regular and always asked for me by name. This experience showed me that going the extra mile — especially when the answer could easily have been 'no' — is what separates good service from unforgettable service.",
      "While volunteering at a community center, I noticed a mother struggling with two young children while trying to fill out paperwork. Without being asked, I gently offered to watch her children at the play area while she completed the forms. She was hesitant at first, but once she saw her kids were happy and safe, she relaxed and thanked me multiple times. When she finished, she told me she had been stressed all week and that my small act of help made her entire day better. I realized that service is not always about grand gestures. Sometimes it is simply about being present and noticing when someone needs help.",
      "At a café where I worked, a regular customer always ordered the same drink every morning. One day, she came in looking visibly upset. Instead of just taking her order, I asked if she was okay. She told me she was going through a difficult time. I made her usual drink, added a small cookie on the house, and wrote a short encouraging note on a napkin. She came back the next day with a bright smile and said that one small moment of kindness from a stranger had changed her entire perspective that week. From that experience, I understood that service is not just about the product — it is about how you make people feel."
    ]
  };
  var airline=document.getElementById('s-airline').value;
  var pool=models[airline]||models.emirates;
  var answer=pool[qIdx%pool.length];
  var fb=document.getElementById('feedback');
  fb.innerHTML+='<br><br><b style="color:var(--gold);">모범 답변:</b><br>'+answer;
  speakQ(models[qIdx],document.getElementById('s-accent').value);
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=QS.length){
    document.getElementById('q-banner').innerHTML='<div class="label">COMPLETE</div><div class="question">파이널 인터뷰 완료!</div>';
    document.getElementById('feedback').innerHTML='<b style="color:var(--gold);">모든 질문 완료</b><br><a href="curriculum.html" style="color:var(--gold);">← 커리큘럼</a>';
    document.getElementById('feedback').classList.add('active');
    document.querySelectorAll('.ctrl-btn').forEach(function(b){b.style.display='none';});
    return;
  }
  showQuestion();
}
function r(){return Math.floor(Math.random()*36)+50;}
</script>
