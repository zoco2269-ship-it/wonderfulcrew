logo{font-size:1.1rem!important;}}

<div class="setup" id="setup">
  <div class="tag">SMALLTALK · 1:1 · ENGLISH</div>
  <h1 id="sm-title">CV Drop <em>스몰톡</em></h1>
  <p>실제 CV Drop에서 면접관이 먼저 길게 인사하지 않아요.<br>본인이 먼저 인사하고 시작합니다.</p>
  <div style="background:rgba(201,168,76,0.1);border-left:3px solid var(--gold);padding:14px 18px;margin:0 auto 18px;text-align:left;font-size:0.9rem;color:rgba(255,255,255,0.9);line-height:1.8;max-width:460px;">
    <b style="color:var(--gold);">예시 (이런 식으로 시작하세요)</b><br>
    "Good morning, my name is Kate, nice to meet you."
  </div>
  <button class="btn-start" id="btn-start" onclick="startSmalltalk()">스몰톡 시작</button>

<!-- SESSION -->
<div class="session" id="session">
  <div class="video-area">
    <div class="card-frame" id="card-ai">
      <div class="avatar-display" style="font-size:3rem;">👩🏻</div>
      <div class="card-label"><div class="name">Interviewer</div></div>
    </div>
    <div class="card-frame" id="my-card">

<script>
var recognition=null, fullText='', dialogue=[];
var BACK_URL='practice-foreign.html';

// 첫 질문 랜덤 — Cabin Crew 동기 또는 Why this airline 중 하나
var FIRST_QUESTIONS=[
  'Why do you want to apply for cabin crew?',
  'Why do you want to join our airline?',
  'Why this airline?',
  'What made you interested in cabin crew?'
];
var firstQ=FIRST_QUESTIONS[Math.floor(Math.random()*FIRST_QUESTIONS.length)];
var SYS_FIRSTTURN='You are an airline CV Drop interviewer. Candidate just greeted you. Respond with ONE very short acknowledgment (e.g., "Good morning!" or "Nice to meet you too.") + ask "'+firstQ+'" in the same message. Under 15 words total. English only. No quotation marks.';
var SYS_FOLLOWUP='You are an airline CV Drop interviewer. ONE short line, under 15 words. Brief reaction + one natural follow-up question based on what the candidate just said. Casual, warm. No "Tell me about a time" style. English only.';
var SYS_CLOSING='You are an airline CV Drop interviewer. The small talk is wrapping up. Give a warm natural closing in ONE short line (under 15 words). Example: "Thank you for coming today, nice meeting you!" / "Great talking with you, all the best!" No question. English only.';

// 제목에 항공사명 반영
// interviewer 카드 회사명도 반영
try{var roleLbl=document.querySelector('#card-ai .card-label .role, #card-ai [style*="var(--gold-light)"]');}catch(e){}

function goBack(){fullCleanup();var s=document.getElementById('session');if(s&&s.classList.contains('active')){s.classList.remove('active');document.getElementById('setup').style.display='block';}else{history.back();}}
function fullCleanup(){
  if('speechSynthesis' in window)try{window.speechSynthesis.cancel();}catch(e){}
  if(typeof gcStop==='function')try{gcStop();}catch(e){}
  try{if(recognition){recognition.onend=null;recognition.stop();recognition=null;}}catch(e){}
  try{if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}}catch(e){}
  try{var v=document.getElementById('cam-video');if(v){v.pause();v.srcObject=null;}}catch(e){}
  faceActive=false;
  if(faceInterval){clearInterval(faceInterval);faceInterval=null;}
}
window.addEventListener('beforeunload',fullCleanup);
window.addEventListener('pagehide',fullCleanup);

function appendChat(who,text,isTmp){
  var el=document.getElementById('chat');
  var label=who==='ai'?'Interviewer':'You';
  var cls=isTmp?' thinking':'';
  el.innerHTML+='<div class="turn"'+(isTmp?' id="tmp-turn"':'')+'><div class="speaker '+(who==='user'?'user':'')+'">'+label+'</div><div class="text'+cls+'">'+text+'</div></div>';
  el.scrollTop=el.scrollHeight;
}

var camStream=null;
// MediaPipe 얼굴 분석
var faceStats={smileFrames:0,totalFrames:0};
var faceMeshInstance=null, faceActive=false, faceInterval=null;
function initFaceMesh(videoEl){
  if(!window.FaceMesh)return;
  try{
    faceMeshInstance=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
    faceMeshInstance.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMeshInstance.onResults(function(r){
      if(!faceActive)return;
      faceStats.totalFrames++;
      if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
        var lm=r.multiFaceLandmarks[0];
        var lipL=lm[61],lipR=lm[291],lipTop=lm[13],lipBot=lm[14];
        var faceL=lm[234],faceR=lm[454];
        var cornerY=(lipL.y+lipR.y)/2;
        var lipMidY=(lipTop.y+lipBot.y)/2;
        var cornerLift=lipMidY-cornerY;
        var mouthW=Math.abs(lipR.x-lipL.x);
        var faceW=Math.abs(faceR.x-faceL.x);
        var widthRatio=faceW>0?(mouthW/faceW):0;
        if(cornerLift>0.003 || widthRatio>0.44) faceStats.smileFrames++;
      }
    });
    faceInterval=setInterval(function(){
      if(faceActive&&videoEl.readyState>=2)try{faceMeshInstance.send({image:videoEl});}catch(e){}
    },500);
  }catch(e){}
}
function getSmilePct(){
  if(faceStats.totalFrames<5)return null;
  return Math.round((faceStats.smileFrames/faceStats.totalFrames)*100);
}

async function startCamera(){
  if(camStream)return;
  var attempts=[{video:{facingMode:{exact:'user'}},audio:false},{video:{facingMode:'user'},audio:false},{video:true,audio:false}];
  for(var i=0;i<attempts.length;i++){
    try{
      camStream=await navigator.mediaDevices.getUserMedia(attempts[i]);
      var v=document.getElementById('cam-video');
      v.srcObject=camStream;v.style.display='block';
      document.getElementById('cam-ph').style.display='none';
      // 얼굴 분석 시작
      faceStats={smileFrames:0,totalFrames:0};
      faceActive=true;
      initFaceMesh(v);
      return;
    }catch(e){}
  }
  document.getElementById('cam-ph').innerHTML='카메라<br>연결 실패';
}

function startSmalltalk(){
  document.getElementById('setup').style.display='none';
  document.getElementById('session').classList.add('active');
  history.pushState({smalltalk:true},'','');
  dialogue=[];
  document.getElementById('chat').innerHTML='';
  document.getElementById('feedback').classList.remove('active');
  document.getElementById('feedback').innerHTML='';
  startCamera();
  // 지망생이 먼저 인사하도록 안내만 표시. AI는 대기.
  appendChat('ai','(Please start with your greeting in English.)');
  document.getElementById('btn-answer').style.display='inline-flex';
  document.getElementById('btn-answer').disabled=false;
  document.getElementById('btn-end').style.display='inline-flex';
  document.getElementById('transcript').textContent='🎙 Start by greeting the interviewer in English.';
}

async function startAnswer(){
  if(typeof gcStop==='function')gcStop();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('transcript').textContent='크롬 브라우저에서 사용해주세요.';return;}
  // 모바일: 명시적으로 마이크 권한 요청 후 즉시 해제
  try{
    var tmpStream=await navigator.mediaDevices.getUserMedia({audio:true});
    tmpStream.getTracks().forEach(function(t){t.stop();});
  }catch(e){
    document.getElementById('transcript').textContent='마이크 접근 권한을 허용해주세요. (주소창 옆 마이크 아이콘)';
    return;
  }
  recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
  fullText='';window._manualStop=false;
  // 전역 dedupe — 모든 세션의 final 을 정규화 키로 한 번씩만 수집
  window._finalSeen={};
  window._finalList=[];
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('transcript').textContent='🎙 Listening…';
  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    fullText=window._finalList.join(' ');
    var disp=(fullText+(interim?' '+interim:'')).trim();
    document.getElementById('transcript').textContent=disp||'🎙 Listening…';
  };
  recognition.onerror=function(ev){
    var c=ev.error||'';
    if(c==='no-speech'||c==='aborted')return;
    if(c==='not-allowed'||c==='service-not-allowed'){
      document.getElementById('transcript').textContent='마이크 권한이 차단되었습니다.';
      document.getElementById('btn-answer').style.display='inline-flex';
      document.getElementById('btn-stop').style.display='none';
    }else if(c==='audio-capture'){
      document.getElementById('transcript').textContent='마이크를 인식할 수 없습니다.';
    }
  };
  recognition.onend=function(){
    if(window._manualStop)return;
    setTimeout(function(){
      if(window._manualStop)return;
      try{
        var SR2=window.SpeechRecognition||window.webkitSpeechRecognition;
        var r2=new SR2();
        r2.lang='en-US';r2.interimResults=true;r2.continuous=true;
        r2.onresult=recognition.onresult;
        r2.onerror=recognition.onerror;
        r2.onend=recognition.onend;
        recognition=r2;
        r2.start();
      }catch(e){}
    },1500);
  };
  try{recognition.start();}catch(e){document.getElementById('transcript').textContent='마이크 시작 실패';}
}

async function stopAnswer(){
  window._manualStop=true;
  if(recognition)try{recognition.onend=null;recognition.stop();}catch(e){}
  // 현 세션 최종문 커밋 (onend 을 nullify 했으므로 수동으로)
  fullText+=(window._sessionFinal||'');window._sessionFinal='';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('waveform').classList.remove('active');
  var ans=fullText.trim();
  if(!ans){document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('transcript').textContent='Try again — speak in English.';return;}
  dialogue.push({who:'user',text:ans});
  appendChat('user',ans);
  // "thinking" 플레이스홀더 즉시 표시 (체감 속도 향상)
  appendChat('ai','...',true);
  document.getElementById('transcript').textContent='Interviewer is thinking...';

  // 사용자 발화 횟수 기반으로 플로우 결정
  // userTurns=1 (인사만) → FIRSTTURN (ack + Q1)
  // userTurns=2 → FOLLOWUP (Q2)
  // userTurns=3 → FOLLOWUP (Q3)
  // userTurns=4 → CLOSING + 자동 종료 (꼬리질문 3개 완료)
  var userTurns=dialogue.filter(function(d){return d.who==='user';}).length;
  var isFirst=userTurns===1;
  var isClosing=userTurns>=4;
  var sys=isFirst?SYS_FIRSTTURN:(isClosing?SYS_CLOSING:SYS_FOLLOWUP);
  var recent=isFirst
    ?'Candidate greeted: '+ans
    :dialogue.slice(-6).filter(function(d){return d.text.indexOf('(Please start')!==0;}).map(function(d){return (d.who==='ai'?'Interviewer: ':'You: ')+d.text;}).join('\n');
  try{
    var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:60,system:sys,
      messages:[{role:'user',content:recent}]
    })});
    var data=await r.json();
    var txt=((data&&data.content&&data.content[0]&&data.content[0].text)||(isClosing?'Thank you for coming today, nice meeting you!':'That sounds nice! And how did you get here today?')).replace(/\*\*/g,'').replace(/^Interviewer:\s*/i,'').trim();
    dialogue.push({who:'ai',text:txt});
    var tmp=document.getElementById('tmp-turn');if(tmp)tmp.remove();
    appendChat('ai',txt);

    if(isClosing){
      // 3번째 꼬리질문 완료 → AI 의 마무리 멘트가 끝난 뒤 피드백 진입
      document.getElementById('btn-answer').style.display='none';
      document.getElementById('btn-end').style.display='none';
      document.getElementById('transcript').textContent='Small talk completed. Generating feedback...';
      var _closingDone=false;
      var _closeAndFeedback=function(){if(_closingDone)return;_closingDone=true;endSession();};
      // TTS 완료 후 피드백 — gcSpeak callback 사용
      if(typeof gcSpeak==='function'){
        gcSpeak(txt,'en-GB','female',function(){setTimeout(_closeAndFeedback,400);});
      }
      // 안전 폴백: 글자 수 기반 최대 대기 (단어당 약 350ms + 여유 1.5초), 혹은 20초 하드캡
      var _ttsFallbackMs=Math.min(20000, Math.max(4000, txt.length*120 + 1500));
      setTimeout(_closeAndFeedback, _ttsFallbackMs);
      return;
    }

    if(typeof gcSpeak==='function')gcSpeak(txt,'en-GB','female',function(){});

    // 계속 진행
    document.getElementById('btn-answer').style.display='inline-flex';
    document.getElementById('transcript').textContent='Your turn — press 🎙 to answer.';
  }catch(e){
    var tmp=document.getElementById('tmp-turn');if(tmp)tmp.remove();
    appendChat('ai','Sorry, could you say that again?');
    dialogue.push({who:'ai',text:'Sorry, could you say that again?'});
    document.getElementById('btn-answer').style.display='inline-flex';
  }
}

// 미소 강조 멘트 (매 세션 랜덤 선택해서 반복 방지)
var SMILE_EMPHASIS_POOL=[
  {high:"😊 미소가 CV Drop의 시작이자 끝이에요. 지금 리듬 그대로, 면접장에서도 자연스럽게 유지하세요.",
   mid:"😊 CV Drop에서는 웃음이 첫인상을 결정합니다. 조금 더 활짝 — 이 한 가지만 더 챙기면 확 달라져요.",
   low:"😊 CV Drop은 미소 하나로 합격이 갈립니다. 첫 문장부터 끝 인사까지 절대 표정을 놓치지 마세요."},
  {high:"🌟 면접관이 가장 먼저 보는 건 미소예요. 이 톤을 끝까지 유지하면 그게 바로 합격의 키입니다.",
   mid:"🌟 미소는 연습으로 늘어요. 거울 앞에서 말하면서 웃는 훈련을 매일 5분씩, 그게 핵심이에요.",
   low:"🌟 CV Drop에서 미소 없는 답변은 내용이 아무리 좋아도 기억에 안 남습니다. 무조건 미소 먼저."},
  {high:"✨ 지금처럼 자연스러운 웃음이 CV Drop의 90%예요. 이 에너지가 합격을 만듭니다.",
   mid:"✨ 웃으면서 말하는 연습, 집에서도 녹화하면서 확인해보세요. 영어 잘하는 것보다 이게 훨씬 중요해요.",
   low:"✨ 에미레이트·카타르·싱가포르 모두 '미소가 없으면 탈락'이 기본 원칙. 여기서 면접이 결정됩니다."},
  {high:"💫 표정의 일관성이 대단해요. 첫인상도 마무리도 똑같이 환하게 — 이게 CV Drop 합격 DNA입니다.",
   mid:"💫 '말 + 미소'를 동시에 — 둘 중 하나라도 놓치면 감점이에요. 웃으면서 말하는 훈련 꾸준히.",
   low:"💫 심사관은 1초 안에 판단합니다. 10초도 안 걸려요. 다음엔 '이미 웃고 들어간다'는 생각으로."}
];

async function endSession(){
  if('speechSynthesis' in window)try{window.speechSynthesis.cancel();}catch(e){}
  if(typeof gcStop==='function')try{gcStop();}catch(e){}
  try{if(recognition){recognition.onend=null;recognition.stop();recognition=null;}}catch(e){}
  faceActive=false;
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-end').style.display='none';
  var fb=document.getElementById('feedback');fb.classList.add('active');
  var userTurns=dialogue.filter(function(d){return d.who==='user';}).length;
  if(userTurns===0){fb.innerHTML='<b style="color:#E74C3C;">본인 발언이 없어 피드백 불가.</b>';return;}
  fb.innerHTML='<b style="color:var(--gold);">피드백 작성 중...</b>';
  var userAnswers=dialogue.filter(function(d){return d.who==='user';}).map(function(d,i){return (i+1)+'. '+d.text;}).join('\n');

  // 미소 점수 계산 + 레벨별 멘트 랜덤 선택
  var smilePct=getSmilePct();
  var smileBlock='';
  var smileSet=SMILE_EMPHASIS_POOL[Math.floor(Math.random()*SMILE_EMPHASIS_POOL.length)];
  if(smilePct===null){
    smileBlock='<div style="margin-top:10px;padding:10px 14px;background:rgba(201,168,76,0.12);border-left:3px solid var(--gold);font-size:0.84rem;line-height:1.7;">'+smileSet.low+'</div>';
  } else {
    var lvl=smilePct>=60?'high':smilePct>=30?'mid':'low';
    var msg=smileSet[lvl];
    var color=lvl==='high'?'#2E7D32':lvl==='mid'?'#E65100':'#C62828';
    smileBlock='<div style="margin-top:10px;padding:12px 14px;background:rgba(201,168,76,0.12);border-left:3px solid var(--gold);font-size:0.86rem;line-height:1.75;">'+
      '<div style="font-size:0.76rem;color:var(--gold);letter-spacing:0.08em;font-weight:700;margin-bottom:6px;">SMILE SCORE · 미소 점수</div>'+
      '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:8px;"><div style="font-family:DM Serif Display,serif;font-size:1.8rem;color:'+color+';">'+smilePct+'%</div><div style="font-size:0.78rem;color:rgba(255,255,255,0.55);">(측정 '+faceStats.totalFrames+'프레임 중 '+faceStats.smileFrames+'프레임 미소 감지)</div></div>'+
      '<div>'+msg+'</div></div>';
  }

  try{
    var r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:220,
      system:'CV Drop 스몰톡 코치. 본인 답변만 평가. 한국어로 매우 짧게.\n\n규칙:\n- 점수·칭찬·팁 3줄만.\n- 팁은 내용 전달력·발음·표현 등 답변 관련만. 미소 관련 코멘트는 절대 넣지 말 것 (시스템이 따로 표시함).\n\n출력 형식:\n점수: X/100\n한 줄 칭찬: (답변 중 한 구절 인용)\n한 줄 팁: (가장 중요한 개선 1개. 없으면 "지금 흐름 유지하세요.")',
      messages:[{role:'user',content:'본인 답변:\n'+userAnswers}]
    })});
    var d=await r.json();
    var fbText=((d&&d.content&&d.content[0]&&d.content[0].text)||'피드백 생성 실패').replace(/\*\*/g,'');
    fb.innerHTML='<b style="color:var(--gold);">스몰톡 피드백</b><br><br><div style="white-space:pre-line;">'+fbText+'</div>'+
      smileBlock+
      '<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">'+
      '<button onclick="startSmalltalk()" style="padding:10px 22px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:22px;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;">🔄 더 연습하기</button>'+
      '<a href="'+BACK_URL+'" style="color:var(--gold);font-size:0.82rem;">← 커리큘럼으로</a>'+
      '</div>';
  }catch(e){fb.innerHTML='<b style="color:#E74C3C;">피드백 생성 실패.</b>';}
}
</script>
