<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스몰톡 연습 (핑퐁) · WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);flex-shrink:0;}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.55);}.nav-back:hover{color:var(--gold);}

.setup{padding:36px 20px;text-align:center;max-width:600px;margin:0 auto;overflow-y:auto;}
.setup .tag{display:inline-block;padding:5px 14px;background:rgba(201,168,76,0.15);border:1px solid var(--gold);color:var(--gold-light);font-size:0.7rem;letter-spacing:0.18em;border-radius:14px;margin-bottom:12px;font-family:'DM Serif Display',serif;font-weight:700;}
.setup h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;margin-bottom:8px;}
.setup h1 em{font-style:normal;color:var(--gold);}
.setup p{color:rgba(255,255,255,0.65);font-size:0.84rem;line-height:1.7;margin-bottom:18px;}
.btn-start{padding:14px 36px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;border:none;border-radius:26px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;}
.btn-start:disabled{opacity:0.5;cursor:wait;}

.session{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;}
.session.active{display:flex;}
.chat{flex:1;overflow-y:auto;padding:16px 22px;background:rgba(0,0,0,0.2);}
.chat .turn{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.chat .turn:last-child{border-bottom:none;}
.chat .speaker{font-size:0.74rem;color:var(--gold);font-weight:700;letter-spacing:0.06em;margin-bottom:5px;}
.chat .speaker.user{color:var(--gold-light);}
.chat .text{font-size:0.94rem;line-height:1.7;color:rgba(255,255,255,0.88);}
.chat .thinking{color:rgba(255,255,255,0.4);font-style:italic;}

.transcript-bar{padding:9px 22px;background:rgba(255,255,255,0.04);font-size:0.82rem;color:rgba(255,255,255,0.65);min-height:34px;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;}
.waveform{height:20px;display:flex;align-items:center;justify-content:center;gap:3px;flex-shrink:0;}
.waveform .bar{width:3px;background:var(--gold);border-radius:2px;opacity:0.4;animation:wave 0.5s ease-in-out infinite alternate;}
.waveform.active .bar{opacity:1;}
@keyframes wave{0%{height:4px;}100%{height:18px;}}
.feedback-panel{display:none;padding:14px 22px;background:rgba(201,168,76,0.08);border-top:1px solid rgba(201,168,76,0.18);font-size:0.88rem;color:rgba(255,255,255,0.88);line-height:1.7;max-height:30vh;overflow-y:auto;flex-shrink:0;}
.feedback-panel.active{display:block;}
.feedback-panel b{color:var(--gold);}
.controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 20px;background:rgba(17,27,46,0.95);border-top:1px solid rgba(201,168,76,0.15);flex-wrap:wrap;flex-shrink:0;}
.ctrl-btn{padding:11px 22px;border:none;border-radius:22px;font-family:inherit;font-size:0.84rem;font-weight:600;cursor:pointer;}
.ctrl-btn:disabled{opacity:0.4;cursor:not-allowed;}
.ctrl-btn.primary{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.ctrl-btn.danger{background:#E74C3C;color:#fff;}
.ctrl-btn.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-gate.js"></script>
<script src="js/google-tts.js"></script>
<script src="js/free-trial.js"></script>
</head>
