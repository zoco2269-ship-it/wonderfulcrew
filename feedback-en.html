<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Feedback — WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--text-dark);}a{color:inherit;text-decoration:none;}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:72px;background:rgba(250,247,240,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.2);}.nav-logo{font-family:"DM Serif Display",serif;font-size:1.5rem;font-weight:400;color:var(--navy);}.nav-logo span{color:var(--gold);}
.hero{background:var(--navy);color:#fff;padding:130px 5% 60px;text-align:center;}.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:300;margin-bottom:10px;}.hero h1 em{font-style:normal;color:var(--gold-light);font-weight:600;}.hero p{color:rgba(255,255,255,0.7);font-size:0.92rem;max-width:500px;margin:0 auto;line-height:1.8;}
section{padding:60px 5%;}.wrap{max-width:600px;margin:0 auto;}
.card{background:#fff;border:1px solid var(--gold-pale);border-left:4px solid var(--gold);padding:28px;}
.card label{display:block;font-size:0.82rem;color:var(--text-muted);font-weight:600;margin-bottom:4px;margin-top:16px;}
.card select,.card input,.card textarea{width:100%;padding:10px 12px;border:1px solid var(--gold-pale);border-radius:8px;font-family:inherit;font-size:0.88rem;}
.card textarea{min-height:140px;resize:vertical;}
.btn-gold{display:inline-flex;padding:14px 32px;background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#fff;border:none;border-radius:24px;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:20px;}
.success{display:none;text-align:center;padding:40px;background:#fff;border:1px solid var(--gold-pale);}
.success .icon{font-size:3rem;margin-bottom:16px;}
.success h2{font-family:'DM Serif Display',serif;color:var(--navy);margin-bottom:8px;}
.success p{color:var(--text-muted);font-size:0.88rem;}
footer{padding:50px 5%;background:var(--navy);color:rgba(255,255,255,0.6);text-align:center;font-size:0.82rem;}
</style>
</head>
<body>
<nav><a href="index-en.html" class="nav-logo">Wonderful<span>Crew</span></a></nav>

<div class="hero">
  <h1>Leave <em>Feedback</em></h1>
  <p>Help us improve WonderfulCrew. We carefully read every piece of feedback.</p>
</div>

<section><div class="wrap">
<div class="card" id="form">
  <label>Name</label>
  <input type="text" id="fb-name" placeholder="Your name">
  <label>Email</label>
  <input type="email" id="fb-email" placeholder="Your email">
  <label>Phone</label>
  <input type="tel" id="fb-phone" placeholder="Your phone number">
  <label>Category</label>
  <select id="fb-cat">
    <option>Feature request</option>
    <option>Bug report</option>
    <option>Content suggestion</option>
    <option>Praise / Thanks</option>
    <option>Other</option>
  </select>
  <label>Feedback</label>
  <textarea id="fb-body" placeholder="Write freely here."></textarea>
  <button class="btn-gold" onclick="submitFB()">Submit Feedback</button>
</div>
<div class="success" id="success">
  <div class="icon">✓</div>
  <h2>Thank you!</h2>
  <p>Your feedback has been submitted.<br>We will keep improving WonderfulCrew.</p>
  <a href="index-en.html" style="display:inline-block;margin-top:20px;padding:10px 24px;background:var(--navy);color:#fff;border-radius:22px;font-size:0.84rem;font-weight:600;">Home</a>
</div>
</div></section>

<footer>© 2026 WonderfulCrew. Premium Cabin Crew Coaching.</footer>
<script>
function submitFB(){
  var name=document.getElementById('fb-name').value.trim()||'Anonymous';
  var email=document.getElementById('fb-email').value.trim();
  var phone=document.getElementById('fb-phone').value.trim();
  var cat=document.getElementById('fb-cat').value;
  var body=document.getElementById('fb-body').value.trim();
  if(!body){alert('Please enter your feedback.');return;}
  // localStorage에 저장 (관리자 페이지에서 확인)
  var list=JSON.parse(localStorage.getItem('wc_feedback_list')||'[]');
  list.unshift({name:name,email:email,phone:phone,cat:cat,body:body,date:new Date().toISOString().slice(0,10)});
  localStorage.setItem('wc_feedback_list',JSON.stringify(list));
  document.getElementById('form').style.display='none';
  document.getElementById('success').style.display='block';
}
</script>
</body>
</html>
