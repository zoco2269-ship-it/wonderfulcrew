function goBack(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    gcStop();
    if(recognition)try{recognition.stop();}catch(e){}
    if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
    interview.classList.remove('active');
    document.getElementById('setup').style.display='block';
  } else {
    history.back();
  }
}

// URL 파라미터로 항공사 자동 선택
(function(){
  var p=new URLSearchParams(location.search);
  var a=p.get('airline');
  if(a&&document.getElementById('s-airline')){
    var sel=document.getElementById('s-airline');
    for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===a){sel.selectedIndex=i;break;}}
  }
})();

if('speechSynthesis' in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}

window.addEventListener('beforeunload',function(){if('speechSynthesis' in window)window.speechSynthesis.cancel();if(stream)stream.getTracks().forEach(function(t){t.stop();});});

var chosenImg='images/man-interviewer.png';
function selAvatar(el){
  document.querySelectorAll('.avatar-opt').forEach(function(a){a.classList.remove('sel');});
  el.classList.add('sel');
  chosenAvatar=el.dataset.avatar;
  chosenImg=el.dataset.img||'';
}

function startInterview(){
  var airline=document.getElementById('s-airline').value;
  QS=AIRLINE_QS[airline]||AIRLINE_QS.general;
  var selAv=document.querySelector('.avatar-opt.sel');
  chosenAvatar=(selAv&&selAv.dataset.avatar)||'male';
  chosenImg=(selAv&&selAv.dataset.img)||'images/man-interviewer.png';
  // 진행 화면은 이모티콘만 노출 (롤플레이와 통일) — 사진은 선택 화면에서만
  var avatarImg=document.getElementById('avatar-img');
  var avatarFallback=document.getElementById('avatar-face-fallback');
  if(avatarImg) avatarImg.style.display='none';
  if(avatarFallback) avatarFallback.style.display='flex';
  document.getElementById('avatar-emoji').textContent=chosenAvatar==='male'?'👨🏻':'👩🏻';
  document.getElementById('q-total').textContent=QS.length;
  document.getElementById('setup').style.display='none';
  document.getElementById('interview').classList.add('active');

  // 카메라 — interview-practice.html에서 검증된 단순 호출 방식과 동일
  if(document.getElementById('cam-toggle').checked){
    (async function(){
      try{
        // 모바일 SR 호환: audio 제외 → SR 이 마이크 단독 점유
        stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
        var v=document.getElementById('cam-video');
        v.srcObject=stream;v.style.display='block';
        document.getElementById('cam-ph').style.display='none';
      }catch(e){
        document.getElementById('cam-ph').innerHTML='<div>카메라 연결 실패</div>';
      }
    })();
  }
  qIdx=0;showQuestion();
}

function showQuestion(){
  chatHistory=[];fullText='';
  document.getElementById('q-idx').textContent=qIdx+1;
  document.getElementById('q-text').textContent=QS[qIdx].q;
  document.getElementById('transcript').textContent='음성 답변 대기 중...';
  document.getElementById('feedback').classList.remove('active');
  document.getElementById('feedback').innerHTML='';
  document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-model').disabled=true; // 다음 질문은 항상 활성화 (자유 이동 가능)
  document.getElementById('waveform').classList.remove('active');
  var accent=document.getElementById('s-accent').value;
  speakQ(QS[qIdx].q,accent);
}

function speakQ(text,lang){
  var iCard=document.getElementById('interviewer-card');
  iCard.classList.add('speaking');
  var isMale=(chosenAvatar==='male');
  gcSpeak(text,lang||'en-GB',isMale?'male':'female',function(){
    iCard.classList.remove('speaking');
  });
}

// 모바일 호환: 마이크 권한 명시 요청 후 SR 시작 (user-gesture 보존)
window.requestMicAndAnswer = async function(){
  var tx=document.getElementById('transcript');
  if(tx) tx.innerHTML='<span style="color:#E8C96A;">🔴 마이크 권한 확인 중...</span>';
  try{
    var s=await navigator.mediaDevices.getUserMedia({audio:true});
    s.getTracks().forEach(function(t){t.stop();});
    startAnswer();
  }catch(err){
    var n=err&&err.name||'unknown';
    var msg='';
    if(n==='NotAllowedError'||n==='SecurityError') msg='마이크 권한이 거부됐어요. 주소창 🔒 → 권한 → 마이크 → 허용 으로 바꾸고 새로고침.';
    else if(n==='NotFoundError') msg='마이크를 찾을 수 없어요.';
    else if(n==='NotReadableError') msg='마이크가 다른 앱에서 사용 중. 다른 앱 종료 후 재시도.';
    else msg='마이크 접근 실패: '+n;
    tx.innerHTML='<span style="color:#E74C3C;">⚠ '+msg+'</span>';
    document.getElementById('btn-answer').style.display='inline-flex';
  }
};

function startAnswer(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 이 브라우저는 음성 인식을 지원하지 않아요. Chrome/Edge 권장.</span>';
    return;
  }
  recognition=new SR();
  recognition.lang='en-US';
  recognition.interimResults=true;
  recognition.continuous=true;
  fullText='';
  window._finalManualStop=false;
  window._finalSeen={};window._finalList=[];
  document.getElementById('btn-answer').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-label').textContent='답변 중';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('transcript').textContent='🎙 듣고 있어요… 말이 끝나면 ⏹ 답변 종료를 눌러주세요';
  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    fullText=window._finalList.join(' ');
    document.getElementById('transcript').textContent=(fullText+(interim?' '+interim:'')).trim()||'🎙 듣고 있어요…';
  };
  recognition.onerror=function(ev){
    var c=ev.error||'unknown',m='';
    if(c==='not-allowed'||c==='service-not-allowed') m='마이크 권한 필요. 🔒 → 마이크 허용.';
    else if(c==='no-speech') m='목소리 못 들었어요. 🎙 답변 시작 다시 눌러 주세요.';
    else if(c==='audio-capture') m='마이크 잠김. 다른 앱 종료 후 재시도.';
    else if(c==='network') m='네트워크 오류.';
    else m='인식 오류: '+c;
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ '+m+'</span>';
    document.getElementById('btn-answer').style.display='inline-flex';
    document.getElementById('btn-stop').style.display='none';
    document.getElementById('waveform').classList.remove('active');
  };
  recognition.onend=function(){
    // 사용자가 ⏹ 누르기 전까진 자동 재시작 (Android Chrome 5~8초마다 auto-stop)
    if(window._finalManualStop){
      if(fullText.trim()) document.getElementById('transcript').textContent=fullText.trim();
    } else {
      // 자동 재시작 — 1500ms 지연 (마이크 아이콘 깜빡임 방지)
      setTimeout(function(){
        if(window._finalManualStop) return;
        try{ recognition.start(); }catch(e){
          document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 인식 중단. 🎙 답변 시작 다시 눌러 주세요.</span>';
          document.getElementById('btn-answer').style.display='inline-flex';
          document.getElementById('btn-stop').style.display='none';
        }
      },400);
    }
  };
  try{ recognition.start(); }
  catch(err){
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 시작 실패: '+err.message+'</span>';
    document.getElementById('btn-answer').style.display='inline-flex';
  }
}

async function stopAnswer(){
  window._finalManualStop=true;
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rec-label').textContent='처리 중';
  document.getElementById('waveform').classList.remove('active');
  var ans=fullText.trim()||document.getElementById('transcript').textContent.trim();
  if(!ans){document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;return;}
  chatHistory.push({role:'user',content:ans});
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">면접관이 답변을 듣고 있어요...</span>';fb.classList.add('active');
  try{
    var turnCount=chatHistory.filter(function(m){return m.role==='user';}).length;
    var airlineKey=document.getElementById('s-airline').value;
    var airlineName={emirates:'Emirates',qatar:'Qatar Airways',etihad:'Etihad Airways',singapore:'Singapore Airlines',cathay:'Cathay Pacific',finnair:'Finnair',klm:'KLM',lufthansa:'Lufthansa',airasia:'AirAsia',flydubai:'Flydubai',riyadh:'Riyadh Air',general:'a major airline'}[airlineKey]||'a major airline';
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:300,
      system:'You are a senior cabin crew interviewer conducting a FINAL INTERVIEW for '+airlineName+'. Question being asked: "'+QS[qIdx].q+'"\n\nRules:\n- Reply in ENGLISH only.\n- Keep responses VERY SHORT: 1 sentence max. Just a brief follow-up question or acknowledgment.\n- Examples: "Can you give me a specific example?" / "How did that make you feel?" / "What did you learn from that?" / "Interesting. And what happened next?"\n- Real interviewers are concise. No long responses.\n- ALWAYS use the word "customer" — NEVER "passenger", "guest", or "client". Even if the candidate worked in cafe/hotel/retail, refer to the people they served as "customers".\n- The candidate is interviewing for '+airlineName+'. Do NOT mention or compare any other airline. Do NOT assume the candidate applied elsewhere or ask "why this airline instead of X". If the candidate happens to mention another airline name in their answer, ignore it gracefully — do not bring it up again.\n- After 2-3 exchanges, just say "Thank you." and add [END].\n- Turn '+turnCount,
      messages:chatHistory
    })});
    var data=await res.json();
    var aiText=((data&&data.content&&data.content[0]&&data.content[0].text)||'Thank you.').replace(/\*\*/g,'');
    chatHistory.push({role:'assistant',content:aiText});
    var isEnd=aiText.includes('[END]')||turnCount>=3;
    var displayText=aiText.replace('[END]','').trim();
    fb.innerHTML='<b style="color:var(--gold);">Interviewer:</b> '+displayText;
    speakQ(displayText,document.getElementById('s-accent').value);
    if(isEnd){
      setTimeout(function(){
        generateFinalFeedback(fb,airlineName);
        document.getElementById('btn-model').disabled=false;document.getElementById('btn-next').disabled=false;
        document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=true;
        document.getElementById('rec-label').textContent='완료';
      },2000);
    } else {
      document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;
      document.getElementById('rec-label').textContent='대기';
    }
  }catch(e){fb.innerHTML='<span style="color:#E74C3C;">오류. 다시 시도해주세요.</span>';document.getElementById('btn-answer').style.display='inline-flex';document.getElementById('btn-answer').disabled=false;}
}

async function generateFinalFeedback(fb,airlineName){
  fb.innerHTML+='<br><br><span style="color:var(--gold);">피드백을 작성하고 있어요...</span>';
  // 카메라 영상 프레임 캡처 — 양 차원 1024px 캡 (Claude API 2000px 제한 안전)
  var capturedImg=null;
  try{
    var v=document.getElementById('cam-video');
    if(v && v.videoWidth>0 && v.videoHeight>0){
      var MAX=1024;
      var vw=v.videoWidth, vh=v.videoHeight;
      var w=vw, h=vh;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      var cv=document.createElement('canvas');
      cv.width=w;cv.height=h;
      var ctx=cv.getContext('2d');
      ctx.translate(w,0);ctx.scale(-1,1);
      ctx.drawImage(v,0,0,w,h);
      capturedImg=cv.toDataURL('image/jpeg',0.7);
    }
  }catch(e){}
  try{
    var convoSummary=chatHistory.map(function(m){return (m.role==='user'?'Candidate':'Interviewer')+': '+m.content;}).join('\n');
    var sysPrompt='You are a senior cabin crew interviewer for '+airlineName+' evaluating a mock final interview answer.\n\nQuestion: "'+QS[qIdx].q+'"\n\nIMPORTANT SCORING RULES:\n- The candidate answer comes from SPEECH RECOGNITION — ignore grammar/broken sentences/capitalization. Focus on CONTENT and INTENT.\n- Concrete example + specific details (place, moment, what was done) + customer-oriented outcome + self-reflection → 80+\n- Question is answered with a clear example but lacks specifics → 70-79\n- Too generic / too short / off-topic → 50-65\n- Be fair and concrete. Cite SPECIFIC phrases the candidate used in your feedback.\n'+(capturedImg?'- An image of the candidate (camera capture) is attached. Analyze appearance: smile, facial expression, eye contact, posture, professional grooming. Include this in feedback.\n':'')+'\nRespond in EXACTLY this Korean format (plain text, no markdown, no asterisks):\n\n점수: X/100\n\n'+(capturedImg?'이미지 피드백 (미소·표정·시선·자세):\n- (2 줄, 카메라 캡처에서 보이는 첫인상·미소·시선·자세)\n\n':'')+'잘한 점:\n- (2-3 줄, 후보자가 실제로 말한 내용을 인용하며)\n\n개선할 점:\n- (1-2 줄, 구체적으로 무엇을 더하면 좋을지)';
    var userMsg;
    if(capturedImg && capturedImg.indexOf('base64,')>-1){
      var base64=capturedImg.split('base64,')[1];
      userMsg=[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
        {type:'text',text:'Question: '+QS[qIdx].q+'\n\nInterview conversation:\n'+convoSummary+'\n\nPlease evaluate the candidate\'s answer + image.'}
      ];
    } else {
      userMsg='Question: '+QS[qIdx].q+'\n\nInterview conversation:\n'+convoSummary+'\n\nPlease evaluate the candidate\'s answer.';
    }
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:800,
      system:sysPrompt,
      messages:[{role:'user',content:userMsg}]
    })});
    var data=await res.json();
    var txt=((data&&data.content&&data.content[0]&&data.content[0].text)||'피드백 생성 실패').replace(/\*\*/g,'').trim();
    fb.innerHTML='<b style="color:var(--gold);">피드백</b><br><div style="white-space:pre-line;margin-top:10px;line-height:1.8;">'+txt+'</div>';
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">피드백 생성 실패. 다시 시도해 주세요.</span>';
  }
}

async function showModel(){
  var fb=document.getElementById('feedback');
  var btn=document.getElementById('btn-model');
  btn.disabled=true;
  var origText=btn.textContent;
  btn.textContent='생성 중...';
  try{
    var airlineKey=document.getElementById('s-airline').value;
    var airlineName={emirates:'Emirates',qatar:'Qatar Airways',etihad:'Etihad Airways',singapore:'Singapore Airlines',cathay:'Cathay Pacific',finnair:'Finnair',klm:'KLM',lufthansa:'Lufthansa',airasia:'AirAsia',flydubai:'Flydubai',riyadh:'Riyadh Air',general:'a major airline'}[airlineKey]||'a major airline';
    var lastUser='';
    for(var i=chatHistory.length-1;i>=0;i--){if(chatHistory[i].role==='user'){lastUser=chatHistory[i].content;break;}}
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:400,
      system:'You are a senior cabin crew coach preparing a candidate for a '+airlineName+' final interview.\n\nQuestion: "'+QS[qIdx].q+'"\n\nCandidate answered: "'+(lastUser||'(no answer yet)')+'"\n\nWrite an IDEAL model answer tailored to THIS question and THIS candidate.\n\nCritical rules:\n- If the candidate already described a specific context (e.g., cafe, restaurant, hotel, retail, airline), BUILD on that same context. Do NOT switch to a different setting.\n- 5-7 sentences. Concrete, specific, service-oriented.\n- STAR structure implicit (situation → action → outcome → reflection).\n- English only. No markdown, no preamble, no "Model Answer:" label — just the answer text.\n- Natural spoken English that sounds like a real person speaking in an interview.',
      messages:[{role:'user',content:'Write the ideal model answer.'}]
    })});
    var data=await res.json();
    var answer=((data&&data.content&&data.content[0]&&data.content[0].text)||'Unable to generate a model answer. Please try again.').replace(/\*\*/g,'').trim();
    fb.innerHTML+='<br><br><b style="color:var(--gold);">모범 답변:</b><br><div style="white-space:pre-line;background:rgba(201,168,76,0.08);padding:16px;border-left:3px solid var(--gold);margin-top:8px;line-height:1.8;">'+answer+'</div>';
    btn.style.display='none';
  }catch(e){
    fb.innerHTML+='<br><br><span style="color:#E74C3C;">모범답변 생성 실패. 다시 시도해 주세요.</span>';
    btn.disabled=false;
    btn.textContent=origText;
  }
}

function nextQuestion(){
  qIdx++;
  if(qIdx>=QS.length){
    document.getElementById('q-banner').innerHTML='<div class="label">COMPLETE</div><div class="question">파이널 인터뷰 완료!</div>';
    document.getElementById('feedback').innerHTML='<b style="color:var(--gold);">모든 질문 완료</b><br><a href="curriculum.html" style="color:var(--gold);">← 커리큘럼</a>';
    document.getElementById('feedback').classList.add('active');
    document.querySelectorAll('.ctrl-btn').forEach(function(b){b.style.display='none';});
    return;
  }
  showQuestion();
}
