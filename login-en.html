<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Noto Serif KR',serif;background:var(--cream);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column;}a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:center;padding:0 5%;height:72px;border-bottom:1px solid rgba(201,168,76,0.2);}
.nav-logo{font-family:"DM Serif Display",serif;font-size:1.5rem;font-weight:400;color:var(--navy);}.nav-logo span{color:var(--gold);}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{background:#fff;border:1px solid var(--gold-pale);padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.06);}
.login-card h2{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--navy);margin-bottom:8px;}
.login-card p{font-size:0.88rem;color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1px solid var(--gold-pale);border-radius:8px;background:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:600;color:var(--text-dark);cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.login-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);}
.login-btn svg{width:22px;height:22px;flex-shrink:0;}
.login-divider{display:flex;align-items:center;gap:14px;margin:24px 0;font-size:0.78rem;color:var(--text-muted);}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gold-pale);}
.login-sub{font-size:0.8rem;color:var(--text-muted);margin-top:20px;line-height:1.6;}
.login-sub a{color:var(--gold);font-weight:600;}
.user-info{display:none;text-align:center;}
.user-info .avatar{width:64px;height:64px;border-radius:50%;background:var(--gold-pale);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;overflow:hidden;}
.user-info .avatar img{width:100%;height:100%;object-fit:cover;}
.user-info .name{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--navy);margin-bottom:4px;}
.user-info .email{font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;}
.user-info .btn-outline{display:inline-block;padding:10px 24px;border:1.5px solid var(--navy);border-radius:22px;font-size:0.84rem;font-weight:600;color:var(--navy);cursor:pointer;background:#fff;}
</style>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav><a href="index-en.html" class="nav-logo">Wonderful<span>Crew</span></a></nav>
<div class="login-wrap">
  <div class="login-card">
    <!-- 로그인 폼 -->
    <div id="login-form">
      <h2>Welcome Back</h2>
      <p>Sign in to your WonderfulCrew account.</p>

      <button class="login-btn" onclick="signInWith('google')">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <button class="login-btn" onclick="signInWith('kakao')" style="background:#FEE500;border-color:#FEE500;color:#3C1E1E;">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#3C1E1E" d="M12 3C6.48 3 2 6.36 2 10.44c0 2.6 1.72 4.88 4.33 6.2l-1.1 4.07c-.08.3.26.54.52.37l4.84-3.2c.46.05.93.08 1.41.08 5.52 0 10-3.36 10-7.52S17.52 3 12 3z"/></svg>
        Sign in with Kakao
      </button>

      <button class="login-btn" onclick="signInWith('naver')" style="background:#03C75A;border-color:#03C75A;color:#fff;">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="#fff" d="M16.27 12.97L7.44 3H3v18h4.73V11.03L16.56 21H21V3h-4.73z"/></svg>
        Sign in with Naver
      </button>

      <div class="login-divider">or</div>

      <button class="login-btn" onclick="signInWithEmail()">Sign in with Email</button>

      <div class="login-sub">
        <a href="index-en.html" style="color:var(--text-muted);">← Back to Home</a>
      </div>
    </div>

    <!-- 로그인 후 -->
    <div class="user-info" id="user-info">
      <div class="avatar" id="user-avatar">👤</div>
      <div class="name" id="user-name">User</div>
      <div class="email" id="user-email">email@example.com</div>
      <button class="btn-outline" onclick="signOut()">Sign Out</button>
      <div style="margin-top:16px;"><a href="settings-en.html" style="color:var(--gold);font-size:0.84rem;font-weight:600;">Notification Settings →</a></div>
      <div style="margin-top:8px;"><a href="index-en.html" style="color:var(--text-muted);font-size:0.82rem;">← Home</a></div>
    </div>
  </div>
</div>

<script>
// Initialize Supabase
// ⚠️ 아래 URL과 Key를 본인 Supabase 프로젝트 값으로 교체하세요
var SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
var SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';

var supabase = null;
try {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e) {
  console.log('Supabase not configured yet');
}

// Check login status
async function checkUser() {
  if (!supabase) return;
  try {
    var { data } = await supabase.auth.getUser();
    if (data && data.user) showUser(data.user);
  } catch(e) {}
}

function showUser(user) {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('user-info').style.display = 'block';
  document.getElementById('user-name').textContent = user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
  document.getElementById('user-email').textContent = user.email || '';
  if (user.user_metadata?.avatar_url) {
    document.getElementById('user-avatar').innerHTML = '<img src="' + user.user_metadata.avatar_url + '">';
  }
  localStorage.setItem('wc_user', JSON.stringify({ id: user.id, email: user.email, name: user.user_metadata?.full_name }));
}

async function signInWith(provider) {
  if (!supabase || SUPABASE_URL.includes('YOUR_PROJECT')) {
    alert('Supabase is not configured yet.\n\nHow to set up Supabase:\n1. Create a project at supabase.com\n2. Enable Google under Authentication > Providers\n3. login.html에서 SUPABASE_URL과 SUPABASE_ANON_KEY 교체\n4. Set Site URL to your domain in Supabase dashboard');
    return;
  }
  if (provider === 'kakao' || provider === 'naver') {
    alert(provider + ' login requires custom OAuth setup in Supabase.\nPlease use Google login for now.');
    return;
  }
  try {
    var { error } = await supabase.auth.signInWithOAuth({
      provider: provider,
      options: { redirectTo: window.location.origin + '/login.html' }
    });
    if (error) alert('Login failed: ' + error.message);
  } catch(e) { alert('Login error: ' + e.message); }
}

function signInWithEmail() {
  var email = prompt('Email address를 입력하세요:');
  if (!email) return;
  if (!supabase || SUPABASE_URL.includes('YOUR_PROJECT')) {
    alert('Supabase is not configured yet.');
    return;
  }
  supabase.auth.signInWithOtp({ email: email }).then(function(res) {
    if (res.error) alert('Error: ' + res.error.message);
    else alert('A magic link has been sent to ' + email + '. Please check your email!');
  });
}

async function signOut() {
  if (supabase) await supabase.auth.signOut();
  localStorage.removeItem('wc_user');
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('user-info').style.display = 'none';
}

checkUser();
</script>
</body>
</html>
