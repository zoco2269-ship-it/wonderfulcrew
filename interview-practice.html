<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>면접 연습   WonderfulCrew</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:#fff;min-height:100vh;}
a{color:inherit;text-decoration:none;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--navy);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);}.nav-back:hover{color:var(--gold);}
.main{max-width:640px;margin:0 auto;padding:48px 20px;text-align:center;}
.q-card{margin-bottom:24px;}
.q-label{font-family:'DM Serif Display','Noto Serif KR',serif;font-size:1.5rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:20px;font-weight:400;line-height:1.2;}
.q-text{font-family:'Noto Serif KR',serif;font-size:1.1rem;color:#fff;line-height:1.7;margin-bottom:28px;font-weight:300;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:16px;padding:20px 24px;text-align:left;max-width:560px;margin-left:auto;margin-right:auto;}
.cam-box{width:100%;max-width:480px;aspect-ratio:16/9;background:#111;border-radius:16px;overflow:hidden;position:relative;margin:0 auto 20px;border:2px solid rgba(201,168,76,0.25);}
.cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.cam-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);font-size:0.88rem;flex-direction:column;gap:8px;}
.rec-badge{position:absolute;top:12px;left:12px;display:none;align-items:center;gap:5px;background:rgba(192,57,43,0.9);color:#fff;padding:4px 10px;font-size:0.7rem;font-weight:700;border-radius:12px;}
.rec-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.btn{padding:13px 28px;border:none;border-radius:28px;font-family:inherit;font-size:0.86rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,0.3);}
.btn-navy{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.2);}
.btn-navy:hover{background:rgba(255,255,255,0.14);}
.btn-red{background:#E74C3C;color:#fff;}
.btn-red:hover{background:#c0392b;}
.transcript{display:none;padding:14px 18px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;font-size:0.88rem;color:rgba(255,255,255,0.7);min-height:40px;margin-top:16px;text-align:left;}
.transcript.visible{display:block;}
.feedback{display:none;margin-top:16px;padding:22px 24px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:16px;text-align:left;font-size:0.88rem;color:rgba(255,255,255,0.85);line-height:1.8;white-space:pre-line;}
.feedback.visible{display:block;}
.feedback b{color:var(--gold);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-gate.js"></script>
<script src="js/free-trial.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="#" class="nav-back" onclick="history.back();return false;">← 돌아가기</a>
</nav>

<div class="main">
  <div class="q-card">
    <div class="q-label" id="q-label">면접 질문</div>
    <div class="q-text" id="q-text">로딩 중...</div>
    <div class="cam-box">
      <video id="cam" autoplay muted playsinline></video>
      <div class="cam-ph" id="cam-ph"><div style="font-size:1.6rem;opacity:0.5;">📷</div><div>카메라를 시작하세요</div></div>
      <div class="rec-badge" id="rec-badge"><div class="rec-dot"></div>REC</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" id="btn-start" onclick="startCam()">카메라 시작</button>
      <button class="btn btn-red" id="btn-rec" style="display:none;" onclick="toggleRec()">🔴 녹화 시작</button>
      <button class="btn btn-navy" id="btn-next" onclick="nextQ()">다음 질문 →</button>
    </div>
    <div class="transcript" id="transcript"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

// 카메라
var stream=null;
var mediaRecorder=null;
var chunks=[];
var recognition=null;
var fullText='';

// ===== MediaPipe 얼굴 분석 =====
var faceStats={smileFrames:0,totalFrames:0,lookingCenter:0,headTiltFrames:0};
var faceMeshInstance=null;var faceAnalysisActive=false;
function initFaceMesh(videoEl){
  if(!window.FaceMesh) return;
  try{
    faceMeshInstance=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
    faceMeshInstance.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMeshInstance.onResults(function(r){
      if(!faceAnalysisActive)return;
      faceStats.totalFrames++;
      if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
        var lm=r.multiFaceLandmarks[0];
        // 미소 감지 — 두 가지 지표 결합 (둘 중 하나만 만족해도 미소로 카운트)
        // (1) 입꼬리 들림: 입꼬리가 아랫입술 중앙선보다 위에 있는가
        // (2) 입의 가로/세로 비율: 미소 시 입이 가로로 넓어짐 (mouth aspect ratio)
        var lipL=lm[61],lipR=lm[291],lipTop=lm[13],lipBot=lm[14];
        var faceL=lm[234],faceR=lm[454];
        var cornerY=(lipL.y+lipR.y)/2;
        var lipMidY=(lipTop.y+lipBot.y)/2;
        var cornerLift=lipMidY-cornerY; // 양수 = 입꼬리가 입 중앙선보다 위 (실제 미소)
        var mouthW=Math.abs(lipR.x-lipL.x);
        var faceW=Math.abs(faceR.x-faceL.x);
        var widthRatio=faceW>0?(mouthW/faceW):0;
        // 미소 = 입꼬리가 실제로 들렸을 때만 (cornerLift 필수)
        // widthRatio는 보조 조건: 입을 가로로 더 늘인 경우
        if(cornerLift>0.003 || widthRatio>0.44) faceStats.smileFrames++;
        var nose=lm[1];
        if(Math.abs(nose.x-0.5)<0.15&&Math.abs(nose.y-0.45)<0.15)faceStats.lookingCenter++;
        var eyeL=lm[33],eyeR=lm[263];
        if(Math.abs(eyeL.y-eyeR.y)>0.02)faceStats.headTiltFrames++;
      }
    });
    setInterval(function(){if(faceAnalysisActive&&videoEl.readyState>=2)try{faceMeshInstance.send({image:videoEl});}catch(e){}},500);
  }catch(e){}
}
function getFaceReport(){
  if(faceStats.totalFrames<5)return '';
  var s=Math.round((faceStats.smileFrames/faceStats.totalFrames)*100);
  var g=Math.round((faceStats.lookingCenter/faceStats.totalFrames)*100);
  var t=Math.round((faceStats.headTiltFrames/faceStats.totalFrames)*100);
  return '\n\n📷 이미지 분석:\n• 미소 유지: '+s+'%'+(s>=60?' ✓':' — 더 웃어보세요')+'\n• 카메라 시선: '+g+'%'+(g>=70?' ✓':' — 카메라를 더 정면으로 보세요')+'\n• 고개 기울기: '+(t<=20?'안정적 ✓':'기울어진 순간 '+t+'% — 바른 자세를 유지하세요');
}

async function startCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
    var v=document.getElementById('cam');
    v.srcObject=stream;v.style.display='block';
    document.getElementById('cam-ph').style.display='none';
    document.getElementById('btn-start').style.display='none';
    document.getElementById('btn-rec').style.display='inline-block';
    // 얼굴 분석 시작
    faceStats={smileFrames:0,totalFrames:0,lookingCenter:0,headTiltFrames:0};
    faceAnalysisActive=true;
    initFaceMesh(v);
  }catch(e){
    document.getElementById('cam-ph').textContent='카메라 연결 실패';
  }
}

function toggleRec(){
  var btn=document.getElementById('btn-rec');
  if(!mediaRecorder||mediaRecorder.state==='inactive'){
    // 녹화 시작
    chunks=[];fullText='';
    document.getElementById('transcript').classList.add('visible');
    mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm'});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data);};
    mediaRecorder.start();
    document.getElementById('rec-badge').style.display='flex';
    btn.textContent='⏹ 답변 완료 · 피드백 받기';
    btn.style.background='#E74C3C';
    // 음성 인식
    var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      recognition=new SR();recognition.lang=recognitionLang;recognition.interimResults=true;recognition.continuous=true;
      recognition.onresult=function(ev){
        var interim='';fullText='';
        for(var r=0;r<ev.results.length;r++){
          if(ev.results[r].isFinal)fullText+=ev.results[r][0].transcript+' ';
          else interim+=ev.results[r][0].transcript;
        }
        document.getElementById('transcript').textContent=fullText+interim;
      };
      // 침묵 길어져 자동 종료되면 답변 완료 누르기 전까지 자동 재시작
      recognition.onend=function(){
        if(mediaRecorder && mediaRecorder.state==='recording'){
          try{recognition.start();}catch(e){}
        }
      };
      recognition.onerror=function(e){console.warn('[interview] recognition error',e.error);};
      recognition.start();
    }
  } else {
    // 녹화 중지
    mediaRecorder.stop();
    if(recognition)try{recognition.stop();}catch(e){}
    document.getElementById('rec-badge').style.display='none';
    btn.textContent='🔴 녹화 시작';
    btn.style.background='';
    btn.disabled=true;
    // 피드백 (음성 인식 안 됐어도 시도)
    setTimeout(function(){
      if(!fullText.trim()) fullText='(음성 인식 없음 - 답변 내용을 텍스트로 확인할 수 없습니다)';
      generateFeedback();
      btn.disabled=false;
    }, 500);
  }
}

async function generateFeedback(){
  var fb=document.getElementById('feedback');
  fb.innerHTML='<span style="color:var(--gold);">피드백을 작성하고 있어요...</span>';
  fb.classList.add('visible');
  var question=document.getElementById('q-text').textContent;
  try{
    var res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',max_tokens:1200,
      system:(type==='hotel'||type==='hotel2'?'You are a luxury hotel interview coach.':'You are a cabin crew interview coach.')+' Evaluate ONLY what the student actually said. Input is from speech recognition — ignore grammar/punctuation errors.\n\nCRITICAL RULES:\n- Only comment on what they ACTUALLY said. Do NOT mention topics they did not bring up.\n- Do NOT use a fixed checklist. Respond naturally to their specific answer.\n- NEVER suggest company policy, mileage, refunds, or compensation beyond their authority.\n- Focus on what crew CAN do: empathy, apology, available drinks/snacks/blankets, warm service.\n\n**SCORING & 개선할 점 RULES (very important):**\n- If the answer is genuinely strong (well-structured, relevant, good content), give 90+ AND under 개선할 점 say "특별한 개선점 없습니다. 이 톤과 구조를 유지하세요." DO NOT manufacture critique just to fill the section.\n- Never criticize for things that are inherent to speech recognition (filler, repeated words, choppy phrasing) — those are NOT real flaws of the student.\n- If you criticize for X (e.g., "구체성 부족"), the 제안 답변 MUST clearly demonstrate X (must contain a concrete example). Otherwise do NOT raise that critique.\n- If 제안 답변 turns out essentially same as student\'s answer, score should be 90+ and 개선할 점 should reflect that (no major change).\n- Score 70-89 only if there are real, demonstrable issues you can show in the model answer.\n\nSERVICE PHILOSOPHY (use ONLY when the question is about service):\nIf the question asks about service (서비스란, 좋은 서비스, 서비스 경험 등), the model answer should naturally reflect this philosophy:\n- 서비스의 핵심은 고객의 입장이 되어보는 것. 고객이 어떤 심정일지 먼저 파악하고 이해하는 것에서 시작.\n- 좋은 서비스의 목적은 고객을 만족시켜서 다시 돌아오게 하는 것. 만족한 고객은 혼자 오지 않고 가족, 친구, 동료를 데리고 돌아온다.\n- 우리는 고객을 만나는 최접점에 있는 사람. 고객 만족도를 높이면 좋은 평판이 되고, 좋은 평판은 고객이 되돌아오는 이유가 된다.\nIMPORTANT: Do NOT force this philosophy into unrelated questions. Only use it when the question is directly about service. If the student mentioned similar ideas, praise them. If not, do NOT criticize — just reflect it naturally in the suggested answer.\n\nFormat (# not ##):\n# 점수: X/100\n# 잘한 점\n- (2-3 points)\n# 개선할 점\n- (1-2 real, demonstrable points OR "특별한 개선점 없습니다." if 90+)\n# 제안 답변\n(5-6 sentences — MUST contain any specific element you criticized for missing)\n\nBe encouraging. Write feedback sections in Korean. The 제안 답변 itself should be in the same language as the question (English if question is in English, Korean if question is in Korean).',
      messages:[{role:'user',content:'질문: '+question+'\n\n학생 답변: '+fullText.trim()+'\n\n피드백을 주세요.'}]
    })});
    var data=await res.json();
    if(data&&data.error){
      fb.innerHTML='API 오류: '+(data.error.message||JSON.stringify(data.error));
      return;
    }
    var text=(data&&data.content&&data.content[0]&&data.content[0].text)||'';
    if(!text){
      fb.innerHTML='피드백 생성 실패. 응답: '+JSON.stringify(data).substring(0,200);
      return;
    }
    var faceReport=typeof getFaceReport==='function'?getFaceReport():'';
    faceAnalysisActive=false;
    fb.innerHTML='<b>피드백</b><br><br>'+text.replace(/\*\*/g,'').replace(/\*[^*]+\*/g,'')+(faceReport?'<br>'+faceReport.replace(/\n/g,'<br>'):'');
    // Supabase에 연습 기록 저장
    if(typeof savePracticeRecord==='function') savePracticeRecord({airline:airlineName,stage:type,question:question,answer:fullText.trim(),feedback:text});
  }catch(e){
    fb.innerHTML='피드백 생성 실패: '+e.message+'<br>다시 시도해주세요.';
  }
}
