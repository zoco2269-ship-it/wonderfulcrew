<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Shooting · Sentence Shooting — WonderfulCrew</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-pale:#F5E9C8;--cream:#FAF7F0;--navy:#1A2340;--navy-dark:#111B2E;--text-dark:#1A1A1A;--text-mid:#4A4438;--text-muted:#5A5048;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy-dark);color:#fff;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(17,27,46,0.95);border-bottom:1px solid rgba(201,168,76,0.15);}
.nav-logo{font-family:'DM Serif Display',serif;font-size:1.3rem;color:#fff;text-decoration:none;}.nav-logo span{color:var(--gold);}
.nav-back{font-size:0.8rem;color:rgba(255,255,255,0.5);text-decoration:none;}.nav-back:hover{color:var(--gold);}
.main{max-width:640px;margin:0 auto;padding:48px 20px;text-align:center;}
.mode-tabs{display:flex;gap:12px;justify-content:center;margin-bottom:32px;}
.mode-tab{padding:12px 28px;border:2px solid rgba(201,168,76,0.3);border-radius:28px;background:none;color:rgba(255,255,255,0.6);font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.mode-tab.active{border-color:var(--gold);background:rgba(201,168,76,0.15);color:var(--gold);}
.keyword-box{background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:20px;padding:40px 32px;margin-bottom:28px;min-height:160px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.keyword{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--gold);line-height:1.3;transition:opacity 0.3s;}
.sentence{font-family:'Noto Serif KR',serif;font-size:1.1rem;color:#fff;line-height:1.7;font-weight:300;max-width:500px;}
.timer{font-family:'DM Serif Display',serif;font-size:3rem;color:rgba(255,255,255,0.3);margin-bottom:8px;}
.timer.active{color:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.btn{padding:14px 32px;border:none;border-radius:28px;font-family:inherit;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-gold{background:linear-gradient(135deg,#E8C96A,#C9A84C);color:#1A2340;}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,0.3);}
.btn-outline{background:none;color:#fff;border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{background:rgba(255,255,255,0.08);}
.btn-red{background:#E74C3C;color:#fff;}
.transcript{display:none;margin-top:20px;padding:16px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:14px;font-size:0.9rem;color:rgba(255,255,255,0.7);text-align:left;min-height:50px;}
.transcript.visible{display:block;}
.tip-box{margin-top:24px;padding:16px 20px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.15);border-radius:14px;text-align:left;font-size:0.84rem;color:rgba(255,255,255,0.6);line-height:1.7;}
.tip-box b{color:var(--gold);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-gate.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Wonderful<span>Crew</span></a>
  <a href="curriculum-qatar.html" class="nav-back">← 커리큘럼</a>
</nav>

<div class="main">
  <h1 style="font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--gold);margin-bottom:8px;">Word Shooting · Sentence Shooting</h1>
  <p style="color:rgba(255,255,255,0.5);font-size:0.88rem;margin-bottom:28px;">랜덤 키워드 또는 문장이 주어집니다. 즉석에서 영어로 발표하세요.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" onclick="setMode('word')">Word Shooting</button>
    <button class="mode-tab" onclick="setMode('sentence')">Sentence Shooting</button>
  </div>

  <div class="keyword-box" id="keyword-box">
    <div class="timer" id="timer">60</div>
    <div class="keyword" id="keyword">Start를 눌러 시작하세요</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-gold" id="btn-start" onclick="startRound()">Start</button>
    <button class="btn btn-red" id="btn-stop" style="display:none;" onclick="stopRound()">Stop</button>
    <button class="btn btn-outline" id="btn-next" style="display:none;" onclick="nextKeyword()">Next →</button>
  </div>

  <div class="transcript" id="transcript"></div>

  <div class="tip-box">
    <b>TIP:</b> 완벽한 문장이 아니어도 괜찮습니다. 키워드를 보자마자 바로 말을 시작하는 연습이 핵심입니다. 자신감 있는 태도와 자연스러운 미소가 중요합니다.
  </div>
</div>

<script>
var WORDS=['Family','Teamwork','Culture','Travel','Safety','Leadership','Service','Communication','Diversity','Happiness','Challenge','Confidence','Dream','Respect','Hospitality','Passion','Patience','Flexibility','Smile','Adventure','Home','Friendship','Success','Trust','Kindness','Experience','Goal','Morning','Celebration','Music','Food','Technology','Health','Nature','Fashion','Childhood','Airport','Sunset','Coffee','Book'];

var SENTENCES=['Tell me about a time you helped someone.','Describe your perfect day off.','What does teamwork mean to you?','How would you handle a rude passenger?','Why is customer service important?','What makes you unique?','Describe a challenge you overcame.','What is your greatest strength?','How do you stay calm under pressure?','What does diversity mean in the workplace?','Tell me about your best travel experience.','How would you welcome a nervous first-time flyer?','What does professionalism look like to you?','Describe a situation where you went above and beyond.','What would you do if you disagreed with a colleague?'];

var mode='word';
var timerInterval=null;
var recognition=null;
var timeLeft=60;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('active');});
  event.target.classList.add('active');
  document.getElementById('keyword').textContent='Start를 눌러 시작하세요';
  document.getElementById('timer').textContent='60';
  document.getElementById('timer').classList.remove('active');
}

function pickRandom(){
  var pool=mode==='word'?WORDS:SENTENCES;
  return pool[Math.floor(Math.random()*pool.length)];
}

function startRound(){
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('btn-next').style.display='inline-flex';
  document.getElementById('transcript').classList.add('visible');
  document.getElementById('transcript').textContent='';

  nextKeyword();

  timeLeft=60;
  document.getElementById('timer').classList.add('active');
  timerInterval=setInterval(function(){
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    if(timeLeft<=0){stopRound();}
  },1000);

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();recognition.lang='en-US';recognition.interimResults=true;recognition.continuous=true;
    recognition.onresult=function(ev){
      var text='';
      for(var r=0;r<ev.results.length;r++){text+=ev.results[r][0].transcript+' ';}
      document.getElementById('transcript').textContent=text.trim();
    };
    recognition.start();
  }
}

function stopRound(){
  if(timerInterval)clearInterval(timerInterval);
  if(recognition)try{recognition.stop();}catch(e){}
  document.getElementById('btn-start').style.display='inline-flex';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('timer').classList.remove('active');
  document.getElementById('btn-start').textContent='다시 시작';
}

function nextKeyword(){
  var kw=document.getElementById('keyword');
  kw.style.opacity='0';
  setTimeout(function(){
    kw.textContent=pickRandom();
    kw.style.opacity='1';
  },200);
}
</script>
</body>
</html>
