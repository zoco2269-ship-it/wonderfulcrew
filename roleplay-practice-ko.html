<script>
function goBack(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    // 모든 오디오/음성 중지
    if(typeof gcStop==='function') gcStop();
    if('speechSynthesis' in window) window.speechSynthesis.cancel();
    if(typeof recognition!=='undefined'&&recognition)try{recognition.stop();recognition=null;}catch(e){}
    if(typeof stream!=='undefined'&&stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
    // 진행 중인 fetch 차단용
    chatHistory=[];
    interview.classList.remove('active');
    document.getElementById('setup').style.display='block';
  } else {
    history.back();
  }
}
window.addEventListener('popstate',function(){
  var interview=document.getElementById('interview');
  if(interview&&interview.classList.contains('active')){
    goBack();
  }
});
</script>

// ===== MediaPipe 얼굴 분석 (전역 — startInterview 외부에 두어 다른 함수에서도 호출 가능) =====
var faceStats={smileFrames:0,totalFrames:0,lookingCenter:0,headTiltFrames:0};
var faceMeshInstance=null;var faceAnalysisActive=false;
function initFaceMesh(videoEl){
  if(!window.FaceMesh) return;
  try{
    faceMeshInstance=new FaceMesh({locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
    faceMeshInstance.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMeshInstance.onResults(function(r){
      if(!faceAnalysisActive)return;
      faceStats.totalFrames++;
      if(r.multiFaceLandmarks&&r.multiFaceLandmarks.length>0){
        var lm=r.multiFaceLandmarks[0];
        var lipL=lm[61],lipR=lm[291],lipTop=lm[13],lipBot=lm[14];
        var faceL=lm[234],faceR=lm[454];
        var cornerY=(lipL.y+lipR.y)/2;
        var lipMidY=(lipTop.y+lipBot.y)/2;
        var cornerLift=lipMidY-cornerY;
        var mouthW=Math.abs(lipR.x-lipL.x);
        var faceW=Math.abs(faceR.x-faceL.x);
        var widthRatio=faceW>0?(mouthW/faceW):0;
        if(cornerLift>0.002 || widthRatio>0.42) faceStats.smileFrames++;
        var nose=lm[1];
        if(Math.abs(nose.x-0.5)<0.15&&Math.abs(nose.y-0.45)<0.15)faceStats.lookingCenter++;
        var eyeL=lm[33],eyeR=lm[263];
        if(Math.abs(eyeL.y-eyeR.y)>0.02)faceStats.headTiltFrames++;

  if(fresh.length<3){recent=[];fresh=indexed.slice();}
  var pool=fresh.slice();questions=[];
  for(var i=0;i<3&&pool.length;i++){var x=Math.floor(Math.random()*pool.length);questions.push(pool.splice(x,1)[0]);}

  (async function(){
    try{
      var tempStream=await navigator.mediaDevices.getUserMedia({video:true});
      tempStream.getTracks().forEach(function(t){t.stop();});
      var devices=await navigator.mediaDevices.enumerateDevices();
      var videoDevices=devices.filter(function(d){return d.kind==='videoinput';});
      var selectedId=null;
      var frontKeywords=/front|전면|내장|integrated|webcam|facetime|camera hd|built-in/i;
      for(var i=0;i<videoDevices.length;i++){
        if(frontKeywords.test(videoDevices[i].label)){selectedId=videoDevices[i].deviceId;break;}
      }
      if(!selectedId&&videoDevices.length>0)selectedId=videoDevices[0].deviceId;
      var constraints=selectedId?{video:{deviceId:{exact:selectedId}}}:{video:true};
      stream=await navigator.mediaDevices.getUserMedia(constraints);
      var v=document.getElementById('cam-video');
      v.srcObject=stream;v.style.display='block';

    }catch(e){

    else if(name==='NotFoundError')
      msg='마이크를 찾을 수 없어요.';
    else if(name==='NotReadableError')
      msg='마이크가 다른 앱에서 사용 중. 다른 앱 종료 후 재시도.';
    else msg='마이크 접근 실패: '+name;

function startListening(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 이 브라우저는 음성 인식 미지원. Chrome/Edge 권장.</span>';
    return;
  }
  recognition=new SR();
  recognition.lang='ko-KR';
  recognition.interimResults=true;
  recognition.continuous=true;
  fullText='';
  window._manualStop=false;
  window._finalSeen={};window._finalList=[];
  var bA=document.getElementById('btn-answer');if(bA) bA.style.display='none';
  document.getElementById('btn-stop').style.display='inline-flex';
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-label').textContent='답변 중';
  document.getElementById('waveform').classList.add('active');
  document.getElementById('transcript').textContent='🎙 듣고 있어요… 말이 끝나면 ⏹ 답변 종료를 눌러주세요';

  // 녹화 없음 — 프라이버시 정책상 영상은 어디에도 저장/전송하지 않음

  var norm=function(s){return (s||'').toLowerCase().replace(/[^a-z0-9가-힣\s]+/g,'').replace(/\s+/g,' ').trim();};
  recognition.onresult=function(ev){
    var interim='';
    for(var r=0;r<ev.results.length;r++){
      if(ev.results[r].isFinal){
        var t=(ev.results[r][0].transcript||'').trim();
        var k=norm(t);
        if(k && !window._finalSeen[k]){window._finalSeen[k]=1;window._finalList.push(t);}
      }else{interim+=ev.results[r][0].transcript;}
    }
    fullText=window._finalList.join(' ');
    document.getElementById('transcript').textContent=(fullText+(interim?' '+interim:'')).trim()||'🎙 듣고 있어요…';
  };
  recognition.onerror=function(ev){
    var c=ev.error||'unknown',m='';
    if(c==='not-allowed'||c==='service-not-allowed') m='마이크 권한 필요. 🔒 → 마이크 허용.';
    else if(c==='no-speech') m='목소리 못 들었어요. 🎙 답변하기 다시 눌러 주세요.';
    else if(c==='audio-capture') m='마이크 잠김. 다른 앱 종료 후 재시도.';
    else if(c==='network') m='네트워크 오류.';
    else m='인식 오류: '+c;
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ '+m+'</span>';
    var bA2=document.getElementById('btn-answer');if(bA2) bA2.style.display='inline-flex';
    document.getElementById('btn-stop').style.display='none';
    document.getElementById('rec-dot').classList.remove('on');
    document.getElementById('waveform').classList.remove('active');
  };
  recognition.onend=function(){
    if(endingRoleplay) return;
    // 사용자가 ⏹ 누르기 전까진 자동 재시작 (Android Chrome 5~8초마다 auto-stop)
    if(window._manualStop){
      if(fullText.trim()){
        document.getElementById('transcript').textContent=fullText.trim();
        processAnswer();
      } else {
        document.getElementById('btn-stop').style.display='none';
        document.getElementById('rec-dot').classList.remove('on');
        document.getElementById('waveform').classList.remove('active');
        document.getElementById('rec-label').textContent='대기';
        var bA3=document.getElementById('btn-answer');if(bA3) bA3.style.display='inline-flex';
        document.getElementById('transcript').textContent='목소리가 없어요. 🎙 답변하기 버튼을 누르고 말해 주세요.';
      }
    } else {
      // 자동 재시작 — 1차: 400ms, 실패 시 2차: 1200ms 추가 시도 (사용자에게 경고 표시 X)
      setTimeout(function(){
        if(window._manualStop) return;
        try{ recognition.start(); }catch(e){
          // 재시작 실패 — 800ms 후 한 번 더 조용히 재시도
          setTimeout(function(){
            if(window._manualStop) return;
            try{ recognition.start(); }catch(e2){ /* 두 번째도 실패 시 그냥 현재 상태 유지 (인식 결과 텍스트 보존) */ }
          },800);
        }
      },400);
    }
  };
  try{
    recognition.start();
  }catch(err){
    document.getElementById('transcript').innerHTML='<span style="color:#E74C3C;">⚠ 시작 실패: '+err.message+'</span>';
    var bA4=document.getElementById('btn-answer');if(bA4) bA4.style.display='inline-flex';
  }
}

        :'당신은 대한민국 국내선 비행기 승객입니다. 상황: "'+scenario+'"\n\n톤: '+tonePersona+'\n\n규칙:\n- 승무원이 실제로 한 말에 반응하세요\n- 질문하면 답하고, 해결책을 제시하면 그에 대해 반응하세요\n- 1~2문장으로 짧게\n- 반드시 자연스러운 한국어 존댓말 또는 상황에 맞는 반말\n- 영어 절대 금지\n- 별표(*)나 행동 묘사 사용 금지. 대사만 말하세요',

      system:rpMode==='hotel'
        ?'당신은 럭셔리 호텔 면접 코치입니다. 다음 롤플레이 대화를 평가합니다. 상황: "'+scenario+'"\n\n중요 평가 기준:\n- 학생 답변은 음성인식 결과이므로 띄어쓰기, 오타, 문법은 무시하고 내용과 의도에 집중\n- 사과 + 공감 + 구체적 해결책/대안 제시 + 서비스 리커버리 + follow-up 을 얼마나 자연스럽게 녹였는지\n- 럭셔리 호텔 직원으로서 고객 응대에 맞는 정중하고 품격 있는 표현을 썼는지\n- 격려하는 톤으로. 학생이 잘한 점 먼저 짚기\n\n절대 금지:\n- 마크다운 문법(#, ##, ###, ---, **, 코드블록) 사용 금지. 순수 한국어 텍스트로만 작성\n- "---" 같은 구분선 사용 금지\n- 이모티콘 사용 금지 (📌 · ✓ 등)\n\n반드시 이 형식으로 답변:\n\n종합 점수: X/100\n\n잘한 점:\n- (2~3개)\n\n개선할 점:\n- (1~2개, 부드럽게)\n\n---SUGGESTED---\n(이 상황의 모범답변을 럭셔리 호텔 직원 톤으로 3~4문장 작성. 존댓말 사용.)\n\n반드시 한국어로 작성.'
        :'당신은 국내 항공사 승무원 면접 코치입니다. 다음 롤플레이 대화를 평가합니다. 상황: "'+scenario+'"\n\n중요 평가 기준:\n- 학생 답변은 음성인식 결과이므로 띄어쓰기, 오타, 문법은 무시하고 내용과 의도에 집중\n- 사과 + 공감 + 구체적 해결책/대안 제시 + 서비스 리커버리 + follow-up 을 얼마나 자연스럽게 녹였는지\n- 국내 항공사 승무원으로서 한국 고객 응대에 맞는 정중한 표현을 썼는지\n- 격려하는 톤으로. 학생이 잘한 점 먼저 짚기\n\n기내 서비스 실무 지식 (피드백·모범답변에 반영):\n- 춥다는 승객 응대: 기내 온도는 승무원이 임의로 조정하지 않음. 반드시 담요 제공·따뜻한 음료 권유·재킷 착용 안내로 해결. "온도를 올려드리겠습니다" 같은 표현은 틀린 답변이며, 학생이 그렇게 답해도 피드백에 긍정적으로 반영하면 안 됨. 다만 이유(저온 유지 원칙 등)는 피드백에 언급하지 말고, 올바른 해결 방법만 제시\n- 덥다는 승객: 찬 음료·찬 수건 제공, 공조 확인 언급\n- 식사 관련 요청: 가용한 옵션 확인 → 대체 메뉴 안내 → 추가 스낵 제공\n\n절대 금지:\n- 마크다운 문법(#, ##, ###, ---, **, 코드블록) 사용 금지. 순수 한국어 텍스트로만 작성\n- "---" 같은 구분선 사용 금지\n- 이모티콘 사용 금지 (📌 · ✓ 등)\n\n반드시 이 형식으로 답변:\n\n종합 점수: X/100\n\n잘한 점:\n- (2~3개)\n\n개선할 점:\n- (1~2개, 부드럽게)\n\n---SUGGESTED---\n(이 상황의 모범답변을 한국 국내 항공사 승무원 톤으로 3~4문장 작성. 존댓말 사용.)\n\n반드시 한국어로 작성.',
      messages:[{role:'user',content:'전체 롤플레이 대화:\n\n'+convoSummary+'\n\n피드백 부탁드립니다.'}]
    })});
    var data=await res.json();
    if(!res.ok||!data){fb.innerHTML='API 응답 오류 ('+res.status+'): '+JSON.stringify(data).substring(0,300);document.getElementById('btn-next').style.display='inline-flex';return;}
    if(data&&data.error){fb.innerHTML='API 오류: '+(data.error.message||JSON.stringify(data.error));document.getElementById('btn-next').style.display='inline-flex';return;}
    var feedbackText=(data&&data.content&&data.content[0]&&data.content[0].text)||'';
    // 마크다운·이모티콘 문법 제거 (AI 가 프롬프트 무시하고 추가하는 경우 방어)
    feedbackText=feedbackText
      .replace(/\*\*/g,'')
      .replace(/^#{1,6}\s*/gm,'')           // # ## ### 제거
      .replace(/^\s*---+\s*$/gm,'')          // --- 수평선 줄 제거
      .replace(/📌|📷|💪|✓|✅|🎯|⭐/g,'')    // 자주 나오는 이모티콘 제거
      .replace(/\n{3,}/g,'\n\n')             // 빈 줄 3개 이상 → 2개로
      .trim();
    var parts=feedbackText.split('---SUGGESTED---');
    var mainFeedback=parts[0].trim();
    lastSuggestedResponse=(parts[1]||'').trim();
    faceAnalysisActive=false;
    fb.innerHTML='<b style="color:var(--gold);">피드백</b><br><br><div style="white-space:pre-line;">'+mainFeedback+'</div>';
    if(typeof savePracticeRecord==='function') savePracticeRecord({airline:'',stage:'roleplay-ko',question:scenario||'',answer:fullText||'',feedback:mainFeedback});
    if(lastSuggestedResponse) document.getElementById('btn-model').style.display='inline-flex';
    document.getElementById('btn-next').style.display='inline-flex';
    document.getElementById('rec-label').textContent='완료';
  }catch(e){
    fb.innerHTML='<span style="color:#E74C3C;">피드백 생성 실패: '+e.message+'</span>';
    document.getElementById('btn-next').style.display='inline-flex';
  }
}

function nextQuestion(){
  try{if(typeof gcStop==='function')gcStop();}catch(e){}
  if(recognition)try{recognition.onend=null;recognition.stop();recognition=null;}catch(e){}
  if('speechSynthesis' in window)window.speechSynthesis.cancel();
  mediaRecorder=null;
  qIdx++;
  if(qIdx>=questions.length){
    document.getElementById('q-banner').innerHTML='<div class="label">COMPLETE</div><div class="question">모든 상황 연습을 마쳤어요!</div>';
    document.getElementById('feedback').innerHTML='<b style="color:var(--gold);">롤플레이 완료</b><br><br><a href="curriculum.html" style="color:var(--gold);">← 커리큘럼으로</a>';
    document.getElementById('feedback').classList.add('active');
    document.querySelectorAll('.ctrl-btn').forEach(function(b){b.style.display='none';});
    return;
  }
  showQuestion();
}
</script>
